<!DOCTYPE html>

<head>

                    },

                        'serif': ['Playfair Display', 'Georgia', 'serif'],
                        'sans': ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        .score-input:focus { transform: scale(1.02); }

</head>

    <script>
        // Statistikk-felter
        const STAT_FIELDS = ['slipptid', 'stand_m', 'stand_u', 'tomstand', 'makker_stand', 'sjanse'];

        // State
        const state = {
            currentSlipp: 1,
            selectedDogs: { 1: 1, 2: 2 }, // { position: dogNr }
            ferdigeDogs: {}, // { dogNr: true }
            dogData: {}, // { dogNr: { slipps: { 1: { slipptid, ... } }, fuglebehandling: {}, premie, notater } }
            slippComments: {}, // { slippNr: "kommentar" }
        };

        // Demo partiliste for UK/AK
        const partyList = [
            { nr: 1, race: 'ES', name: 'Neadalens Zlatan', owner: 'Roel, Aleksander', klasse: 'UK' },
            { nr: 2, race: 'IS', name: 'Braut', owner: 'Hansen, Per', klasse: 'UK' },
            { nr: 3, race: 'ES', name: 'Fjellheimens Tara', owner: 'Olsen, Kari', klasse: 'AK' },
            { nr: 4, race: 'GS', name: 'Storm av Høgfjellet', owner: 'Berg, Ole', klasse: 'AK' },
            { nr: 5, race: 'IS', name: 'Vinterens Håp', owner: 'Dahl, Lisa', klasse: 'UK' },
            { nr: 6, race: 'ES', name: 'Sølvrevens Balder', owner: 'Vik, Thomas', klasse: 'AK' }
        ];

        // Initialize
        function init() {
            loadFromStorage();
            populateDogSelectors();
            updateDogDisplays();
            updateSlippLabels();
            loadSlippComment();
            loadDogData(1);
            loadDogData(2);
            updateTotals();
            setupDictation();
        }

        function loadSlippComment() {
            document.getElementById('slippComment').value = state.slippComments[state.currentSlipp] || '';
        }

        function saveSlippComment() {
            state.slippComments[state.currentSlipp] = document.getElementById('slippComment').value;
        }

        function loadFromStorage() {
            const saved = localStorage.getItem('dommertest_ukak_dual');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    state.currentSlipp = parsed.currentSlipp || 1;
                    state.selectedDogs = parsed.selectedDogs || { 1: 1, 2: 2 };
                    state.ferdigeDogs = parsed.ferdigeDogs || {};
                    state.dogData = parsed.dogData || {};
                    state.slippComments = parsed.slippComments || {};
                } catch (e) {
                    console.error('Failed to load:', e);
                }
            }
            document.getElementById('currentSlipp').textContent = state.currentSlipp;
        }

        function saveToStorage() {
            localStorage.setItem('dommertest_ukak_dual', JSON.stringify({
                currentSlipp: state.currentSlipp,
                selectedDogs: state.selectedDogs,
                ferdigeDogs: state.ferdigeDogs,
                dogData: state.dogData,
                slippComments: state.slippComments
            }));
        }

        function resetAll() {
            if (!confirm('Er du sikker på at du vil nullstille all bedømmelse?')) return;

            localStorage.removeItem('dommertest_ukak_dual');
            state.currentSlipp = 1;
            state.selectedDogs = { 1: 1, 2: 2 };
            state.ferdigeDogs = {};
            state.dogData = {};
            state.slippComments = {};

            populateDogSelectors();
            updateDogDisplays();
            updateSlippLabels();
            loadSlippComment();
            clearInputs();
            updateTotals();
        }

        function clearInputs() {
            [1, 2].forEach(pos => {
                STAT_FIELDS.forEach(field => {
                    document.getElementById(`dog${pos}_${field}`).value = '';
                });
                document.getElementById(`dog${pos}_presisjon`).value = '';
                document.getElementById(`dog${pos}_reising`).value = '';
                document.getElementById(`dog${pos}_godkjent_reis`).checked = false;
                document.getElementById(`dog${pos}_premie`).value = '';
                document.getElementById(`dog${pos}_notater`).value = '';
                document.getElementById(`dog${pos}_ferdig`).checked = false;
            });
            document.getElementById('slippComment').value = '';
        }

        function populateDogSelectors() {
            const options = partyList.map(dog => {
                const ferdig = state.ferdigeDogs[dog.nr] ? ' (Ferdig)' : '';
                return `<option value="${dog.nr}">${dog.nr}. ${dog.race} ${dog.name} (${dog.klasse})${ferdig}</option>`;
            }).join('');

            document.getElementById('dog1Select').innerHTML = options;
            document.getElementById('dog2Select').innerHTML = options;

            document.getElementById('dog1Select').value = state.selectedDogs[1];
            document.getElementById('dog2Select').value = state.selectedDogs[2];
        }

        function selectDog(position, dogNr) {
            saveDogData(position);
            state.selectedDogs[position] = parseInt(dogNr);
            updateDogDisplays();
            loadDogData(position);
            updateTotals();
        }

        function updateDogDisplays() {
            [1, 2].forEach(pos => {
                const dogNr = state.selectedDogs[pos];
                const dog = partyList.find(d => d.nr === dogNr);
                if (dog) {
                    document.getElementById(`dog${pos}Name`).textContent = `${dog.race} ${dog.name}`;
                    document.getElementById(`dog${pos}Info`).textContent = `${dog.klasse} • ${dog.owner}`;
                    document.getElementById(`dog${pos}_ferdig`).checked = !!state.ferdigeDogs[dogNr];
                }
                // Update slipp number display
                document.querySelectorAll(`.dog${pos}SlippNr`).forEach(el => {
                    el.textContent = state.currentSlipp;
                });
            });
        }

        function updateSlippLabels() {
            document.getElementById('slippLabel').textContent = state.currentSlipp;
            document.getElementById('currentSlipp').textContent = state.currentSlipp;
            [1, 2].forEach(pos => {
                document.querySelectorAll(`.dog${pos}SlippNr`).forEach(el => {
                    el.textContent = state.currentSlipp;
                });
            });
        }

        function loadDogData(position) {
            const dogNr = state.selectedDogs[position];
            const data = state.dogData[dogNr];
            const slippData = data?.slipps?.[state.currentSlipp] || {};

            // Statistikk for dette slippet
            STAT_FIELDS.forEach(field => {
                document.getElementById(`dog${position}_${field}`).value = slippData[field] ?? '';
            });

            // Fuglebehandling (global for hunden, ikke per slipp)
            const fugl = data?.fuglebehandling || {};
            document.getElementById(`dog${position}_presisjon`).value = fugl.presisjon ?? '';
            document.getElementById(`dog${position}_reising`).value = fugl.reising ?? '';
            document.getElementById(`dog${position}_godkjent_reis`).checked = fugl.godkjentReising ?? false;

            // Premie og notater
            document.getElementById(`dog${position}_premie`).value = data?.premie ?? '';
            document.getElementById(`dog${position}_notater`).value = data?.notater ?? '';
            document.getElementById(`dog${position}_ferdig`).checked = !!state.ferdigeDogs[dogNr];
        }

        function saveDogData(position) {
            const dogNr = state.selectedDogs[position];
            if (!state.dogData[dogNr]) {
                state.dogData[dogNr] = { slipps: {}, fuglebehandling: {}, premie: null, notater: '' };
            }
            if (!state.dogData[dogNr].slipps) {
                state.dogData[dogNr].slipps = {};
            }

            // Statistikk for dette slippet
            const slippData = {};
            STAT_FIELDS.forEach(field => {
                const val = document.getElementById(`dog${position}_${field}`).value;
                slippData[field] = val ? parseInt(val) : null;
            });
            state.dogData[dogNr].slipps[state.currentSlipp] = slippData;

            // Fuglebehandling
            state.dogData[dogNr].fuglebehandling = {
                presisjon: document.getElementById(`dog${position}_presisjon`).value || null,
                reising: document.getElementById(`dog${position}_reising`).value || null,
                godkjentReising: document.getElementById(`dog${position}_godkjent_reis`).checked
            };

            // Premie og notater
            state.dogData[dogNr].premie = document.getElementById(`dog${position}_premie`).value || null;
            state.dogData[dogNr].notater = document.getElementById(`dog${position}_notater`).value;
        }

        function updateTotals() {
            [1, 2].forEach(pos => {
                const dogNr = state.selectedDogs[pos];
                const data = state.dogData[dogNr];

                STAT_FIELDS.forEach(field => {
                    let total = 0;
                    if (data?.slipps) {
                        Object.values(data.slipps).forEach(slipp => {
                            if (slipp[field]) total += slipp[field];
                        });
                    }
                    // Legg til nåværende verdi (som kanskje ikke er lagret ennå)
                    const currentVal = document.getElementById(`dog${pos}_${field}`).value;
                    // Ikke legg til hvis dette slippet allerede er i data
                    if (!data?.slipps?.[state.currentSlipp]) {
                        total += parseInt(currentVal) || 0;
                    }
                    document.getElementById(`dog${pos}_total_${field}`).textContent = total;
                });
            });
        }

        function saveAll() {
            saveSlippComment();
            saveDogData(1);
            saveDogData(2);
            saveToStorage();
            updateTotals();

            // Visual feedback
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '✓ Lagret!';
            btn.classList.remove('bg-forest-600', 'hover:bg-forest-700');
            btn.classList.add('bg-green-600');
            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.remove('bg-green-600');
                btn.classList.add('bg-forest-600', 'hover:bg-forest-700');
            }, 1500);
        }

        function nextSlipp() {
            saveSlippComment();
            saveDogData(1);
            saveDogData(2);
            saveToStorage();

            state.currentSlipp++;
            updateSlippLabels();
            loadSlippComment();
            loadDogData(1);
            loadDogData(2);
            updateTotals();
        }

        function setFerdig(position) {
            const dogNr = state.selectedDogs[position];
            const checkbox = document.getElementById(`dog${position}_ferdig`);

            if (checkbox.checked) {
                state.ferdigeDogs[dogNr] = true;
            } else {
                delete state.ferdigeDogs[dogNr];
            }

            saveToStorage();
            populateDogSelectors();
        }

        // Dictation
        let recognition = null;
        let activeTextarea = null;

        function setupDictation() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const btn = document.getElementById('dictationBtn');
            const textarea = document.getElementById('slippComment');

            if (!SpeechRecognition) {
                if (btn) {
                    btn.classList.add('opacity-50');
                    btn.title = 'Diktering støttes ikke';
                }
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'nb-NO';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                if (!activeTextarea) return;
                let transcript = '';
                for (let i = 0; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                activeTextarea.value = transcript;
            };

            recognition.onend = () => {
                if (btn) {
                    btn.classList.remove('bg-red-500', 'animate-pulse');
                    btn.classList.add('bg-warm-500');
                }
                activeTextarea = null;
            };

            if (btn && textarea) {
                btn.addEventListener('click', () => {
                    if (activeTextarea === textarea) {
                        recognition.stop();
                        return;
                    }

                    if (activeTextarea) {
                        recognition.stop();
                    }

                    activeTextarea = textarea;
                    btn.classList.remove('bg-warm-500');
                    btn.classList.add('bg-red-500', 'animate-pulse');

                    try {
                        recognition.start();
                    } catch (e) {
                        console.error('Dictation error:', e);
                    }
                });
            }
        }

        // Listen for input changes to update totals
        document.addEventListener('input', (e) => {
            if (e.target.matches('[id^="dog1_"], [id^="dog2_"]')) {
                updateTotals();
            }
        });

        // Init
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
