<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">

    <title>Dommerkort VK (Test)</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        warm: { 50: '#FFF7F2', 100: '#FFE1CF', 200: '#EAD8CF', 300: '#E5C9B8', 400: '#D4A989', 500: '#FD8536', 600: '#E5721F', 700: '#C45F14', 800: '#6E3018', 900: '#4A1E0D' },
                        cream: { DEFAULT: '#F7F3EE', 50: '#FFFFFF', 100: '#F7F3EE', 200: '#FFF7F2', 300: '#EAD8CF' },
                        bark: { 50: '#F7F3EE', 100: '#FFF7F2', 200: '#EAD8CF', 300: '#D4A989', 400: '#B8977A', 500: '#9A8268', 600: '#7D6A54', 700: '#6E3018', 800: '#5A2812', 900: '#3D1B0C' },
                        forest: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d' },
                        vk: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a' }
                    },
                    fontFamily: {
                        'serif': ['Playfair Display', 'Georgia', 'serif'],
                        'sans': ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        .score-input:focus { transform: scale(1.02); }
        input[type="number"] { font-size: 14px; }
        input[type="number"]::-webkit-inner-spin-button { opacity: 1; }
        .dog-card { min-height: calc(100vh - 60px); }

        /* Zoom mode styles */
        .zoom-mode .dog-panel { display: none; }
        .zoom-mode .dog-panel.zoomed {
            display: block;
            width: 100%;
            border-right: none;
        }
        .zoom-mode .dog-panel.zoomed .dog-card {
            max-width: 500px;
            margin: 0 auto;
            min-height: auto;
        }
        .zoom-mode .dog-panel.zoomed .score-input { height: 52px; font-size: 20px; }
        .zoom-mode .dog-panel.zoomed input[type="number"] { font-size: 20px; }
        .zoom-mode .dog-panel.zoomed input[type="text"] { height: 40px; font-size: 16px; }
        .zoom-mode .dog-panel.zoomed select { height: 52px; font-size: 18px; }
        .zoom-mode .dog-panel.zoomed label { font-size: 12px; }
        .zoom-mode .dog-panel.zoomed h4 { font-size: 13px; }
        .zoom-mode .dog-panel.zoomed .text-\[10px\] { font-size: 13px; }
        .zoom-mode .dog-panel.zoomed .text-\[9px\] { font-size: 12px; }
        .zoom-mode .dog-panel.zoomed .text-xs { font-size: 15px; }
        .zoom-mode .dog-panel.zoomed .text-sm { font-size: 17px; }
        .zoom-mode .dog-panel.zoomed .grid-cols-6 { grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .zoom-mode .dog-panel.zoomed .p-2 { padding: 12px; }
        .zoom-mode .dog-panel.zoomed .gap-1 { gap: 8px; }
        .zoom-mode .dog-panel.zoomed textarea { font-size: 16px; }

        /* Swipe hint indicator */
        .zoom-mode .dog-panel.zoomed::after {
            content: '← swipe →';
            display: block;
            text-align: center;
            padding: 8px;
            color: #94a3b8;
            font-size: 12px;
            margin-top: 8px;
        }

        /* Zoom button in corner */
        .zoom-btn { transition: all 0.2s; }
    </style>
</head>

    <!-- Header -->

                    </a>

                        <p class="font-bold font-serif text-sm">VK Dommerkort</p>
                        <p class="text-bark-400 text-xs">Slipp <span id="currentSlipp">1</span></p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="resetAll()" class="bg-red-500/80 hover:bg-red-600 px-2 py-1 rounded-lg text-xs font-medium transition" title="Nullstill alt">
                        ↺

                    <span class="bg-bark-800 px-3 py-1 rounded-full text-sm font-bold">VK</span>
                    <button onclick="nextSlipp()" class="bg-warm-500 hover:bg-warm-600 px-3 py-1 rounded-lg text-sm font-medium transition">
                        Neste slipp →
                    </button>

            </div>
        </div>

                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>

            </div>
        </div>

                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Lagre-knapper (fast nederst) -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-vk-200 p-2 z-40">
        <!-- Rad 1: Individuelle knapper for hver hund -->
        <div class="flex gap-2 mb-2">
            <!-- Hund 1 knapper -->
            <div class="flex-1 flex gap-1">
                <button onclick="saveDogOnly(1)" class="flex-1 bg-vk-500 hover:bg-vk-600 text-white font-medium py-2 rounded-lg text-xs transition">
                    Lagre hund 1
                </button>
                <button onclick="saveDogAndFinish(1)" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-medium py-2 rounded-lg text-xs transition">
                    Avslutt hund 1
                </button>
            </div>
            <!-- Hund 2 knapper -->
            <div class="flex-1 flex gap-1">
                <button onclick="saveDogOnly(2)" class="flex-1 bg-vk-500 hover:bg-vk-600 text-white font-medium py-2 rounded-lg text-xs transition">
                    Lagre hund 2
                </button>
                <button onclick="saveDogAndFinish(2)" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-medium py-2 rounded-lg text-xs transition">
                    Avslutt hund 2
                </button>
            </div>
        </div>
        <!-- Rad 2: Knapper for begge hunder (full bredde) -->
        <div class="flex flex-col gap-1">
            <button onclick="saveAll()" class="w-full bg-vk-600 hover:bg-vk-700 text-white font-bold py-3 rounded-xl shadow-lg transition">
                Lagre begge hunder
            </button>
            <button onclick="saveAllAndFinishBoth()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl shadow-lg transition">
                Lagre + avslutt begge
            </button>
        </div>
    </div>

    <script>
        // State
        const state = {
            currentSlipp: 1,
            selectedDogs: { 1: 1, 2: 2 }, // { position: dogNr }
            plasseringer: {}, // { dogNr: plassering }
            tidTilGode: {}, // { dogNr: true/false } - hunder som har tid til gode
            dogData: {}, // { dogNr: { slipps: { 1: { fmr, ... }, 2: {...} }, notater } }
            slippComments: {}, // { slippNr: "kommentar" } - felles kommentar per slipp
        };

        // Demo partiliste for VK
        const partyList = [
            { nr: 1, race: 'ES', name: 'Neadalens Zlatan', owner: 'Roel, Aleksander' },
            { nr: 2, race: 'IS', name: 'Braut', owner: 'Hansen, Per' },
            { nr: 3, race: 'ES', name: 'Fjellheimens Tara', owner: 'Olsen, Kari' },
            { nr: 4, race: 'GS', name: 'Storm av Høgfjellet', owner: 'Berg, Ole' },
            { nr: 5, race: 'IS', name: 'Vinterens Håp', owner: 'Dahl, Lisa' },
            { nr: 6, race: 'ES', name: 'Sølvrevens Balder', owner: 'Vik, Thomas' }
        ];

        // Initialize
        function init() {
            loadFromStorage();
            populateDogSelectors();
            updateDogDisplays();
            updateSlippLabels();
            loadSlippComment();
            loadDogData(1);
            loadDogData(2);
            updatePlacementDropdowns();
            renderPartyLists();
            renderRankings();
            setupDictation();
        }

        function loadSlippComment() {
            document.getElementById('slippComment').value = state.slippComments[state.currentSlipp] || '';
        }

        function saveSlippComment() {
            state.slippComments[state.currentSlipp] = document.getElementById('slippComment').value;
        }

        function loadFromStorage() {
            const saved = localStorage.getItem('dommertest_vk_dual');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    state.currentSlipp = parsed.currentSlipp || 1;
                    state.selectedDogs = parsed.selectedDogs || { 1: 1, 2: 2 };
                    state.plasseringer = parsed.plasseringer || {};
                    state.tidTilGode = parsed.tidTilGode || {};
                    state.dogData = parsed.dogData || {};
                    state.slippComments = parsed.slippComments || {};
                } catch (e) {
                    console.error('Failed to load:', e);
                }
            }
            document.getElementById('currentSlipp').textContent = state.currentSlipp;
        }

        function saveToStorage() {
            localStorage.setItem('dommertest_vk_dual', JSON.stringify({
                currentSlipp: state.currentSlipp,
                selectedDogs: state.selectedDogs,
                plasseringer: state.plasseringer,
                tidTilGode: state.tidTilGode,
                dogData: state.dogData,
                slippComments: state.slippComments
            }));
        }

        function resetAll() {
            if (!confirm('Er du sikker på at du vil nullstille all bedømmelse?')) return;

            localStorage.removeItem('dommertest_vk_dual');
            state.currentSlipp = 1;
            state.selectedDogs = { 1: 1, 2: 2 };
            state.plasseringer = {};
            state.tidTilGode = {};
            state.dogData = {};
            state.slippComments = {};

            // Oppdater UI
            populateDogSelectors();
            updateDogDisplays();
            updateSlippLabels();
            loadSlippComment();
            updatePlacementDropdowns();
            renderPartyLists();
            renderRankings();

            // Nullstill input-feltene
            [1, 2].forEach(pos => {
                document.getElementById(`dog${pos}_fmr`).value = '';
                document.getElementById(`dog${pos}_fur`).value = '';
                document.getElementById(`dog${pos}_slat`).value = '';
                document.getElementById(`dog${pos}_sjanse`).value = '';
                document.getElementById(`dog${pos}_ts`).value = '';
                document.getElementById(`dog${pos}_apport`).value = '';
                document.getElementById(`dog${pos}_slipptid`).value = '';
                document.getElementById(`dog${pos}_notater`).value = '';
                document.getElementById(`dog${pos}_slipptid_info`).innerHTML = '';
            });
            document.getElementById('slippComment').value = '';
        }

        function populateDogSelectors() {
            const options = partyList.map(dog =>
                `<option value="${dog.nr}">${dog.nr}. ${dog.race} ${dog.name}</option>`
            ).join('');

            document.getElementById('dog1Select').innerHTML = options;
            document.getElementById('dog2Select').innerHTML = options;

            document.getElementById('dog1Select').value = state.selectedDogs[1];
            document.getElementById('dog2Select').value = state.selectedDogs[2];
        }

        function selectDog(position, dogNr) {
            // Save current data first
            saveDogData(position);

            state.selectedDogs[position] = parseInt(dogNr);
            updateDogDisplays();
            loadDogData(position);
        }

        function updateDogDisplays() {
            [1, 2].forEach(pos => {
                const dogNr = state.selectedDogs[pos];
                const dog = partyList.find(d => d.nr === dogNr);
                if (dog) {
                    document.getElementById(`dog${pos}Name`).textContent = `${dog.race} ${dog.name}`;
                    document.getElementById(`dog${pos}Info`).textContent = `Fører: ${dog.owner}`;

                    // Update plassering dropdown
                    const plass = state.plasseringer[dogNr];
                    document.getElementById(`dog${pos}_plassering`).value = plass || '';

                    // Update tid til gode checkbox
                    const checkbox = document.getElementById(`dog${pos}_tidtilgode`);
                    if (checkbox) {
                        checkbox.checked = !!state.tidTilGode[dogNr];
                    }
                }
            });
        }

        function updateSlippLabels() {
            document.getElementById('slippLabel').textContent = state.currentSlipp;
            document.getElementById('currentSlipp').textContent = state.currentSlipp;
        }

        function loadDogData(position) {
            const dogNr = state.selectedDogs[position];
            const data = state.dogData[dogNr];
            const slippData = data?.slipps?.[state.currentSlipp] || {};

            document.getElementById(`dog${position}_fmr`).value = slippData.fmr ?? '';
            document.getElementById(`dog${position}_fur`).value = slippData.fur ?? '';
            document.getElementById(`dog${position}_slat`).value = slippData.slat ?? '';
            document.getElementById(`dog${position}_sjanse`).value = slippData.sjanse ?? '';
            document.getElementById(`dog${position}_apport`).value = slippData.apport ?? '';
            document.getElementById(`dog${position}_ts`).value = slippData.ts ?? '';
            document.getElementById(`dog${position}_slipptid`).value = slippData.slipptid ?? '';
            document.getElementById(`dog${position}_notater`).value = data?.notater || '';

            // Oppdater slipptid-visning
            updateSlipptidDisplay(position);
        }

        function saveDogData(position) {
            const dogNr = state.selectedDogs[position];
            if (!state.dogData[dogNr]) {
                state.dogData[dogNr] = { slipps: {}, notater: '' };
            }
            if (!state.dogData[dogNr].slipps) {
                state.dogData[dogNr].slipps = {};
            }

            state.dogData[dogNr].slipps[state.currentSlipp] = {
                fmr: document.getElementById(`dog${position}_fmr`).value ? parseInt(document.getElementById(`dog${position}_fmr`).value) : null,
                fur: document.getElementById(`dog${position}_fur`).value ? parseInt(document.getElementById(`dog${position}_fur`).value) : null,
                slat: document.getElementById(`dog${position}_slat`).value ? parseInt(document.getElementById(`dog${position}_slat`).value) : null,
                sjanse: document.getElementById(`dog${position}_sjanse`).value ? parseInt(document.getElementById(`dog${position}_sjanse`).value) : null,
                apport: document.getElementById(`dog${position}_apport`).value ? parseInt(document.getElementById(`dog${position}_apport`).value) : null,
                ts: document.getElementById(`dog${position}_ts`).value ? parseInt(document.getElementById(`dog${position}_ts`).value) : null,
                slipptid: document.getElementById(`dog${position}_slipptid`).value ? parseInt(document.getElementById(`dog${position}_slipptid`).value) : null
            };
            state.dogData[dogNr].notater = document.getElementById(`dog${position}_notater`).value;
        }

        // Beregn total slipptid for en hund (sum av alle slipp)
        function getTotalSlipptid(dogNr) {
            const data = state.dogData[dogNr];
            if (!data || !data.slipps) return 0;

            let total = 0;
            Object.values(data.slipps).forEach(slipp => {
                if (slipp.slipptid) total += slipp.slipptid;
            });
            return total;
        }

        // Hent slipptid-historikk for en hund (array med { slippNr, tid })
        function getSlipptidHistory(dogNr, excludeCurrentSlipp = false) {
            const data = state.dogData[dogNr];
            if (!data || !data.slipps) return [];

            const history = [];
            Object.entries(data.slipps).forEach(([slippNr, slipp]) => {
                if (excludeCurrentSlipp && parseInt(slippNr) === state.currentSlipp) return;
                if (slipp.slipptid) {
                    history.push({ slippNr: parseInt(slippNr), tid: slipp.slipptid });
                }
            });

            // Sorter etter slipp-nummer
            return history.sort((a, b) => a.slippNr - b.slippNr);
        }

        // Oppdater slipptid-visning for en posisjon
        function updateSlipptidDisplay(position) {
            const dogNr = state.selectedDogs[position];
            const infoEl = document.getElementById(`dog${position}_slipptid_info`);
            if (!infoEl) return;

            // Hent historikk (ekskluder nåværende slipp)
            const history = getSlipptidHistory(dogNr, true);

            // Hent nåværende verdi fra input
            const currentSlipptid = document.getElementById(`dog${position}_slipptid`).value ? parseInt(document.getElementById(`dog${position}_slipptid`).value) : 0;

            // Beregn total (tidligere + nåværende)
            const previousTotal = history.reduce((sum, h) => sum + h.tid, 0);
            const total = previousTotal + currentSlipptid;

            // Bygg visning
            let html = '';

            if (history.length > 0) {
                // Vis tidligere slipp
                const historyStr = history.map(h => `${h.slippNr}.slipp: ${h.tid}'`).join(', ');
                html += `<div class="text-forest-500">${historyStr}</div>`;
            }

            if (total > 0 || history.length > 0) {
                // Vis total - fremhev hvis ≥60 min
                const totalClass = total >= 60 ? 'text-green-600 font-bold' : 'font-semibold';
                html += `<div class="${totalClass}">Total: ${total} min</div>`;
            }

            infoEl.innerHTML = html;
        }

        function saveAll() {
            saveSlippComment();
            saveDogData(1);
            saveDogData(2);
            saveToStorage();

            // Oppdater rangeringen umiddelbart etter lagring
            renderRankings();
            renderPartyLists();

            // Visual feedback
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '✓ Lagret!';
            btn.classList.remove('bg-vk-600', 'hover:bg-vk-700');
            btn.classList.add('bg-green-600');

            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.remove('bg-green-600');
                btn.classList.add('bg-vk-600', 'hover:bg-vk-700');

                // Automatisk gå til neste par
                goToNextPair();
            }, 800);
        }

        // Lagre kun én hund (uten å avslutte)
        function saveDogOnly(position) {
            saveSlippComment();
            saveDogData(position);
            saveToStorage();

            renderRankings();
            renderPartyLists();

            // Visual feedback
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '✓ Lagret!';
            btn.classList.remove('bg-vk-500', 'hover:bg-vk-600');
            btn.classList.add('bg-green-500');

            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.remove('bg-green-500');
                btn.classList.add('bg-vk-500', 'hover:bg-vk-600');
            }, 800);
        }

        // Lagre én hund og avslutt den
        function saveDogAndFinish(position) {
            const dogNr = state.selectedDogs[position];
            const dog = partyList.find(d => d.nr === dogNr);

            if (!confirm(`Er du sikker på at du vil avslutte ${dog.race} ${dog.name}?`)) {
                return;
            }

            saveSlippComment();
            saveDogData(position);

            // Sett hunden som avsluttet
            state.plasseringer[dogNr] = 'avsluttet';
            delete state.tidTilGode[dogNr];

            saveToStorage();

            renderRankings();
            renderPartyLists();
            updateDogDisplays();
            updatePlacementDropdowns();

            // Visual feedback
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '✓ Avsluttet!';
            btn.classList.remove('bg-red-500', 'hover:bg-red-600');
            btn.classList.add('bg-gray-500');

            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.remove('bg-gray-500');
                btn.classList.add('bg-red-500', 'hover:bg-red-600');

                // Finn ny hund til denne posisjonen
                loadNextDogForPosition(position);
            }, 800);
        }

        // Lagre begge hunder og avslutt begge
        function saveAllAndFinishBoth() {
            const dog1Nr = state.selectedDogs[1];
            const dog2Nr = state.selectedDogs[2];
            const dog1 = partyList.find(d => d.nr === dog1Nr);
            const dog2 = partyList.find(d => d.nr === dog2Nr);

            if (!confirm(`Er du sikker på at du vil avslutte begge hunder?\n\n• ${dog1.race} ${dog1.name}\n• ${dog2.race} ${dog2.name}`)) {
                return;
            }

            saveSlippComment();
            saveDogData(1);
            saveDogData(2);

            // Sett begge som avsluttet
            state.plasseringer[dog1Nr] = 'avsluttet';
            state.plasseringer[dog2Nr] = 'avsluttet';
            delete state.tidTilGode[dog1Nr];
            delete state.tidTilGode[dog2Nr];

            saveToStorage();

            renderRankings();
            renderPartyLists();
            updateDogDisplays();
            updatePlacementDropdowns();

            // Visual feedback
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '✓ Begge avsluttet!';
            btn.classList.remove('bg-red-600', 'hover:bg-red-700');
            btn.classList.add('bg-gray-600');

            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.remove('bg-gray-600');
                btn.classList.add('bg-red-600', 'hover:bg-red-700');

                // Gå til neste par
                goToNextPair();
            }, 800);
        }

        // Last inn neste tilgjengelige hund for en gitt posisjon
        function loadNextDogForPosition(position) {
            const otherPosition = position === 1 ? 2 : 1;
            const otherDogNr = state.selectedDogs[otherPosition];

            // Finn tilgjengelige hunder (ikke plassert, ikke avsluttet, ikke den andre hunden)
            const availableDogs = partyList.filter(dog => {
                const plass = state.plasseringer[dog.nr];
                const isOtherDog = dog.nr === otherDogNr;
                return !plass && !isOtherDog;
            });

            // Prioriter hunder som ikke har tid til gode
            const regularDogs = availableDogs.filter(d => !state.tidTilGode[d.nr]);
            const ttgDogs = availableDogs.filter(d => state.tidTilGode[d.nr]);

            let nextDog = null;
            if (regularDogs.length > 0) {
                nextDog = regularDogs[0];
            } else if (ttgDogs.length > 0) {
                nextDog = ttgDogs[0];
                // Fjern fra tid til gode siden den nå er aktiv
                delete state.tidTilGode[nextDog.nr];
            }

            if (nextDog) {
                state.selectedDogs[position] = nextDog.nr;
                document.getElementById(`dog${position}Select`).value = nextDog.nr;
                updateDogDisplays();
                loadDogData(position);
                updatePlacementDropdowns();
                renderRankings();
                renderPartyLists();
                saveToStorage();
            } else {
                // Ingen flere hunder tilgjengelig
                alert('Ingen flere hunder tilgjengelig for denne posisjonen.');
            }
        }

        // Finn neste ledige par (hunder som ikke er plassert eller avsluttet)
        function getNextAvailablePair() {
            // Finn hunder som ikke er plassert, ikke har tid til gode, og ikke er avsluttet
            const availableDogs = partyList.filter(dog => {
                const plass = state.plasseringer[dog.nr];
                const hasTidTilGode = state.tidTilGode[dog.nr];
                const isCurrentlySelected = dog.nr === state.selectedDogs[1] || dog.nr === state.selectedDogs[2];

                // Hund er tilgjengelig hvis den ikke er plassert, ikke har tid til gode, og ikke er valgt nå
                return !plass && !hasTidTilGode && !isCurrentlySelected;
            });

            // Returner de to første ledige hundene
            if (availableDogs.length >= 2) {
                return [availableDogs[0].nr, availableDogs[1].nr];
            } else if (availableDogs.length === 1) {
                // Bare én hund igjen - sjekk om det er hunder med tid til gode
                const ttgDogs = Object.entries(state.tidTilGode)
                    .filter(([_, has]) => has)
                    .map(([nr]) => parseInt(nr));
                if (ttgDogs.length > 0) {
                    return [availableDogs[0].nr, ttgDogs[0]];
                }
                return [availableDogs[0].nr, null];
            }

            // Ingen vanlige hunder igjen - sjekk tid til gode
            const ttgDogs = Object.entries(state.tidTilGode)
                .filter(([_, has]) => has)
                .map(([nr]) => parseInt(nr));

            if (ttgDogs.length >= 2) {
                return [ttgDogs[0], ttgDogs[1]];
            } else if (ttgDogs.length === 1) {
                return [ttgDogs[0], null];
            }

            return [null, null];
        }

        function goToNextPair() {
            const [nextDog1, nextDog2] = getNextAvailablePair();

            if (nextDog1 === null && nextDog2 === null) {
                // Ingen flere hunder - vis melding
                alert('Alle hunder er bedømt eller avsluttet!');
                return;
            }

            // Øk slipp-nummer
            state.currentSlipp++;
            updateSlippLabels();

            // Sett nye hunder
            if (nextDog1 !== null) {
                state.selectedDogs[1] = nextDog1;
                document.getElementById('dog1Select').value = nextDog1;
                // Fjern fra tid til gode hvis den var der
                delete state.tidTilGode[nextDog1];
            }

            if (nextDog2 !== null) {
                state.selectedDogs[2] = nextDog2;
                document.getElementById('dog2Select').value = nextDog2;
                // Fjern fra tid til gode hvis den var der
                delete state.tidTilGode[nextDog2];
            }

            // Oppdater visning
            updateDogDisplays();
            loadSlippComment();
            loadDogData(1);
            loadDogData(2);
            updatePlacementDropdowns();
            renderPartyLists();
            renderRankings();

            // Nullstill input-feltene for nye hunder
            [1, 2].forEach(pos => {
                const dogNr = state.selectedDogs[pos];
                const data = state.dogData[dogNr];
                const slippData = data?.slipps?.[state.currentSlipp];

                // Hvis ingen data for dette slippet, tøm feltene
                if (!slippData) {
                    document.getElementById(`dog${pos}_fmr`).value = '';
                    document.getElementById(`dog${pos}_fur`).value = '';
                    document.getElementById(`dog${pos}_slat`).value = '';
                    document.getElementById(`dog${pos}_sjanse`).value = '';
                    document.getElementById(`dog${pos}_ts`).value = '';
                    document.getElementById(`dog${pos}_apport`).value = '';
                    document.getElementById(`dog${pos}_slipptid`).value = '';
                }

                // Oppdater slipptid-visning (viser historikk fra tidligere slipp)
                updateSlipptidDisplay(pos);
            });

            saveToStorage();
        }

        function nextSlipp() {
            // Save current slipp data
            saveSlippComment();
            saveDogData(1);
            saveDogData(2);
            saveToStorage();

            // Gå til neste par (samme logikk som "Lagre begge hunder")
            goToNextPair();
        }

        // Beregn gyldige plasseringer basert på nåværende liste
        function getValidPlacements(excludeDogNr = null) {
            // Finn alle plasserte hunder (unntatt excludeDogNr)
            const currentPlacements = Object.entries(state.plasseringer)
                .filter(([nr, p]) => p !== 'avsluttet' && parseInt(nr) !== excludeDogNr)
                .map(([_, p]) => parseInt(p))
                .sort((a, b) => a - b);

            // Antall plasserte hunder
            const count = currentPlacements.length;

            // Gyldige plasseringer: 1 til (count + 2) for de to hundene som bedømmes
            // Men maks 20
            const maxPlacement = Math.min(count + 2, 20);

            return Array.from({ length: maxPlacement }, (_, i) => i + 1);
        }

        // Oppdater plassering-dropdown med gyldige valg
        function updatePlacementDropdowns() {
            [1, 2].forEach(pos => {
                const dogNr = state.selectedDogs[pos];
                const select = document.getElementById(`dog${pos}_plassering`);
                const currentValue = state.plasseringer[dogNr];

                // Beregn gyldige plasseringer (ekskluder denne hunden fra beregningen)
                const validPlacements = getValidPlacements(dogNr);

                // Bygg dropdown options
                let options = '<option value="">-- Velg --</option>';
                validPlacements.forEach(p => {
                    options += `<option value="${p}">${p}. plass</option>`;
                });
                options += '<option value="tid_til_gode" class="text-amber-600">Tid til gode</option>';
                options += '<option value="avsluttet" class="text-red-600">Avslutt</option>';

                select.innerHTML = options;

                // Sett tilbake verdien hvis den fortsatt er gyldig
                if (currentValue && currentValue !== 'avsluttet') {
                    select.value = currentValue;
                } else if (currentValue === 'avsluttet') {
                    select.value = 'avsluttet';
                }
            });
        }

        function setPlassering(position) {
            const dogNr = state.selectedDogs[position];
            const select = document.getElementById(`dog${position}_plassering`);
            const value = select.value;

            if (!value) {
                delete state.plasseringer[dogNr];
            } else if (value === 'tid_til_gode') {
                // Merk som tid til gode
                state.tidTilGode[dogNr] = true;
                delete state.plasseringer[dogNr];
                // Oppdater checkbox
                const checkbox = document.getElementById(`dog${position}_tidtilgode`);
                if (checkbox) checkbox.checked = true;
            } else if (value !== 'avsluttet') {
                const newPlass = parseInt(value);

                // Skyv ned alle hunder som er på denne plassen eller lavere
                const toShift = Object.entries(state.plasseringer)
                    .filter(([nr, p]) => p !== 'avsluttet' && parseInt(p) >= newPlass && parseInt(nr) !== dogNr)
                    .sort((a, b) => parseInt(b[1]) - parseInt(a[1])); // Sorter synkende for å unngå konflikter

                toShift.forEach(([nr, p]) => {
                    state.plasseringer[parseInt(nr)] = String(parseInt(p) + 1);
                });

                // Sett ny plassering
                state.plasseringer[dogNr] = value;
                // Fjern fra tid til gode hvis plassert
                delete state.tidTilGode[dogNr];
            } else {
                state.plasseringer[dogNr] = 'avsluttet';
                // Fjern fra tid til gode hvis avsluttet
                delete state.tidTilGode[dogNr];
            }

            saveToStorage();
            renderRankings();
            renderPartyLists();
            updateDogDisplays();
            updatePlacementDropdowns();
        }

        function setTidTilGode(position) {
            const dogNr = state.selectedDogs[position];
            const checkbox = document.getElementById(`dog${position}_tidtilgode`);

            if (checkbox.checked) {
                state.tidTilGode[dogNr] = true;
                // Fjern plassering hvis den hadde en
                delete state.plasseringer[dogNr];
                document.getElementById(`dog${position}_plassering`).value = '';
            } else {
                delete state.tidTilGode[dogNr];
            }

            saveToStorage();
            updatePlacementDropdowns();
            renderRankings();
            renderPartyLists();
        }

        // Hent tilbake en hund med tid til gode - sett den som aktiv hund på angitt posisjon
        function hentTilbakeTTG(dogNr, position) {
            // Lagre nåværende data først
            saveDogData(position);

            // Fjern tid til gode status
            delete state.tidTilGode[dogNr];

            // Sett denne hunden som aktiv på angitt posisjon
            state.selectedDogs[position] = dogNr;

            // Oppdater dropdown
            document.getElementById(`dog${position}Select`).value = dogNr;

            // Oppdater visning
            updateDogDisplays();
            loadDogData(position);
            updatePlacementDropdowns();
            renderRankings();
            renderPartyLists();
            saveToStorage();
        }

        function renderPartyLists() {
            [1, 2].forEach(pos => {
                const container = document.getElementById(`dog${pos}_partyList`);
                container.innerHTML = partyList.map(dog => {
                    const plass = state.plasseringer[dog.nr];
                    const hasTidTilGode = state.tidTilGode[dog.nr];
                    const isSelected = dog.nr === state.selectedDogs[1] || dog.nr === state.selectedDogs[2];
                    const isFinished = plass === 'avsluttet';

                    let status = '';
                    if (plass && plass !== 'avsluttet') status = `<span class="text-vk-600 font-bold">${plass}.</span>`;
                    else if (hasTidTilGode) status = '<span class="text-amber-500 font-bold">TTG</span>';
                    else if (isFinished) status = '<span class="text-red-500">×</span>';

                    return `<div class="flex justify-between ${isSelected ? 'font-semibold text-vk-700' : ''} ${isFinished ? 'opacity-50 line-through' : ''}"}>
                        <span>${dog.nr}. ${dog.race} ${dog.name}</span>
                        ${status}
                    </div>`;
                }).join('');
            });
        }

        // Hent samlet statistikk for en hund (summert over alle slipp)
        function getDogStats(dogNr) {
            const data = state.dogData[dogNr];
            if (!data || !data.slipps) return null;

            const stats = { fmr: 0, fur: 0, slatt: 0, sjanse: 0, ts: 0 };

            Object.values(data.slipps).forEach(slipp => {
                if (slipp.fmr) stats.fmr += slipp.fmr;
                if (slipp.fur) stats.fur += slipp.fur;
                if (slipp.slat) stats.slatt += slipp.slat;
                if (slipp.sjanse) stats.sjanse += slipp.sjanse;
                if (slipp.ts) stats.ts += slipp.ts;
            });

            return stats;
        }

        // Formater statistikk som kort tekst (f.eks. "2xFMR FUR 65'" - kun "2x" hvis mer enn 1)
        function formatDogStats(dogNr) {
            const stats = getDogStats(dogNr);
            const totalSlipptid = getTotalSlipptid(dogNr);

            const parts = [];

            // Vis slipptid først (viktig for VK)
            if (totalSlipptid > 0) {
                const slipptidClass = totalSlipptid >= 60 ? 'text-green-600' : '';
                parts.push(`<span class="${slipptidClass}">${totalSlipptid}'</span>`);
            }

            if (stats) {
                if (stats.fmr > 0) parts.push(stats.fmr > 1 ? `${stats.fmr}xFMR` : 'FMR');
                if (stats.fur > 0) parts.push(stats.fur > 1 ? `${stats.fur}xFUR` : 'FUR');
                if (stats.slatt > 0) parts.push(stats.slatt > 1 ? `${stats.slatt}xSlått` : 'Slått');
                if (stats.sjanse > 0) parts.push(stats.sjanse > 1 ? `${stats.sjanse}xSj` : 'Sj');
                if (stats.ts > 0) parts.push(stats.ts > 1 ? `${stats.ts}xTS` : 'TS');
            }

            return parts.join(' ');
        }

        function renderRankings() {
            // Plasserte hunder (sortert etter plassering)
            const placed = Object.entries(state.plasseringer)
                .filter(([_, p]) => p !== 'avsluttet')
                .sort((a, b) => parseInt(a[1]) - parseInt(b[1]))
                .map(([nr, plass]) => {
                    const dog = partyList.find(d => d.nr === parseInt(nr));
                    return { dog, plass: parseInt(plass), dogNr: parseInt(nr) };
                });

            // Hunder med tid til gode (ikke plassert, ikke avsluttet)
            const tidTilGodeDogs = Object.entries(state.tidTilGode)
                .filter(([_, hasTid]) => hasTid)
                .map(([nr]) => ({ dog: partyList.find(d => d.nr === parseInt(nr)), dogNr: parseInt(nr) }))
                .filter(item => item.dog); // Fjern undefined

            // Avsluttede hunder
            const finished = Object.entries(state.plasseringer)
                .filter(([_, p]) => p === 'avsluttet')
                .map(([nr]) => ({ dog: partyList.find(d => d.nr === parseInt(nr)), dogNr: parseInt(nr) }));

            [1, 2].forEach(pos => {
                const rankContainer = document.getElementById(`dog${pos}_ranking`);
                const tidTilGodeSection = document.getElementById(`dog${pos}_tidtilgode_section`);
                const tidTilGodeList = document.getElementById(`dog${pos}_tidtilgodeList`);
                const finishedSection = document.getElementById(`dog${pos}_finished`);
                const finishedList = document.getElementById(`dog${pos}_finishedList`);

                // Rangerte hunder
                if (placed.length === 0) {
                    rankContainer.innerHTML = '<span class="text-bark-400 italic">Ingen ennå</span>';
                } else {
                    rankContainer.innerHTML = placed.map(({ dog, plass, dogNr }) => {
                        const stats = formatDogStats(dogNr);
                        const statsHtml = stats ? `<span class="text-vk-500 ml-1">${stats}</span>` : '';
                        return `<div><span class="font-bold text-vk-700">${plass}.</span> ${dog.race} ${dog.name}${statsHtml}</div>`;
                    }).join('');
                }

                // Tid til gode - klikkbare for å hente tilbake hund
                if (tidTilGodeDogs.length > 0) {
                    tidTilGodeSection.classList.remove('hidden');
                    tidTilGodeList.innerHTML = tidTilGodeDogs.map(({ dog, dogNr }) => {
                        const stats = formatDogStats(dogNr);
                        const statsHtml = stats ? `<span class="text-amber-500 ml-1">${stats}</span>` : '';
                        return `<div class="cursor-pointer hover:bg-amber-100 px-1 rounded flex items-center gap-1" onclick="hentTilbakeTTG(${dog.nr}, ${pos})">
                            <span class="text-amber-600">↩</span> ${dog.race} ${dog.name}${statsHtml}
                        </div>`;
                    }).join('');
                } else {
                    tidTilGodeSection.classList.add('hidden');
                }

                // Avsluttede
                if (finished.length > 0) {
                    finishedSection.classList.remove('hidden');
                    finishedList.innerHTML = finished.map(({ dog, dogNr }) => {
                        const stats = formatDogStats(dogNr);
                        const statsHtml = stats ? `<span class="text-red-400 ml-1">${stats}</span>` : '';
                        return `<div>${dog.race} ${dog.name}${statsHtml}</div>`;
                    }).join('');
                } else {
                    finishedSection.classList.add('hidden');
                }
            });
        }

        // Zoom functionality
        let currentZoom = 0; // 0 = both, 1 = dog1, 2 = dog2

        // SVG paths for zoom icons
        const zoomInPath = 'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7';
        const zoomOutPath = 'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7';

        function updateZoomIcons() {
            const icon1 = document.getElementById('zoomIcon1');
            const icon2 = document.getElementById('zoomIcon2');
            const btn1 = document.getElementById('zoomBtn1');
            const btn2 = document.getElementById('zoomBtn2');

            if (currentZoom === 1) {
                // Hund 1 er zoomet - vis zoom-ut ikon
                icon1.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${zoomOutPath}"/>`;
                icon2.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${zoomInPath}"/>`;
                btn1.classList.add('bg-emerald-600', 'hover:bg-emerald-700');
                btn1.classList.remove('bg-vk-600', 'hover:bg-vk-700');
                btn2.classList.remove('bg-emerald-600', 'hover:bg-emerald-700');
                btn2.classList.add('bg-vk-600', 'hover:bg-vk-700');
            } else if (currentZoom === 2) {
                // Hund 2 er zoomet - vis zoom-ut ikon
                icon1.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${zoomInPath}"/>`;
                icon2.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${zoomOutPath}"/>`;
                btn2.classList.add('bg-emerald-600', 'hover:bg-emerald-700');
                btn2.classList.remove('bg-vk-600', 'hover:bg-vk-700');
                btn1.classList.remove('bg-emerald-600', 'hover:bg-emerald-700');
                btn1.classList.add('bg-vk-600', 'hover:bg-vk-700');
            } else {
                // Begge vises - vis zoom-inn ikon på begge
                icon1.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${zoomInPath}"/>`;
                icon2.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${zoomInPath}"/>`;
                btn1.classList.remove('bg-emerald-600', 'hover:bg-emerald-700');
                btn1.classList.add('bg-vk-600', 'hover:bg-vk-700');
                btn2.classList.remove('bg-emerald-600', 'hover:bg-emerald-700');
                btn2.classList.add('bg-vk-600', 'hover:bg-vk-700');
            }
        }

        function toggleZoom(position) {
            const mainContainer = document.getElementById('mainContainer');
            const panel1 = document.getElementById('dogPanel1');
            const panel2 = document.getElementById('dogPanel2');

            // Hvis vi klikker på samme som er zoomet, zoom ut
            if (currentZoom === position) {
                currentZoom = 0;
                mainContainer.classList.remove('zoom-mode');
                panel1.classList.remove('zoomed');
                panel2.classList.remove('zoomed');
            } else if (position === 1) {
                // Zoom hund 1
                currentZoom = 1;
                mainContainer.classList.add('zoom-mode');
                panel1.classList.add('zoomed');
                panel2.classList.remove('zoomed');
                window.scrollTo(0, 0);
            } else if (position === 2) {
                // Zoom hund 2
                currentZoom = 2;
                mainContainer.classList.add('zoom-mode');
                panel1.classList.remove('zoomed');
                panel2.classList.add('zoomed');
                window.scrollTo(0, 0);
            }

            updateZoomIcons();
        }

        // Swipe gestures for zoom navigation
        let touchStartX = 0;
        let touchEndX = 0;

        function handleSwipeGesture() {
            const swipeThreshold = 50;
            const diff = touchStartX - touchEndX;

            if (Math.abs(diff) < swipeThreshold) return;

            if (currentZoom === 1 && diff > 0) {
                // Swiped left while on dog1 -> go to dog2
                toggleZoom(2);
            } else if (currentZoom === 2 && diff < 0) {
                // Swiped right while on dog2 -> go to dog1
                toggleZoom(1);
            }
        }

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipeGesture();
        });

        // Dictation
        let recognition = null;
        let activeTextarea = null;

        function setupDictation() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const btn = document.getElementById('dictationBtn');
            const textarea = document.getElementById('slippComment');

            if (!SpeechRecognition) {
                if (btn) {
                    btn.classList.add('opacity-50');
                    btn.title = 'Diktering støttes ikke';
                }
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'nb-NO';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                if (!activeTextarea) return;
                let transcript = '';
                for (let i = 0; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                activeTextarea.value = transcript;
            };

            recognition.onend = () => {
                if (btn) {
                    btn.classList.remove('bg-red-500', 'animate-pulse');
                    btn.classList.add('bg-warm-500');
                }
                activeTextarea = null;
            };

            // Setup click handler for the single dictation button
            if (btn && textarea) {
                btn.addEventListener('click', () => {
                    if (activeTextarea === textarea) {
                        recognition.stop();
                        return;
                    }

                    if (activeTextarea) {
                        recognition.stop();
                    }

                    activeTextarea = textarea;
                    btn.classList.remove('bg-warm-500');
                    btn.classList.add('bg-red-500', 'animate-pulse');

                    try {
                        recognition.start();
                    } catch (e) {
                        console.error('Dictation error:', e);
                    }
                });
            }
        }

        // Init
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
