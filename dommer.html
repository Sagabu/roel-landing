<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dommerportal - Innlogging</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rockwell&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        forest: {
                            50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac',
                            400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d',
                            800: '#166534', 900: '#14532d',
                        },
                        earth: {
                            50: '#faf6f1', 100: '#f5ede3', 200: '#e8d5c4', 300: '#d4b896',
                            400: '#c49a6c', 500: '#b8834d', 600: '#a16b3d', 700: '#865434',
                            800: '#6e4530', 900: '#5a3a2a',
                        },
                        bark: {
                            50: '#f8f6f4', 100: '#e8e2dc', 200: '#d4c8bc', 300: '#b9a594',
                            400: '#a18a74', 500: '#8f7761', 600: '#7a6352', 700: '#635045',
                            800: '#54443c', 900: '#493c35',
                        }
                    },
                    fontFamily: { 'rockwell': ['Rockwell', 'Georgia', 'serif'] }
                }
            }
        }
    </script>
    <style>
        .font-rockwell { font-family: 'Rockwell', Georgia, serif; }
    </style>
</head>
<body class="bg-bark-100 min-h-screen flex items-center justify-center p-4">

    <!-- Login Form -->
    <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-8">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-forest-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-10 h-10 text-forest-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold font-rockwell text-bark-800">Dommerportal</h1>
            <p class="text-bark-500 mt-1">Høgkjølprøven 2026</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-bark-700 mb-2">Ditt navn</label>
                <input type="text" id="judgeName" required placeholder="F.eks. Kari Nordmann"
                    class="w-full px-4 py-3 rounded-xl border-2 border-bark-200 focus:border-forest-500 focus:ring-0 outline-none text-lg">
            </div>

            <div>
                <label class="block text-sm font-medium text-bark-700 mb-2">Dommerkode</label>
                <input type="password" id="judgeCode" required placeholder="Skriv inn din kode"
                    class="w-full px-4 py-3 rounded-xl border-2 border-bark-200 focus:border-forest-500 focus:ring-0 outline-none text-lg">
                <p class="text-xs text-bark-400 mt-1">Koden ble sendt til deg på SMS</p>
            </div>

            <button type="submit" class="w-full bg-forest-600 hover:bg-forest-700 text-white font-semibold py-4 rounded-xl text-lg transition">
                Logg inn
            </button>
        </form>

        <div class="mt-6 pt-6 border-t border-bark-200">
            <p class="text-center text-bark-400 text-sm">20.-21. september • Høgkjølen, Tynset</p>
        </div>

        <div class="mt-4 text-center">
            <a href="index.html" class="text-forest-600 hover:text-forest-700 text-sm font-medium">
                &larr; Tilbake til forsiden
            </a>
        </div>
    </div>

    <script>
        // Check if already logged in
        const savedJudge = localStorage.getItem('judgeSession');
        if (savedJudge) {
            window.location.href = 'dommer-hjem.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('judgeName').value.trim();
            const code = document.getElementById('judgeCode').value.trim();

            if (!name || !code) {
                alert('Vennligst fyll inn både navn og kode');
                return;
            }

            // Simple validation (in production this would be server-side)
            // Accept any code for demo purposes
            if (code.length < 4) {
                alert('Ugyldig kode. Sjekk at du har skrevet riktig.');
                return;
            }

            // Save session
            const session = {
                name: name,
                loggedInAt: new Date().toISOString()
            };
            localStorage.setItem('judgeSession', JSON.stringify(session));

            // Redirect to party selection
            window.location.href = 'dommer-hjem.html';
        });
    </script>
</body>
</html>
