<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dommerkort UK/AK - Test</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        warm: { 50: '#FFF7F2', 100: '#FFE1CF', 200: '#EAD8CF', 300: '#E5C9B8', 400: '#D4A989', 500: '#FD8536', 600: '#E5721F', 700: '#C45F14', 800: '#6E3018', 900: '#4A1E0D' },
                        cream: { DEFAULT: '#F7F3EE', 50: '#FFFFFF', 100: '#F7F3EE', 200: '#FFF7F2', 300: '#EAD8CF' },
                        earth: { 50: '#faf6f2', 100: '#f3ebe0', 200: '#e6d5c0', 300: '#d5b899', 400: '#c49a72', 500: '#b88255', 600: '#aa6e48', 700: '#8e583d', 800: '#734837', 900: '#5e3c2f', 950: '#321e17' },
                        bark: { 50: '#F7F3EE', 100: '#FFF7F2', 200: '#EAD8CF', 300: '#D4A989', 400: '#B8977A', 500: '#9A8268', 600: '#7D6A54', 700: '#6E3018', 800: '#5A2812', 900: '#3D1B0C' },
                        forest: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d' }
                    },
                    fontFamily: {
                        'serif': ['Playfair Display', 'Georgia', 'serif'],
                        'sans': ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        .score-input:focus { transform: scale(1.02); }
        input[type="number"] { font-size: 16px; }
        input[type="number"]::-webkit-inner-spin-button { opacity: 1; }
        .slipp-input { min-width: 36px; }
        .previous-comment { color: #9CA3AF; font-style: italic; }
    </style>
</head>
<body class="bg-cream min-h-screen font-sans">

    <!-- Test Banner -->
    <div class="bg-amber-500 text-white text-center py-2 px-4 text-sm font-medium">
        TESTMODUS - UK/AK Dommerkort
    </div>

    <!-- Header -->
    <header class="bg-gradient-to-r from-bark-700 to-bark-800 text-white sticky top-0 z-50 shadow-lg">
        <div class="px-4 py-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <a href="/" class="p-2 -ml-2 hover:bg-white/20 rounded-xl transition">
                        <img src="images/logo.png" alt="Logo" class="w-8 h-8">
                    </a>
                    <div>
                        <p class="font-bold font-serif" id="dogName">Neadalens Zlatan</p>
                        <p class="text-white/70 text-xs" id="dogInfo">ES • Roel, Aleksander • UK</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <span class="bg-white/20 px-2 py-1 rounded text-sm font-bold" id="dogNr">Nr. 1</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="p-4 pb-24">
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">

            <!-- FUGLEBEHANDLING -->
            <div class="bg-warm-50 p-4 border-b border-warm-200">
                <h3 class="text-sm font-bold text-warm-800 uppercase tracking-wider mb-3">Fuglebehandling</h3>
                <div class="grid grid-cols-3 gap-3">
                    <div class="text-center">
                        <label class="block text-xs font-medium text-bark-600 mb-1">Presisjon</label>
                        <input type="number" min="1" max="4" id="presisjon"
                            class="score-input w-full h-12 text-center text-xl font-bold rounded-xl border-2 border-warm-200 focus:border-warm-500 outline-none bg-white"
                            placeholder="1-4">
                    </div>
                    <div class="text-center">
                        <label class="block text-xs font-medium text-bark-600 mb-1">Reising</label>
                        <input type="number" min="1" max="6" id="reising"
                            class="score-input w-full h-12 text-center text-xl font-bold rounded-xl border-2 border-warm-200 focus:border-warm-500 outline-none bg-white"
                            placeholder="1-6">
                    </div>
                    <div class="flex flex-col items-center justify-end">
                        <label class="flex items-center gap-2 cursor-pointer h-12">
                            <input type="checkbox" id="godkjentReising"
                                class="w-6 h-6 rounded border-2 border-warm-300 text-warm-600 focus:ring-warm-500">
                            <span class="text-xs font-medium text-bark-600">Godkj. reis</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- KOMMENTARFELT -->
            <div class="p-4 border-b border-bark-100">
                <h3 class="text-sm font-bold text-bark-700 uppercase tracking-wider mb-2">Dommerens kommentar</h3>

                <!-- Tidligere kommentarer (grå, kursiv, ikke redigerbare) -->
                <div id="previousComments" class="space-y-2 mb-3">
                    <!-- Fylles dynamisk -->
                </div>

                <!-- Nåværende slipp kommentar -->
                <div>
                    <label class="block text-xs text-bark-500 mb-1" id="currentSlippLabel">Slipp 1:</label>
                    <textarea id="currentComment" rows="3"
                        class="w-full px-3 py-2 rounded-xl border-2 border-bark-200 focus:border-warm-500 outline-none text-sm resize-none"
                        placeholder="Skriv kommentar for dette slippet..."></textarea>
                </div>
            </div>

            <!-- STATISTIKK-TABELL -->
            <div class="p-4">
                <h3 class="text-sm font-bold text-bark-700 uppercase tracking-wider mb-3">Statistikk per slipp</h3>

                <!-- Scrollbar container for mobil -->
                <div class="overflow-x-auto -mx-4 px-4">
                    <table class="w-full text-sm" style="min-width: 600px;">
                        <thead>
                            <tr class="border-b-2 border-bark-200">
                                <th class="text-left py-2 px-1 font-semibold text-bark-600 w-28"></th>
                                <th class="text-center py-2 px-1 font-medium text-bark-500 w-10">S1</th>
                                <th class="text-center py-2 px-1 font-medium text-bark-500 w-10">S2</th>
                                <th class="text-center py-2 px-1 font-medium text-bark-500 w-10">S3</th>
                                <th class="text-center py-2 px-1 font-medium text-bark-500 w-10">S4</th>
                                <th class="text-center py-2 px-1 font-medium text-bark-500 w-10">S5</th>
                                <th class="text-center py-2 px-1 font-medium text-bark-500 w-10">S6</th>
                                <th class="text-center py-2 px-1 font-medium text-bark-500 w-10">S7</th>
                                <th class="text-center py-2 px-1 font-medium text-bark-500 w-10">S8</th>
                                <th class="text-center py-2 px-1 font-medium text-bark-500 w-10">S9</th>
                                <th class="text-center py-2 px-1 font-bold text-bark-700 w-12 bg-bark-50">Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Slipptid -->
                            <tr class="border-b border-bark-100 bg-amber-50">
                                <td class="py-2 px-1 font-medium text-amber-700">Slipptid (min)</td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="slipptid" data-slipp="1" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-amber-200 focus:border-amber-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="slipptid" data-slipp="2" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-amber-200 focus:border-amber-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="slipptid" data-slipp="3" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-amber-200 focus:border-amber-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="slipptid" data-slipp="4" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-amber-200 focus:border-amber-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="slipptid" data-slipp="5" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-amber-200 focus:border-amber-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="slipptid" data-slipp="6" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-amber-200 focus:border-amber-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="slipptid" data-slipp="7" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-amber-200 focus:border-amber-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="slipptid" data-slipp="8" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-amber-200 focus:border-amber-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="slipptid" data-slipp="9" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-amber-200 focus:border-amber-500 outline-none"></td>
                                <td class="py-1 px-0.5 bg-bark-50"><span data-total="slipptid" class="block w-full h-8 leading-8 text-center text-sm font-bold text-bark-800">0</span></td>
                            </tr>
                            <!-- Stand m/makker -->
                            <tr class="border-b border-bark-100">
                                <td class="py-2 px-1 font-medium text-bark-600">Stand m/makker</td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_m" data-slipp="1" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_m" data-slipp="2" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_m" data-slipp="3" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_m" data-slipp="4" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_m" data-slipp="5" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_m" data-slipp="6" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_m" data-slipp="7" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_m" data-slipp="8" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_m" data-slipp="9" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5 bg-bark-50"><span data-total="stand_m" class="block w-full h-8 leading-8 text-center text-sm font-bold text-bark-800">0</span></td>
                            </tr>
                            <!-- Stand u/makker -->
                            <tr class="border-b border-bark-100">
                                <td class="py-2 px-1 font-medium text-bark-600">Stand u/makker</td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_u" data-slipp="1" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_u" data-slipp="2" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_u" data-slipp="3" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_u" data-slipp="4" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_u" data-slipp="5" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_u" data-slipp="6" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>

                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_u" data-slipp="8" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_u" data-slipp="9" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5 bg-bark-50"><span data-total="stand_u" class="block w-full h-8 leading-8 text-center text-sm font-bold text-bark-800">0</span></td>
                            </tr>
                            <!-- Tomstand -->
                            <tr class="border-b border-bark-100">
                                <td class="py-2 px-1 font-medium text-bark-600">Tomstand</td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="tomstand" data-slipp="1" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="tomstand" data-slipp="2" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="tomstand" data-slipp="3" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="tomstand" data-slipp="4" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="tomstand" data-slipp="5" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="tomstand" data-slipp="6" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="tomstand" data-slipp="7" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="tomstand" data-slipp="8" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="tomstand" data-slipp="9" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>

                            </tr>
                            <!-- Makkers stand -->
                            <tr class="border-b border-bark-100">
                                <td class="py-2 px-1 font-medium text-bark-600">Makkers stand</td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="makker_stand" data-slipp="1" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="makker_stand" data-slipp="2" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="makker_stand" data-slipp="3" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="makker_stand" data-slipp="4" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="makker_stand" data-slipp="5" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="makker_stand" data-slipp="6" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>

                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="makker_stand" data-slipp="9" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5 bg-bark-50"><span data-total="makker_stand" class="block w-full h-8 leading-8 text-center text-sm font-bold text-bark-800">0</span></td>
                            </tr>
                            <!-- Sjanse på fugl -->
                            <tr class="border-b border-bark-100">
                                <td class="py-2 px-1 font-medium text-bark-600">Sjanse på fugl</td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="sjanse" data-slipp="1" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>

                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="sjanse" data-slipp="3" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="sjanse" data-slipp="4" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>

                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="sjanse" data-slipp="6" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>

                    </table>
                </div>
            </div>

            <!-- Slipp-velger -->
            <div class="p-4 bg-bark-50 border-t border-bark-200">
                <div class="flex items-center justify-between">
                    <span class="text-sm font-medium text-bark-600">Aktivt slipp:</span>
                    <div class="flex gap-2" id="slippSelector">
                        <!-- Genereres av JavaScript -->
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Bottom action bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-bark-200 shadow-lg z-40 p-4">
        <div class="flex gap-3">
            <button onclick="saveData()" class="flex-1 bg-forest-600 hover:bg-forest-700 text-white py-3 rounded-xl font-semibold transition">
                Lagre
            </button>
            <button onclick="completeSlipp()" class="flex-1 bg-warm-500 hover:bg-warm-600 text-white py-3 rounded-xl font-semibold transition">
                Fullfør slipp
            </button>
        </div>
    </nav>

    <script>
        // State
        const state = {
            currentSlipp: 1,
            maxSlipp: 9,
            data: {
                fuglebehandling: {
                    presisjon: null,
                    reising: null,
                    godkjentReising: false
                },
                comments: {}, // { 1: "kommentar slipp 1", 2: "...", etc }
                slipps: {} // { field: { 1: value, 2: value, ... } }
            }
        };

        const FIELDS = ['slipptid', 'stand_m', 'stand_u', 'tomstand', 'makker_stand', 'sjanse'];

        // Initialize
        function init() {
            loadFromStorage();
            renderSlippSelector();
            renderPreviousComments();
            updateTotals();
            setupEventListeners();
        }

        // Load from localStorage
        function loadFromStorage() {
            const saved = localStorage.getItem('dommertest_ukak');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    state.data = { ...state.data, ...parsed };
                    state.currentSlipp = parsed.currentSlipp || 1;

                    // Populate fuglebehandling
                    if (parsed.fuglebehandling) {
                        document.getElementById('presisjon').value = parsed.fuglebehandling.presisjon || '';
                        document.getElementById('reising').value = parsed.fuglebehandling.reising || '';
                        document.getElementById('godkjentReising').checked = parsed.fuglebehandling.godkjentReising || false;
                    }

                    // Populate slipp inputs
                    FIELDS.forEach(field => {
                        if (parsed.slipps && parsed.slipps[field]) {
                            for (let s = 1; s <= 9; s++) {
                                const input = document.querySelector(`input[data-field="${field}"][data-slipp="${s}"]`);
                                if (input && parsed.slipps[field][s] !== undefined) {
                                    input.value = parsed.slipps[field][s];
                                }
                            }
                        }
                    });

                    // Current comment
                    if (parsed.comments && parsed.comments[state.currentSlipp]) {
                        document.getElementById('currentComment').value = parsed.comments[state.currentSlipp];
                    }
                } catch (e) {
                    console.error('Failed to load saved data:', e);
                }
            }
        }

        // Save to localStorage
        function saveData() {
            // Gather fuglebehandling
            state.data.fuglebehandling = {
                presisjon: document.getElementById('presisjon').value || null,
                reising: document.getElementById('reising').value || null,
                godkjentReising: document.getElementById('godkjentReising').checked
            };

            // Gather slipp data
            if (!state.data.slipps) state.data.slipps = {};
            FIELDS.forEach(field => {
                if (!state.data.slipps[field]) state.data.slipps[field] = {};
                for (let s = 1; s <= 9; s++) {
                    const input = document.querySelector(`input[data-field="${field}"][data-slipp="${s}"]`);
                    if (input && input.value) {
                        state.data.slipps[field][s] = parseInt(input.value) || 0;
                    }
                }
            });

            // Save current comment
            if (!state.data.comments) state.data.comments = {};
            state.data.comments[state.currentSlipp] = document.getElementById('currentComment').value;

            state.data.currentSlipp = state.currentSlipp;

            localStorage.setItem('dommertest_ukak', JSON.stringify(state.data));

            // Visual feedback
            const btn = event.target;
            const origText = btn.textContent;
            btn.textContent = 'Lagret!';
            btn.classList.replace('bg-forest-600', 'bg-green-500');
            setTimeout(() => {
                btn.textContent = origText;
                btn.classList.replace('bg-green-500', 'bg-forest-600');
            }, 1500);
        }

        // Complete current slipp and move to next
        function completeSlipp() {
            saveData();

            if (state.currentSlipp < state.maxSlipp) {
                state.currentSlipp++;
                renderSlippSelector();
                renderPreviousComments();
                document.getElementById('currentComment').value = state.data.comments?.[state.currentSlipp] || '';
                document.getElementById('currentSlippLabel').textContent = `Slipp ${state.currentSlipp}:`;
            } else {
                alert('Alle 9 slipp er fullført!');
            }
        }

        // Render slipp selector buttons
        function renderSlippSelector() {
            const container = document.getElementById('slippSelector');
            let html = '';
            for (let s = 1; s <= state.maxSlipp; s++) {
                const isActive = s === state.currentSlipp;
                const hasData = state.data.comments?.[s] || Object.values(state.data.slipps || {}).some(f => f[s]);
                const btnClass = isActive
                    ? 'bg-warm-500 text-white'
                    : hasData
                        ? 'bg-forest-100 text-forest-700 border border-forest-300'
                        : 'bg-white text-bark-600 border border-bark-200';
                html += `<button onclick="selectSlipp(${s})" class="w-8 h-8 rounded-lg text-sm font-bold transition ${btnClass}">${s}</button>`;
            }
            container.innerHTML = html;
            document.getElementById('currentSlippLabel').textContent = `Slipp ${state.currentSlipp}:`;
        }

        // Select a specific slipp
        function selectSlipp(s) {
            // Save current comment first
            if (!state.data.comments) state.data.comments = {};
            state.data.comments[state.currentSlipp] = document.getElementById('currentComment').value;

            state.currentSlipp = s;
            renderSlippSelector();
            renderPreviousComments();
            document.getElementById('currentComment').value = state.data.comments?.[s] || '';
        }

        // Render previous comments (grå, kursiv, ikke redigerbare)
        function renderPreviousComments() {
            const container = document.getElementById('previousComments');
            let html = '';

            for (let s = 1; s < state.currentSlipp; s++) {
                const comment = state.data.comments?.[s];
                if (comment && comment.trim()) {
                    html += `
                        <div class="bg-bark-50 rounded-lg p-2 previous-comment">
                            <span class="text-xs font-medium text-bark-400">Slipp ${s}:</span>
                            <p class="text-sm">${comment}</p>
                        </div>
                    `;
                }
            }

            container.innerHTML = html;
        }

        // Update totals
        function updateTotals() {
            FIELDS.forEach(field => {
                let total = 0;
                for (let s = 1; s <= 9; s++) {
                    const input = document.querySelector(`input[data-field="${field}"][data-slipp="${s}"]`);
                    if (input && input.value) {
                        total += parseInt(input.value) || 0;
                    }
                }
                const totalSpan = document.querySelector(`span[data-total="${field}"]`);
                if (totalSpan) {
                    totalSpan.textContent = total;
                }
            });
        }

        // Setup event listeners
        function setupEventListeners() {
            // All slipp inputs should update totals
            document.querySelectorAll('input[data-field]').forEach(input => {
                input.addEventListener('input', updateTotals);
                input.addEventListener('change', updateTotals);
            });
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
