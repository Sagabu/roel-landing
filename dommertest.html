<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dommerkort UK/AK - Test</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        warm: { 50: '#FFF7F2', 100: '#FFE1CF', 200: '#EAD8CF', 300: '#E5C9B8', 400: '#D4A989', 500: '#FD8536', 600: '#E5721F', 700: '#C45F14', 800: '#6E3018', 900: '#4A1E0D' },
                        cream: { DEFAULT: '#F7F3EE', 50: '#FFFFFF', 100: '#F7F3EE', 200: '#FFF7F2', 300: '#EAD8CF' },
                        earth: { 50: '#faf6f2', 100: '#f3ebe0', 200: '#e6d5c0', 300: '#d5b899', 400: '#c49a72', 500: '#b88255', 600: '#aa6e48', 700: '#8e583d', 800: '#734837', 900: '#5e3c2f', 950: '#321e17' },
                        bark: { 50: '#F7F3EE', 100: '#FFF7F2', 200: '#EAD8CF', 300: '#D4A989', 400: '#B8977A', 500: '#9A8268', 600: '#7D6A54', 700: '#6E3018', 800: '#5A2812', 900: '#3D1B0C' },
                        forest: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d' }
                    },
                    fontFamily: {
                        'serif': ['Playfair Display', 'Georgia', 'serif'],
                        'sans': ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        .score-input:focus { transform: scale(1.02); }
        input[type="number"] { font-size: 16px; }
        input[type="number"]::-webkit-inner-spin-button { opacity: 1; }
        .slipp-input { min-width: 36px; }
        .previous-comment { color: #9CA3AF; font-style: italic; }
        .slipp-completed { background-color: #E5E7EB !important; color: #9CA3AF !important; pointer-events: none; }
        .slipp-header-completed { background-color: #E5E7EB !important; color: #9CA3AF !important; }
    </style>
</head>
<body class="bg-cream min-h-screen font-sans">

    <!-- Test Banner -->
    <div class="bg-amber-500 text-white text-center py-2 px-4 text-sm font-medium">
        TESTMODUS - UK/AK Dommerkort
    </div>

    <!-- Header -->
    <header class="bg-gradient-to-r from-bark-700 to-bark-800 text-white sticky top-0 z-50 shadow-lg">
        <div class="px-4 py-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <a href="/" class="p-2 -ml-2 hover:bg-white/20 rounded-xl transition">
                        <img src="images/logo.png" alt="Logo" class="w-8 h-8">
                    </a>
                    <div>
                        <p class="font-bold font-serif" id="dogName">Neadalens Zlatan</p>
                        <p class="text-white/70 text-xs" id="dogInfo">ES • Roel, Aleksander • UK</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <span class="bg-white/20 px-2 py-1 rounded text-sm font-bold" id="dogNr">Nr. 1</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Dog Navigation Bar -->
    <div class="bg-bark-100 border-b border-bark-200 px-2 py-2">
        <div class="flex items-center justify-between gap-2">
            <!-- Left dog (current pair partner) -->
            <button onclick="switchToDog(1)" id="dogLeftBtn" class="flex-1 bg-white hover:bg-bark-50 border border-bark-300 rounded-xl px-3 py-2 text-left transition shadow-sm">
                <span class="text-xs text-bark-500 block">Hund 1</span>
                <span class="text-sm font-semibold text-bark-800 truncate block" id="dogLeftName">ES Zlatan</span>
                <span class="text-xs text-bark-500 block" id="dogLeftKlasse">(UK)</span>
            </button>

            <!-- Party list button -->
            <button onclick="showPartyList()" class="bg-bark-700 hover:bg-bark-600 text-white rounded-xl px-4 py-2 font-medium transition shadow-sm">
                Partiliste
            </button>

            <!-- Right dog (current pair partner) -->
            <button onclick="switchToDog(2)" id="dogRightBtn" class="flex-1 bg-white hover:bg-bark-50 border border-bark-300 rounded-xl px-3 py-2 text-right transition shadow-sm">
                <span class="text-xs text-bark-500 block">Hund 2</span>
                <span class="text-sm font-semibold text-bark-800 truncate block" id="dogRightName">IS Braut</span>
                <span class="text-xs text-bark-500 block" id="dogRightKlasse">(UK)</span>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <main class="p-4 pb-24">
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">

            <!-- FUGLEBEHANDLING -->
            <div class="bg-warm-50 p-4 border-b border-warm-200">
                <h3 class="text-sm font-bold text-warm-800 uppercase tracking-wider mb-3">Fuglebehandling</h3>
                <div class="grid grid-cols-3 gap-3">
                    <div class="text-center">
                        <label class="block text-xs font-medium text-bark-600 mb-1">Presisjon</label>
                        <input type="number" min="1" max="4" id="presisjon"
                            class="score-input w-full h-12 text-center text-xl font-bold rounded-xl border-2 border-warm-200 focus:border-warm-500 outline-none bg-white"
                            placeholder="1-4">
                    </div>
                    <div class="text-center">
                        <label class="block text-xs font-medium text-bark-600 mb-1">Reising</label>
                        <input type="number" min="1" max="6" id="reising"
                            class="score-input w-full h-12 text-center text-xl font-bold rounded-xl border-2 border-warm-200 focus:border-warm-500 outline-none bg-white"
                            placeholder="1-6">
                    </div>
                    <div class="flex flex-col items-center justify-end">
                        <label class="flex items-center gap-2 cursor-pointer h-12">
                            <input type="checkbox" id="godkjentReising"
                                class="w-6 h-6 rounded border-2 border-warm-300 text-warm-600 focus:ring-warm-500">
                            <span class="text-xs font-medium text-bark-600">Godkj. reis</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- KOMMENTARFELT -->
            <div class="p-4 border-b border-bark-100">
                <h3 class="text-sm font-bold text-bark-700 uppercase tracking-wider mb-2">Dommerens kommentar</h3>

                <!-- Tidligere kommentarer (grå, kursiv, ikke redigerbare) -->
                <div id="previousComments" class="space-y-2 mb-3">
                    <!-- Fylles dynamisk -->
                </div>

                <!-- Nåværende slipp kommentar -->
                <div>
                    <label class="block text-xs text-bark-500 mb-1" id="currentSlippLabel">Slipp 1:</label>
                    <textarea id="currentComment" rows="3"
                        class="w-full px-3 py-2 rounded-xl border-2 border-bark-200 focus:border-warm-500 outline-none text-sm resize-none"
                        placeholder="Skriv kommentar for dette slippet..."></textarea>
                </div>
            </div>

            <!-- STATISTIKK-TABELL -->
            <div class="p-4">
                <h3 class="text-sm font-bold text-bark-700 uppercase tracking-wider mb-3">Statistikk per slipp</h3>

                <!-- Scrollbar container for mobil -->
                <div class="overflow-x-auto -mx-4 px-4">
                    <table class="w-full text-sm" style="min-width: 600px;">
                        <thead>
                            <tr class="border-b-2 border-bark-200">
                                <th class="text-left py-2 px-1 font-semibold text-bark-600 w-28"></th>
                                <th class="text-center py-2 px-1 font-medium text-bark-500 w-10">S1</th>
                                <th class="text-center py-2 px-1 font-medium text-bark-500 w-10">S2</th>
                                <th class="text-center py-2 px-1 font-medium text-bark-500 w-10">S3</th>
                                <th class="text-center py-2 px-1 font-medium text-bark-500 w-10">S4</th>
                                <th class="text-center py-2 px-1 font-medium text-bark-500 w-10">S5</th>
                                <th class="text-center py-2 px-1 font-medium text-bark-500 w-10">S6</th>
                                <th class="text-center py-2 px-1 font-medium text-bark-500 w-10">S7</th>
                                <th class="text-center py-2 px-1 font-medium text-bark-500 w-10">S8</th>
                                <th class="text-center py-2 px-1 font-medium text-bark-500 w-10">S9</th>
                                <th class="text-center py-2 px-1 font-bold text-bark-700 w-12 bg-bark-50">Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Slipptid -->
                            <tr class="border-b border-bark-100 bg-amber-50">
                                <td class="py-2 px-1 font-medium text-amber-700">Slipptid (min)</td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="slipptid" data-slipp="1" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-amber-200 focus:border-amber-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="slipptid" data-slipp="2" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-amber-200 focus:border-amber-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="slipptid" data-slipp="3" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-amber-200 focus:border-amber-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="slipptid" data-slipp="4" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-amber-200 focus:border-amber-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="slipptid" data-slipp="5" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-amber-200 focus:border-amber-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="slipptid" data-slipp="6" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-amber-200 focus:border-amber-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="slipptid" data-slipp="7" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-amber-200 focus:border-amber-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="slipptid" data-slipp="8" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-amber-200 focus:border-amber-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="slipptid" data-slipp="9" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-amber-200 focus:border-amber-500 outline-none"></td>
                                <td class="py-1 px-0.5 bg-bark-50"><span data-total="slipptid" class="block w-full h-8 leading-8 text-center text-sm font-bold text-bark-800">0</span></td>
                            </tr>
                            <!-- Stand m/makker -->
                            <tr class="border-b border-bark-100">
                                <td class="py-2 px-1 font-medium text-bark-600">Stand m/makker</td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_m" data-slipp="1" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_m" data-slipp="2" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_m" data-slipp="3" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_m" data-slipp="4" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_m" data-slipp="5" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_m" data-slipp="6" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_m" data-slipp="7" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_m" data-slipp="8" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_m" data-slipp="9" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5 bg-bark-50"><span data-total="stand_m" class="block w-full h-8 leading-8 text-center text-sm font-bold text-bark-800">0</span></td>
                            </tr>
                            <!-- Stand u/makker -->
                            <tr class="border-b border-bark-100">
                                <td class="py-2 px-1 font-medium text-bark-600">Stand u/makker</td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_u" data-slipp="1" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_u" data-slipp="2" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_u" data-slipp="3" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_u" data-slipp="4" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_u" data-slipp="5" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_u" data-slipp="6" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_u" data-slipp="7" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_u" data-slipp="8" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="stand_u" data-slipp="9" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5 bg-bark-50"><span data-total="stand_u" class="block w-full h-8 leading-8 text-center text-sm font-bold text-bark-800">0</span></td>
                            </tr>
                            <!-- Tomstand -->
                            <tr class="border-b border-bark-100">
                                <td class="py-2 px-1 font-medium text-bark-600">Tomstand</td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="tomstand" data-slipp="1" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="tomstand" data-slipp="2" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="tomstand" data-slipp="3" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="tomstand" data-slipp="4" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="tomstand" data-slipp="5" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="tomstand" data-slipp="6" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="tomstand" data-slipp="7" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="tomstand" data-slipp="8" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="tomstand" data-slipp="9" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5 bg-bark-50"><span data-total="tomstand" class="block w-full h-8 leading-8 text-center text-sm font-bold text-bark-800">0</span></td>
                            </tr>
                            <!-- Makkers stand -->
                            <tr class="border-b border-bark-100">
                                <td class="py-2 px-1 font-medium text-bark-600">Makkers stand</td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="makker_stand" data-slipp="1" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="makker_stand" data-slipp="2" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="makker_stand" data-slipp="3" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="makker_stand" data-slipp="4" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="makker_stand" data-slipp="5" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="makker_stand" data-slipp="6" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="makker_stand" data-slipp="7" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="makker_stand" data-slipp="8" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="makker_stand" data-slipp="9" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5 bg-bark-50"><span data-total="makker_stand" class="block w-full h-8 leading-8 text-center text-sm font-bold text-bark-800">0</span></td>
                            </tr>
                            <!-- Sjanse på fugl -->
                            <tr class="border-b border-bark-100">
                                <td class="py-2 px-1 font-medium text-bark-600">Sjanse på fugl</td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="sjanse" data-slipp="1" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="sjanse" data-slipp="2" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="sjanse" data-slipp="3" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="sjanse" data-slipp="4" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="sjanse" data-slipp="5" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="sjanse" data-slipp="6" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="sjanse" data-slipp="7" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="sjanse" data-slipp="8" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5"><input type="number" min="0" data-field="sjanse" data-slipp="9" class="slipp-input w-full h-8 text-center text-sm font-medium rounded border border-bark-200 focus:border-warm-500 outline-none"></td>
                                <td class="py-1 px-0.5 bg-bark-50"><span data-total="sjanse" class="block w-full h-8 leading-8 text-center text-sm font-bold text-bark-800">0</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- JAKTEGENSKAPER -->
            <div class="p-4 border-t border-bark-200">
                <h3 class="text-sm font-bold text-bark-700 uppercase tracking-wider mb-3">Jaktegenskaper</h3>
                <div class="space-y-2">
                    <div class="flex items-center gap-3">
                        <input type="number" min="1" max="6" id="jaktlyst" data-jakt="jaktlyst"
                            class="w-12 h-8 text-center text-sm font-bold rounded border-2 border-bark-200 focus:border-warm-500 outline-none"
                            oninput="if(this.value>6)this.value=6;if(this.value<1&&this.value!=='')this.value=1">
                        <label class="text-sm font-medium text-bark-600">Jaktlyst</label>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="number" min="1" max="6" id="fart" data-jakt="fart"
                            class="w-12 h-8 text-center text-sm font-bold rounded border-2 border-bark-200 focus:border-warm-500 outline-none"
                            oninput="if(this.value>6)this.value=6;if(this.value<1&&this.value!=='')this.value=1">
                        <label class="text-sm font-medium text-bark-600">Fart</label>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="number" min="1" max="6" id="selvstendighet" data-jakt="selvstendighet"
                            class="w-12 h-8 text-center text-sm font-bold rounded border-2 border-bark-200 focus:border-warm-500 outline-none"
                            oninput="if(this.value>6)this.value=6;if(this.value<1&&this.value!=='')this.value=1">
                        <label class="text-sm font-medium text-bark-600">Selvstendighet</label>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="number" min="1" max="6" id="soksbredde" data-jakt="soksbredde"
                            class="w-12 h-8 text-center text-sm font-bold rounded border-2 border-bark-200 focus:border-warm-500 outline-none"
                            oninput="if(this.value>6)this.value=6;if(this.value<1&&this.value!=='')this.value=1">
                        <label class="text-sm font-medium text-bark-600">Søksbredde</label>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="number" min="1" max="6" id="reviering" data-jakt="reviering"
                            class="w-12 h-8 text-center text-sm font-bold rounded border-2 border-bark-200 focus:border-warm-500 outline-none"
                            oninput="if(this.value>6)this.value=6;if(this.value<1&&this.value!=='')this.value=1">
                        <label class="text-sm font-medium text-bark-600">Reviering</label>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="number" min="1" max="6" id="samarbeid" data-jakt="samarbeid"
                            class="w-12 h-8 text-center text-sm font-bold rounded border-2 border-bark-200 focus:border-warm-500 outline-none"
                            oninput="if(this.value>6)this.value=6;if(this.value<1&&this.value!=='')this.value=1">
                        <label class="text-sm font-medium text-bark-600">Samarbeid</label>
                    </div>
                </div>
            </div>

            <!-- SEKUNDERING -->
            <div class="p-4 border-t border-bark-200">
                <h3 class="text-sm font-bold text-bark-700 uppercase tracking-wider mb-3">Sekundering</h3>
                <div class="space-y-2">
                    <div class="flex items-center gap-3">
                        <input type="number" min="0" id="sekundering_antall" data-sek="sekundering_antall"
                            class="w-12 h-8 text-center text-sm font-bold rounded border-2 border-bark-200 focus:border-warm-500 outline-none">
                        <label class="text-sm font-medium text-bark-600">Sekundering (antall)</label>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="number" min="0" id="spontan" data-sek="spontan"
                            class="w-12 h-8 text-center text-sm font-bold rounded border-2 border-bark-200 focus:border-warm-500 outline-none">
                        <label class="text-sm font-medium text-bark-600">Spontan</label>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="number" min="0" id="gar_forbi" data-sek="gar_forbi"
                            class="w-12 h-8 text-center text-sm font-bold rounded border-2 border-bark-200 focus:border-warm-500 outline-none">
                        <label class="text-sm font-medium text-bark-600">Går forbi</label>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="number" min="1" max="2" id="apport" data-sek="apport"
                            class="w-12 h-8 text-center text-sm font-bold rounded border-2 border-bark-200 focus:border-warm-500 outline-none"
                            placeholder="1/2">
                        <label class="text-sm font-medium text-bark-600">Apport <span class="text-xs text-bark-400">(1=Godkj. 2=Ikke)</span></label>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="number" min="0" id="rapport_spontan" data-sek="rapport_spontan"
                            class="w-12 h-8 text-center text-sm font-bold rounded border-2 border-bark-200 focus:border-warm-500 outline-none">
                        <label class="text-sm font-medium text-bark-600">Rapport spontan</label>
                    </div>
                </div>
            </div>

            <!-- PREMIE OG NOTAT -->
            <div class="p-4 border-t border-bark-200">
                <div class="flex items-center gap-3 mb-3">
                    <input type="number" min="0" max="3" id="premie" data-result="premie"
                        class="w-14 h-10 text-center text-xl font-bold rounded-xl border-2 border-warm-300 focus:border-warm-500 outline-none bg-warm-50"
                        placeholder="0-3">
                    <label class="text-sm font-bold text-bark-700 uppercase tracking-wider">Premie</label>
                    <input type="text" id="notatTillegg"
                        class="flex-1 h-10 px-3 rounded-xl border-2 border-bark-200 focus:border-warm-500 outline-none text-sm"
                        placeholder="Notat/tilleggsinfo...">
                </div>
            </div>

            <!-- UØNSKET ADFERD -->
            <div class="p-4 border-t-2 border-red-200 bg-red-50">
                <label class="block text-sm font-bold text-red-700 uppercase tracking-wider mb-2">Uønsket adferd (valgfritt)</label>
                <textarea id="uonsketAdferd" rows="2"
                    class="w-full px-3 py-2 rounded-xl border-2 border-red-300 focus:border-red-500 outline-none text-sm resize-none bg-white"
                    placeholder="Beskriv eventuell uønsket adferd..."></textarea>
            </div>

        </div>
    </main>

    <!-- Bottom action bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-bark-200 shadow-lg z-40 p-4">
        <div class="flex gap-3">
            <button onclick="saveData()" id="saveBtn" class="flex-1 bg-forest-600 hover:bg-forest-700 text-white py-3 rounded-xl font-semibold transition">
                Lagre slipp 1
            </button>
            <button onclick="finishDog()" class="flex-1 bg-warm-500 hover:bg-warm-600 text-white py-3 rounded-xl font-semibold transition">
                Lagre slipp og avslutt hund
            </button>
        </div>
    </nav>

    <script>
        // State
        const state = {
            currentSlipp: 1,
            maxSlipp: 9,
            data: {
                fuglebehandling: {
                    presisjon: null,
                    reising: null,
                    godkjentReising: false
                },
                comments: {}, // { 1: "kommentar slipp 1", 2: "...", etc }
                slipps: {}, // { field: { 1: value, 2: value, ... } }
                jaktegenskaper: {},
                sekundering: {},
                premie: null,
                notatTillegg: '',
                uonsketAdferd: ''
            }
        };

        const FIELDS = ['slipptid', 'stand_m', 'stand_u', 'tomstand', 'makker_stand', 'sjanse'];
        const JAKT_FIELDS = ['jaktlyst', 'fart', 'selvstendighet', 'soksbredde', 'reviering', 'samarbeid'];
        const SEK_FIELDS = ['sekundering_antall', 'spontan', 'gar_forbi', 'apport', 'rapport_spontan'];

        // Initialize
        function init() {
            loadFromStorage();
            renderPreviousComments();
            updateTotals();
            setupEventListeners();
            updateCompletedSlipps();
            updateSaveButtonText();
            document.getElementById('currentSlippLabel').textContent = `Slipp ${state.currentSlipp}:`;
        }

        // Load from localStorage
        function loadFromStorage() {
            const saved = localStorage.getItem('dommertest_ukak');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    state.data = { ...state.data, ...parsed };
                    state.currentSlipp = parsed.currentSlipp || 1;

                    // Populate fuglebehandling
                    if (parsed.fuglebehandling) {
                        document.getElementById('presisjon').value = parsed.fuglebehandling.presisjon || '';
                        document.getElementById('reising').value = parsed.fuglebehandling.reising || '';
                        document.getElementById('godkjentReising').checked = parsed.fuglebehandling.godkjentReising || false;
                    }

                    // Populate slipp inputs
                    FIELDS.forEach(field => {
                        if (parsed.slipps && parsed.slipps[field]) {
                            for (let s = 1; s <= 9; s++) {
                                const input = document.querySelector(`input[data-field="${field}"][data-slipp="${s}"]`);
                                if (input && parsed.slipps[field][s] !== undefined) {
                                    input.value = parsed.slipps[field][s];
                                }
                            }
                        }
                    });

                    // Current comment
                    if (parsed.comments && parsed.comments[state.currentSlipp]) {
                        document.getElementById('currentComment').value = parsed.comments[state.currentSlipp];
                    }
                } catch (e) {
                    console.error('Failed to load saved data:', e);
                }
            }
        }

        // Save to localStorage and move to next slipp
        function saveData() {
            // Check if slipptid is filled for current slipp
            const slipptidInput = document.querySelector(`input[data-field="slipptid"][data-slipp="${state.currentSlipp}"]`);
            if (!slipptidInput || !slipptidInput.value) {
                alert(`Du må fylle ut slipptid for slipp ${state.currentSlipp} før du kan lagre.`);
                slipptidInput?.focus();
                return;
            }

            // Gather fuglebehandling
            state.data.fuglebehandling = {
                presisjon: document.getElementById('presisjon').value || null,
                reising: document.getElementById('reising').value || null,
                godkjentReising: document.getElementById('godkjentReising').checked
            };

            // Gather slipp data
            if (!state.data.slipps) state.data.slipps = {};
            FIELDS.forEach(field => {
                if (!state.data.slipps[field]) state.data.slipps[field] = {};
                for (let s = 1; s <= 9; s++) {
                    const input = document.querySelector(`input[data-field="${field}"][data-slipp="${s}"]`);
                    if (input && input.value) {
                        state.data.slipps[field][s] = parseInt(input.value) || 0;
                    }
                }
            });

            // Save current comment
            if (!state.data.comments) state.data.comments = {};
            state.data.comments[state.currentSlipp] = document.getElementById('currentComment').value;

            // Mark this slipp as completed
            if (!state.data.completedSlipps) state.data.completedSlipps = [];
            if (!state.data.completedSlipps.includes(state.currentSlipp)) {
                state.data.completedSlipps.push(state.currentSlipp);
            }

            // Move to next slipp if not at max
            if (state.currentSlipp < state.maxSlipp) {
                state.currentSlipp++;
            }
            state.data.currentSlipp = state.currentSlipp;

            localStorage.setItem('dommertest_ukak', JSON.stringify(state.data));
            saveCurrentDogData();

            // Update UI
            updateCompletedSlipps();
            renderPreviousComments();
            document.getElementById('currentComment').value = state.data.comments?.[state.currentSlipp] || '';
            document.getElementById('currentSlippLabel').textContent = `Slipp ${state.currentSlipp}:`;
            updateSaveButtonText();

            // Visual feedback
            const btn = document.getElementById('saveBtn');
            btn.textContent = 'Lagret!';
            btn.classList.replace('bg-forest-600', 'bg-green-500');
            setTimeout(() => {
                updateSaveButtonText();
                btn.classList.replace('bg-green-500', 'bg-forest-600');
            }, 1000);

            // Show replacement dialog after saving
            const currentDog = testPartyList[currentDogIndex];
            const dogName = currentDog ? currentDog.name : 'denne hunden';
            showSlippSavedDialog(dogName);
        }

        // Show dialog after saving a slipp (not finishing dog)
        function showSlippSavedDialog(dogName) {
            // Find next dog in sequential order
            let nextSequentialIdx = -1;
            for (let i = 0; i < testPartyList.length; i++) {
                if (!isDogFinished(i) && i !== currentDogIndex) {
                    nextSequentialIdx = i;
                    break;
                }
            }

            const modal = document.createElement('div');
            modal.id = 'slippSavedModal';
            modal.className = 'fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4';

            let buttonsHtml = '';

            if (nextSequentialIdx === -1) {
                // No other dogs available
                buttonsHtml = `
                    <button onclick="closeSlippSavedDialog();"
                        class="w-full bg-forest-600 hover:bg-forest-700 text-white py-3 px-4 rounded-xl font-semibold transition">
                        Fortsett med ${dogName}
                    </button>
                `;
            } else {
                const nextDog = testPartyList[nextSequentialIdx];
                buttonsHtml = `
                    <button onclick="closeSlippSavedDialog();"
                        class="w-full bg-forest-600 hover:bg-forest-700 text-white py-3 px-4 rounded-xl font-semibold transition mb-2">
                        Fortsett med ${dogName}
                    </button>
                    <button onclick="closeSlippSavedDialog(); replaceWithNextDog(${nextSequentialIdx});"
                        class="w-full bg-warm-500 hover:bg-warm-600 text-white py-3 px-4 rounded-xl font-semibold transition mb-2">
                        <span class="block text-sm opacity-80">Erstatt med neste hund på listen:</span>
                        <span class="block">Nr. ${nextDog.nr} - ${nextDog.race} ${nextDog.name} (${nextDog.klasse})</span>
                    </button>
                    <button onclick="closeSlippSavedDialog(); showPartyListForReplace();"
                        class="w-full bg-bark-600 hover:bg-bark-500 text-white py-3 px-4 rounded-xl font-semibold transition">
                        Velg hund fra listen
                    </button>
                `;
            }

            modal.innerHTML = `
                <div class="bg-white rounded-2xl shadow-xl max-w-sm w-full overflow-hidden">
                    <div class="bg-warm-500 text-white px-4 py-3 text-center">
                        <svg class="w-8 h-8 mx-auto mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                        <h2 class="font-bold font-serif">Slipp lagret!</h2>
                    </div>
                    <div class="p-4">
                        <p class="text-center text-bark-600 mb-4">Hva vil du gjøre nå?</p>
                        ${buttonsHtml}
                    </div>
                </div>
            `;

            document.body.appendChild(modal);
        }

        function closeSlippSavedDialog() {
            document.getElementById('slippSavedModal')?.remove();
        }

        // Gray out completed slipp columns
        function updateCompletedSlipps() {
            const completedSlipps = state.data.completedSlipps || [];

            // Update header cells
            for (let s = 1; s <= 9; s++) {
                const headerCell = document.querySelector(`th:nth-child(${s + 1})`);
                if (completedSlipps.includes(s)) {
                    headerCell?.classList.add('slipp-header-completed');
                } else {
                    headerCell?.classList.remove('slipp-header-completed');
                }
            }

            // Update input cells
            FIELDS.forEach(field => {
                for (let s = 1; s <= 9; s++) {
                    const input = document.querySelector(`input[data-field="${field}"][data-slipp="${s}"]`);
                    if (input) {
                        if (completedSlipps.includes(s)) {
                            input.classList.add('slipp-completed');
                            input.disabled = true;
                        } else {
                            input.classList.remove('slipp-completed');
                            input.disabled = false;
                        }
                    }
                }
            });
        }

        // Save and finish dog
        function finishDog() {
            // Save current slipp data first
            state.data.fuglebehandling = {
                presisjon: document.getElementById('presisjon').value || null,
                reising: document.getElementById('reising').value || null,
                godkjentReising: document.getElementById('godkjentReising').checked
            };

            if (!state.data.slipps) state.data.slipps = {};
            FIELDS.forEach(field => {
                if (!state.data.slipps[field]) state.data.slipps[field] = {};
                for (let s = 1; s <= 9; s++) {
                    const input = document.querySelector(`input[data-field="${field}"][data-slipp="${s}"]`);
                    if (input && input.value) {
                        state.data.slipps[field][s] = parseInt(input.value) || 0;
                    }
                }
            });

            if (!state.data.comments) state.data.comments = {};
            state.data.comments[state.currentSlipp] = document.getElementById('currentComment').value;

            const currentDog = testPartyList[currentDogIndex];
            const dogName = currentDog ? currentDog.name : 'denne hunden';

            if (confirm(`Er du sikker på at du vil avslutte bedømmelsen av ${dogName}?`)) {
                // Mark dog as finished
                setDogFinished(currentDogIndex);
                saveCurrentDogData();

                // Show choice dialog
                showNextDogDialog(dogName);
            }
        }

        // Show dialog to choose next action after finishing a dog
        function showNextDogDialog(finishedDogName, isReplace = false) {
            // Find next dog in sequential order (not just unfinished)
            // This is used when replacing a dog in a pair
            const finishedDogIdx = currentDogIndex;

            // Find next sequential dog that hasn't been finished
            let nextSequentialIdx = -1;
            for (let i = 0; i < testPartyList.length; i++) {
                if (!isDogFinished(i) && i !== finishedDogIdx) {
                    nextSequentialIdx = i;
                    break;
                }
            }

            const modal = document.createElement('div');
            modal.id = 'nextDogModal';
            modal.className = 'fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4';

            const finishedCount = getFinishedDogs().length;
            const totalCount = testPartyList.length;
            const allFinished = nextSequentialIdx === -1;

            let buttonsHtml = '';

            if (allFinished) {
                buttonsHtml = `
                    <button onclick="closeNextDogDialog(); showPartyList();"
                        class="w-full bg-forest-600 hover:bg-forest-700 text-white py-3 px-4 rounded-xl font-semibold transition">
                        Se partiliste (alle ferdige)
                    </button>
                `;
            } else {
                const nextDog = testPartyList[nextSequentialIdx];
                buttonsHtml = `
                    <button onclick="replaceWithNextDog(${nextSequentialIdx})"
                        class="w-full bg-forest-600 hover:bg-forest-700 text-white py-3 px-4 rounded-xl font-semibold transition mb-2">
                        <span class="block text-sm opacity-80">Erstatt med neste hund på listen:</span>
                        <span class="block">Nr. ${nextDog.nr} - ${nextDog.race} ${nextDog.name} (${nextDog.klasse})</span>
                    </button>
                    <button onclick="closeNextDogDialog(); showPartyListForReplace();"
                        class="w-full bg-bark-600 hover:bg-bark-500 text-white py-3 px-4 rounded-xl font-semibold transition">
                        Velg hund fra listen
                    </button>
                `;
            }

            modal.innerHTML = `
                <div class="bg-white rounded-2xl shadow-xl max-w-sm w-full overflow-hidden">
                    <div class="bg-forest-600 text-white px-4 py-3 text-center">
                        <svg class="w-10 h-10 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                        <h2 class="font-bold font-serif text-lg">${finishedDogName}</h2>
                        <p class="text-forest-100 text-sm">Bedømmelse avsluttet</p>
                    </div>
                    <div class="p-4">
                        <p class="text-center text-bark-600 mb-4">
                            <span class="font-medium">${finishedCount} av ${totalCount}</span> hunder bedømt
                        </p>
                        ${buttonsHtml}
                    </div>
                </div>
            `;

            document.body.appendChild(modal);
            updateDogNavigation();
        }

        function closeNextDogDialog() {
            document.getElementById('nextDogModal')?.remove();
        }

        // Replace current position with next dog
        function replaceWithNextDog(idx) {
            closeNextDogDialog();
            currentDogIndex = idx;
            loadDogData(currentDogIndex);
            updateDogNavigation();
        }

        // Show party list specifically for replacing a dog
        function showPartyListForReplace() {
            showPartyList();
        }

        function selectNextDog(idx) {
            closeNextDogDialog();
            currentDogIndex = idx;
            loadDogData(currentDogIndex);
            updateDogNavigation();
        }

        // Update save button text with current slipp number
        function updateSaveButtonText() {
            const btn = document.getElementById('saveBtn');
            if (btn) {
                btn.textContent = `Lagre slipp ${state.currentSlipp}`;
            }
        }

        // Render previous comments (grå, kursiv, ikke redigerbare)
        function renderPreviousComments() {
            const container = document.getElementById('previousComments');
            let html = '';

            for (let s = 1; s < state.currentSlipp; s++) {
                const comment = state.data.comments?.[s];
                if (comment && comment.trim()) {
                    html += `
                        <div class="bg-bark-50 rounded-lg p-2 previous-comment">
                            <span class="text-xs font-medium text-bark-400">Slipp ${s}:</span>
                            <p class="text-sm">${comment}</p>
                        </div>
                    `;
                }
            }

            container.innerHTML = html;
        }

        // Update totals
        function updateTotals() {
            FIELDS.forEach(field => {
                let total = 0;
                for (let s = 1; s <= 9; s++) {
                    const input = document.querySelector(`input[data-field="${field}"][data-slipp="${s}"]`);
                    if (input && input.value) {
                        total += parseInt(input.value) || 0;
                    }
                }
                const totalSpan = document.querySelector(`span[data-total="${field}"]`);
                if (totalSpan) {
                    totalSpan.textContent = total;
                }
            });
        }

        // Setup event listeners
        function setupEventListeners() {
            // All slipp inputs should update totals
            document.querySelectorAll('input[data-field]').forEach(input => {
                input.addEventListener('input', updateTotals);
                input.addEventListener('change', updateTotals);
            });
        }

        // Parti-info (will come from backend based on judge assignment)
        const partyInfo = {
            id: 'parti-neadalen-2026',
            name: 'Neadalen',
            date: '2026-03-21',
            judge: 'Testbruker'
        };

        // Test data for party list (will come from backend in production)
        const testPartyList = [
            { nr: 1, name: 'Neadalens Zlatan', race: 'ES', owner: 'Roel, Aleksander', klasse: 'UK' },
            { nr: 2, name: 'Heggelunds Bransen', race: 'IS', owner: 'Hansen, Erik', klasse: 'UK' },
            { nr: 3, name: 'Skogstjernas Luna', race: 'ES', owner: 'Berg, Kari', klasse: 'AK' },
            { nr: 4, name: 'Fjellheimens Storm', race: 'GS', owner: 'Olsen, Per', klasse: 'AK' },
            { nr: 5, name: 'Vindens Pil', race: 'VP', owner: 'Johansen, Lise', klasse: 'UK' },
            { nr: 6, name: 'Skogens Ull', race: 'GS', owner: 'Nilsen, Anders', klasse: 'UK' },
        ];

        let currentDogIndex = 0; // Index in testPartyList

        // Track finished dogs (stored in localStorage)
        function getFinishedDogs() {
            const saved = localStorage.getItem(`finishedDogs_${partyInfo.id}`);
            return saved ? JSON.parse(saved) : [];
        }

        function setDogFinished(dogIndex) {
            const finished = getFinishedDogs();
            if (!finished.includes(dogIndex)) {
                finished.push(dogIndex);
                localStorage.setItem(`finishedDogs_${partyInfo.id}`, JSON.stringify(finished));
            }
        }

        function isDogFinished(dogIndex) {
            return getFinishedDogs().includes(dogIndex);
        }

        // Update navigation buttons based on current dog
        function updateDogNavigation() {
            const currentPairStart = Math.floor(currentDogIndex / 2) * 2;
            const dog1 = testPartyList[currentPairStart];
            const dog2 = testPartyList[currentPairStart + 1];
            const isFinished1 = isDogFinished(currentPairStart);
            const isFinished2 = isDogFinished(currentPairStart + 1);

            // Update left button
            const leftBtn = document.getElementById('dogLeftBtn');
            const leftName = document.getElementById('dogLeftName');
            const leftKlasse = document.getElementById('dogLeftKlasse');
            if (dog1) {
                const checkmark = isFinished1 ? '✓ ' : '';
                leftName.textContent = `${checkmark}${dog1.race} ${dog1.name.split(' ').pop()}`;
                leftKlasse.textContent = isFinished1 ? '(Ferdig)' : `(${dog1.klasse})`;
                leftKlasse.classList.toggle('text-forest-600', isFinished1);
                leftBtn.classList.toggle('ring-2', currentDogIndex === currentPairStart);
                leftBtn.classList.toggle('ring-warm-500', currentDogIndex === currentPairStart);
                leftBtn.classList.toggle('bg-forest-50', isFinished1 && currentDogIndex !== currentPairStart);
                leftBtn.classList.toggle('border-forest-300', isFinished1);
            }

            // Update right button
            const rightBtn = document.getElementById('dogRightBtn');
            const rightName = document.getElementById('dogRightName');
            const rightKlasse = document.getElementById('dogRightKlasse');
            if (dog2) {
                const checkmark = isFinished2 ? '✓ ' : '';
                rightName.textContent = `${checkmark}${dog2.race} ${dog2.name.split(' ').pop()}`;
                rightKlasse.textContent = isFinished2 ? '(Ferdig)' : `(${dog2.klasse})`;
                rightKlasse.classList.toggle('text-forest-600', isFinished2);
                rightBtn.classList.toggle('ring-2', currentDogIndex === currentPairStart + 1);
                rightBtn.classList.toggle('ring-warm-500', currentDogIndex === currentPairStart + 1);
                rightBtn.classList.toggle('bg-forest-50', isFinished2 && currentDogIndex !== currentPairStart + 1);
                rightBtn.classList.toggle('border-forest-300', isFinished2);
                rightBtn.disabled = false;
                rightBtn.classList.remove('opacity-50');
            } else {
                rightName.textContent = '—';
                rightKlasse.textContent = '';
                rightBtn.disabled = true;
                rightBtn.classList.add('opacity-50');
            }

            // Update header with current dog
            const currentDog = testPartyList[currentDogIndex];
            if (currentDog) {
                document.getElementById('dogName').textContent = currentDog.name;
                document.getElementById('dogInfo').textContent = `${currentDog.race} • ${currentDog.owner} • ${currentDog.klasse}`;
                document.getElementById('dogNr').textContent = `Nr. ${currentDog.nr}`;
            }
        }

        // Switch to dog 1 or 2 in current pair
        function switchToDog(position) {
            const currentPairStart = Math.floor(currentDogIndex / 2) * 2;
            const newIndex = currentPairStart + (position - 1);

            if (testPartyList[newIndex]) {
                // Save current dog data first
                saveCurrentDogData();

                currentDogIndex = newIndex;
                loadDogData(currentDogIndex);
                updateDogNavigation();
            }
        }

        // Show party list modal
        function showPartyList() {
            const modal = document.createElement('div');
            modal.id = 'partyListModal';
            modal.className = 'fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4';

            const finishedCount = getFinishedDogs().length;
            const totalCount = testPartyList.length;

            let listHtml = '';

            // Group dogs by pairs
            for (let pairIdx = 0; pairIdx < Math.ceil(testPartyList.length / 2); pairIdx++) {
                const dog1Idx = pairIdx * 2;
                const dog2Idx = pairIdx * 2 + 1;
                const dog1 = testPartyList[dog1Idx];
                const dog2 = testPartyList[dog2Idx];

                listHtml += `<div class="mb-3">
                    <p class="text-xs font-medium text-bark-500 mb-1 px-1">Par ${pairIdx + 1}</p>
                    <div class="space-y-1">`;

                // Dog 1
                if (dog1) {
                    const isActive1 = dog1Idx === currentDogIndex;
                    const isFinished1 = isDogFinished(dog1Idx);
                    listHtml += `
                        <button onclick="selectDogFromList(${dog1Idx})"
                            class="w-full text-left p-3 rounded-xl transition ${isFinished1 ? 'bg-forest-50 border-2 border-forest-300' : isActive1 ? 'bg-warm-100 border-2 border-warm-500' : 'bg-white hover:bg-bark-50 border border-bark-200'}">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-2">
                                    ${isFinished1 ? '<svg class="w-5 h-5 text-forest-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>' : ''}
                                    <span class="font-bold text-bark-800">Nr. ${dog1.nr}</span>
                                    <span class="text-bark-600">${dog1.race}</span>
                                    <span class="font-medium text-bark-800">${dog1.name}</span>
                                </div>
                                <span class="text-xs px-2 py-1 rounded ${isFinished1 ? 'bg-forest-100 text-forest-700' : 'bg-bark-100 text-bark-600'}">${isFinished1 ? 'Ferdig' : dog1.klasse}</span>
                            </div>
                            <p class="text-sm text-bark-500 mt-1 ${isFinished1 ? 'ml-7' : ''}">${dog1.owner}</p>
                        </button>`;
                }

                // Dog 2
                if (dog2) {
                    const isActive2 = dog2Idx === currentDogIndex;
                    const isFinished2 = isDogFinished(dog2Idx);
                    listHtml += `
                        <button onclick="selectDogFromList(${dog2Idx})"
                            class="w-full text-left p-3 rounded-xl transition ${isFinished2 ? 'bg-forest-50 border-2 border-forest-300' : isActive2 ? 'bg-warm-100 border-2 border-warm-500' : 'bg-white hover:bg-bark-50 border border-bark-200'}">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-2">
                                    ${isFinished2 ? '<svg class="w-5 h-5 text-forest-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>' : ''}
                                    <span class="font-bold text-bark-800">Nr. ${dog2.nr}</span>
                                    <span class="text-bark-600">${dog2.race}</span>
                                    <span class="font-medium text-bark-800">${dog2.name}</span>
                                </div>
                                <span class="text-xs px-2 py-1 rounded ${isFinished2 ? 'bg-forest-100 text-forest-700' : 'bg-bark-100 text-bark-600'}">${isFinished2 ? 'Ferdig' : dog2.klasse}</span>
                            </div>
                            <p class="text-sm text-bark-500 mt-1 ${isFinished2 ? 'ml-7' : ''}">${dog2.owner}</p>
                        </button>`;
                }

                listHtml += `</div></div>`;
            }

            modal.innerHTML = `
                <div class="bg-white rounded-2xl shadow-xl max-w-md w-full max-h-[80vh] overflow-hidden">
                    <div class="bg-bark-700 text-white px-4 py-3">
                        <div class="flex items-center justify-between">
                            <div>
                                <h2 class="font-bold font-serif">${partyInfo.name}</h2>
                                <p class="text-xs text-white/70">${partyInfo.date} • Dommer: ${partyInfo.judge}</p>
                            </div>
                            <button onclick="closePartyList()" class="p-1 hover:bg-white/20 rounded-lg transition">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                </svg>
                            </button>
                        </div>
                        <div class="mt-2 flex items-center gap-2">
                            <div class="flex-1 bg-white/20 rounded-full h-2">
                                <div class="bg-forest-400 h-2 rounded-full transition-all" style="width: ${(finishedCount / totalCount) * 100}%"></div>
                            </div>
                            <span class="text-xs font-medium">${finishedCount}/${totalCount}</span>
                        </div>
                    </div>
                    <div class="p-4 overflow-y-auto max-h-[60vh]">
                        ${listHtml}
                    </div>
                </div>
            `;

            document.body.appendChild(modal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closePartyList();
            });
        }

        function closePartyList() {
            document.getElementById('partyListModal')?.remove();
        }

        function selectDogFromList(idx) {
            saveCurrentDogData();
            currentDogIndex = idx;
            loadDogData(currentDogIndex);
            updateDogNavigation();
            closePartyList();
        }

        // Save current dog's data to localStorage
        function saveCurrentDogData() {
            const dogKey = `dommertest_dog_${currentDogIndex}`;
            const data = {
                fuglebehandling: {
                    presisjon: document.getElementById('presisjon').value || null,
                    reising: document.getElementById('reising').value || null,
                    godkjentReising: document.getElementById('godkjentReising').checked
                },
                comments: state.data.comments,
                slipps: {},
                completedSlipps: state.data.completedSlipps || [],
                currentSlipp: state.currentSlipp,
                jaktegenskaper: {},
                sekundering: {},
                premie: document.getElementById('premie').value || null,
                notatTillegg: document.getElementById('notatTillegg').value || '',
                uonsketAdferd: document.getElementById('uonsketAdferd').value || ''
            };

            FIELDS.forEach(field => {
                data.slipps[field] = {};
                for (let s = 1; s <= 9; s++) {
                    const input = document.querySelector(`input[data-field="${field}"][data-slipp="${s}"]`);
                    if (input && input.value) {
                        data.slipps[field][s] = parseInt(input.value) || 0;
                    }
                }
            });

            // Save jaktegenskaper
            JAKT_FIELDS.forEach(field => {
                const input = document.querySelector(`input[data-jakt="${field}"]`);
                if (input && input.value) {
                    data.jaktegenskaper[field] = parseInt(input.value) || 0;
                }
            });

            // Save sekundering
            SEK_FIELDS.forEach(field => {
                const input = document.querySelector(`input[data-sek="${field}"]`);
                if (input && input.value) {
                    data.sekundering[field] = parseInt(input.value) || 0;
                }
            });

            localStorage.setItem(dogKey, JSON.stringify(data));
        }

        // Load dog data from localStorage
        function loadDogData(idx) {
            const dogKey = `dommertest_dog_${idx}`;
            const saved = localStorage.getItem(dogKey);

            // Reset state
            state.currentSlipp = 1;
            state.data = {
                fuglebehandling: { presisjon: null, reising: null, godkjentReising: false },
                comments: {},
                slipps: {},
                completedSlipps: [],
                jaktegenskaper: {},
                sekundering: {},
                premie: null,
                notatTillegg: '',
                uonsketAdferd: ''
            };

            // Clear all inputs
            document.getElementById('presisjon').value = '';
            document.getElementById('reising').value = '';
            document.getElementById('godkjentReising').checked = false;
            document.getElementById('currentComment').value = '';
            document.querySelectorAll('input[data-field]').forEach(input => {
                input.value = '';
            });
            // Clear jaktegenskaper
            document.querySelectorAll('input[data-jakt]').forEach(input => {
                input.value = '';
            });
            // Clear sekundering
            document.querySelectorAll('input[data-sek]').forEach(input => {
                input.value = '';
            });
            document.getElementById('premie').value = '';
            document.getElementById('notatTillegg').value = '';
            document.getElementById('uonsketAdferd').value = '';

            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    state.data = { ...state.data, ...parsed };
                    state.currentSlipp = parsed.currentSlipp || 1;

                    // Populate fuglebehandling
                    if (parsed.fuglebehandling) {
                        document.getElementById('presisjon').value = parsed.fuglebehandling.presisjon || '';
                        document.getElementById('reising').value = parsed.fuglebehandling.reising || '';
                        document.getElementById('godkjentReising').checked = parsed.fuglebehandling.godkjentReising || false;
                    }

                    // Populate slipp inputs
                    FIELDS.forEach(field => {
                        if (parsed.slipps && parsed.slipps[field]) {
                            for (let s = 1; s <= 9; s++) {
                                const input = document.querySelector(`input[data-field="${field}"][data-slipp="${s}"]`);
                                if (input && parsed.slipps[field][s] !== undefined) {
                                    input.value = parsed.slipps[field][s];
                                }
                            }
                        }
                    });

                    // Populate jaktegenskaper
                    if (parsed.jaktegenskaper) {
                        JAKT_FIELDS.forEach(field => {
                            const input = document.querySelector(`input[data-jakt="${field}"]`);
                            if (input && parsed.jaktegenskaper[field] !== undefined) {
                                input.value = parsed.jaktegenskaper[field];
                            }
                        });
                    }

                    // Populate sekundering
                    if (parsed.sekundering) {
                        SEK_FIELDS.forEach(field => {
                            const input = document.querySelector(`input[data-sek="${field}"]`);
                            if (input && parsed.sekundering[field] !== undefined) {
                                input.value = parsed.sekundering[field];
                            }
                        });
                    }

                    // Populate premie, notat and uønsket adferd
                    document.getElementById('premie').value = parsed.premie || '';
                    document.getElementById('notatTillegg').value = parsed.notatTillegg || '';
                    document.getElementById('uonsketAdferd').value = parsed.uonsketAdferd || '';

                    // Current comment
                    if (parsed.comments && parsed.comments[state.currentSlipp]) {
                        document.getElementById('currentComment').value = parsed.comments[state.currentSlipp];
                    }
                } catch (e) {
                    console.error('Failed to load dog data:', e);
                }
            }

            // Update UI
            updateCompletedSlipps();
            renderPreviousComments();
            updateTotals();
            updateSaveButtonText();
            document.getElementById('currentSlippLabel').textContent = `Slipp ${state.currentSlipp}:`;
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            init();
            updateDogNavigation();
            initOfflineSupport();
        });

        // Offline support
        function initOfflineSupport() {
            // Register Service Worker
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => {
                        console.log('[Dommer] Service Worker registered');
                    })
                    .catch(err => {
                        console.warn('[Dommer] Service Worker registration failed:', err);
                    });
            }

            // Create offline indicator
            const indicator = document.createElement('div');
            indicator.id = 'offlineIndicator';
            indicator.className = 'fixed top-12 left-1/2 transform -translate-x-1/2 bg-amber-500 text-white px-4 py-2 rounded-full text-sm font-medium shadow-lg z-50 transition-all duration-300';
            indicator.style.display = 'none';
            indicator.innerHTML = '<span class="inline-block w-2 h-2 bg-white rounded-full mr-2 animate-pulse"></span>Offline-modus';
            document.body.appendChild(indicator);

            // Update online/offline status
            function updateOnlineStatus() {
                const isOnline = navigator.onLine;
                indicator.style.display = isOnline ? 'none' : 'block';

                if (isOnline) {
                    // Try to sync data when back online
                    syncOfflineData();
                }
            }

            window.addEventListener('online', updateOnlineStatus);
            window.addEventListener('offline', updateOnlineStatus);
            updateOnlineStatus();
        }

        // Sync offline data when back online
        function syncOfflineData() {
            console.log('[Dommer] Back online - syncing data...');
            // Data is already in localStorage, which syncs via storage-shim
            // This is a placeholder for future server sync
        }
    </script>

</body>
</html>
