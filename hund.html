        // Rasesnitt for egenskaper (basert på aggregert statistikk)
        // Verdier er snitt fra alle registrerte kritikker per rase
        const breedAverages = {
            'Engelsk Setter': { JAKTLYST: 4.5, FART: 4.6, SELVSTENDIGHET: 4.0, SOKSBREDDE: 4.2, REVIERING: 4.1, SAMARBEID: 4.0 },
            'Gordon Setter': { JAKTLYST: 4.3, FART: 4.2, SELVSTENDIGHET: 4.2, SOKSBREDDE: 3.9, REVIERING: 4.0, SAMARBEID: 4.1 },
            'Irsk Setter': { JAKTLYST: 4.8, FART: 4.9, SELVSTENDIGHET: 4.1, SOKSBREDDE: 4.4, REVIERING: 4.2, SAMARBEID: 3.8 },
            'Pointer': { JAKTLYST: 5.0, FART: 5.2, SELVSTENDIGHET: 4.5, SOKSBREDDE: 4.6, REVIERING: 4.4, SAMARBEID: 4.0 },
            'Breton': { JAKTLYST: 4.6, FART: 4.0, SELVSTENDIGHET: 3.8, SOKSBREDDE: 3.5, REVIERING: 4.0, SAMARBEID: 4.2 }
        };

        // Beregn indeks: 100 = rasesnitt, >100 = over, <100 = under
        function calculateIndex(value, breed, property) {
            const avg = breedAverages[breed]?.[property];
            if (!avg || value === null || value === undefined) return null;
            return Math.round((value / avg) * 100);
        }

        // Formater verdi med indeks og pil
        function formatWithIndex(value, breed, property) {
            if (value === null || value === undefined || value === '-') return '-';

            const index = calculateIndex(value, breed, property);
            if (index === null) return value;

            const diff = index - 100;
            let arrow = '';
            let colorClass = 'text-bark-500';

            if (diff > 5) {
                arrow = '▲';
                colorClass = 'text-green-600';
            } else if (diff < -5) {
                arrow = '▼';
                colorClass = 'text-red-600';
            } else {
                arrow = '—';
                colorClass = 'text-bark-400';
            }

            const sign = diff > 0 ? '+' : '';
            return `<span class="text-lg font-bold text-sky-700">${value}</span> <span class="${colorClass} text-xs">${arrow} ${sign}${diff}%</span>`;
        }

        let currentDog = null;
        let currentCritique = null;

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const dogId = urlParams.get('id');

            if (!dogId) {
                showNotFound();
                return;
            }

            // Først sjekk om det er en hardkodet demo-hund (for kritikk-visning)
            if (dogDatabase[dogId]) {
                currentDog = dogDatabase[dogId];
                renderDogProfile();
                renderCritiques();
                return;
            }

            // Hent fra API
            try {
                const response = await fetch(`/api/hunder/${dogId}`);
                if (!response.ok) {
                    showNotFound();
                    return;
                }
                const data = await response.json();

                // Konverter API-data til formatet som brukes av renderDogProfile
                currentDog = {
                    id: data.id,
                    name: data.navn,
                    regNumber: data.regnr,
                    breed: data.rase || 'Ukjent rase',
                    gender: data.kjonn || 'male',
                    owner: data.eier_navn || 'Ukjent',
                    critiques: (data.results || []).map(r => ({
                        id: `result-${r.id}`,
                        trial: r.prove_navn,
                        date: r.dato,
                        location: '',
                        class: r.klasse,
                        party: r.klasse,
                        judge: r.dommer || 'Ukjent',
                        prize: r.premie || '',
                        scores: {},
                        critique: ''
                    }))
                };
                renderDogProfile();
                renderCritiques();
            } catch (err) {
                console.error('Feil ved henting av hund:', err);
                showNotFound();
            }
        }

                </div>

            document.getElementById('dogProfile').innerHTML = `

                        </div>

                    </div>
                </div>
            `;
        }

        function renderCritiques() {
            const container = document.getElementById('critiquesList');

            if (currentDog.critiques.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-2xl border border-bark-100 p-8 text-center">
                        <div class="w-16 h-16 bg-bark-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <svg class="w-8 h-8 text-bark-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                        </div>
                        <h3 class="text-lg font-semibold text-bark-700 mb-2">Ingen kritikker ennå</h3>
                        <p class="text-bark-500">Denne hunden har ikke deltatt på noen prøver ennå.</p>
                    </div>
                `;
                return;
            }

            // Grupper kritikker per år
            const critiquesPerYear = {};
            currentDog.critiques.forEach(c => {
                const year = new Date(c.date).getFullYear();
                if (!critiquesPerYear[year]) critiquesPerYear[year] = [];
                critiquesPerYear[year].push(c);
            });

            // Sorter år synkende (nyeste først)
            const years = Object.keys(critiquesPerYear).sort((a, b) => b - a);
            const currentYear = new Date().getFullYear();

            container.innerHTML = `
                <h2 class="text-lg font-bold font-serif text-bark-900 mb-4">Jaktprøver og kritikker</h2>
                <p class="text-sm text-bark-500 mb-4">${currentDog.critiques.length} registrerte prøver</p>
                ${years.map((year, index) => {
                    const yearCritiques = critiquesPerYear[year];
                    const stats = getYearStats(yearCritiques);
                    const isExpanded = index === 0; // Bare nyeste år ekspandert

                    return `
                        <div class="bg-white rounded-xl border border-bark-100 overflow-hidden mb-3">
                            <!-- År-header (klikkbar) -->
                            <button onclick="toggleYear('${year}')"
                                    class="w-full px-4 py-3 flex items-center justify-between bg-bark-50 hover:bg-bark-100 transition">
                                <div class="flex items-center gap-3">
                                    <svg id="chevron-${year}" class="w-5 h-5 text-bark-400 transition-transform ${isExpanded ? 'rotate-90' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                                    </svg>
                                    <span class="font-bold text-bark-800">${year}</span>
                                    <span class="text-sm text-bark-500">(${yearCritiques.length} ${yearCritiques.length === 1 ? 'prøve' : 'prøver'})</span>
                                </div>
                                <div class="flex items-center gap-2 text-xs">
                                    ${stats.bestPrize ? `<span class="px-2 py-1 rounded-full font-medium ${getPrizeClass(stats.bestPrize)}">Beste: ${stats.bestPrize}</span>` : ''}
                                </div>
                            </button>

                            <!-- Kritikk-liste for dette året -->
                            <div id="year-${year}" class="${isExpanded ? '' : 'hidden'}">
                                <table class="w-full text-sm">
                                    <thead class="bg-bark-50 border-t border-bark-100">
                                        <tr class="text-left text-xs text-bark-500 uppercase">
                                            <th class="px-4 py-2 font-medium">Dato</th>
                                            <th class="px-4 py-2 font-medium hidden sm:table-cell">Prøve</th>
                                            <th class="px-4 py-2 font-medium">Klasse</th>
                                            <th class="px-4 py-2 font-medium text-center">Premie</th>
                                            <th class="px-4 py-2 font-medium text-right"></th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-bark-100">
                                        ${yearCritiques.map(c => `
                                            <tr class="hover:bg-sky-50 cursor-pointer transition" onclick="viewCritique('${c.id}')">

                                                    <span class="text-bark-700">${formatShortDate(c.date)}</span>

        }

        function toggleYear(year) {
            const content = document.getElementById(`year-${year}`);
            const chevron = document.getElementById(`chevron-${year}`);
            content.classList.toggle('hidden');
            chevron.classList.toggle('rotate-90');
        }

        function getYearStats(critiques) {
            const prizeOrder = ['CACIT', 'ResCacit', '1. premie', '1.pr', 'CK', '2. premie', '2.pr', '3. premie', '3.pr', 'ÅP', 'AP'];
            let bestPrize = null;
            let bestIndex = Infinity;

            critiques.forEach(c => {
                const idx = prizeOrder.findIndex(p => c.prize.includes(p));
                if (idx !== -1 && idx < bestIndex) {
                    bestIndex = idx;
                    bestPrize = c.prize;
                }
            });

            return { bestPrize };
        }

        function formatShortDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('nb-NO', { day: 'numeric', month: 'short' });
        }

                                <span class="${s.GODKJENT_REISING ? 'text-green-600' : 'text-bark-400'} text-lg">
                                    ${s.GODKJENT_REISING ? '✓' : '○'}

                    <!-- STAND/ARBEID Section -->

                    <!-- EGENSKAPER (SUM) Section -->

                            <div class="text-center bg-bark-50 rounded-xl p-2">

                                    ${s.APPORT === 1 ? 'Godkj' : s.APPORT === 2 ? 'Ikke' : '-'}

                                <p class="text-[9px] text-bark-500">Apport</p>

                    </div>

                    ${s.ADFERD ? `
                    <!-- ADFERD Section -->
                    <div class="p-5 bg-red-50 border-b border-bark-200">

                    <!-- Prize -->

        function closeCritiqueModal() {
            document.getElementById('critiqueModal').classList.add('hidden');
        }

        function printCritique() {
            const printContent = document.getElementById('critiquePrintArea').innerHTML;
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Kritikkskjema - ${currentDog.name}</title>
                    <script src="https://cdn.tailwindcss.com"><\/script>
                    <style>
                        @media print {
                            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
                        }
                        .font-serif { font-family: 'Playfair Display', Georgia, serif; }
                    </style>
                </head>
                <body class="p-8 bg-white">
                    ${printContent}
                    <script>
                        setTimeout(() => { window.print(); window.close(); }, 500);
                    <\/script>
                </body>
                </html>
            `);
            printWindow.document.close();
        }

        function getPrizeClass(prize) {
            if (['CACIT', 'ResCacit'].some(p => prize.includes(p)) || prize.includes('1')) return 'bg-amber-100 text-amber-700';
            if (prize.includes('CK') || prize.includes('2')) return 'bg-green-100 text-green-700';
            if (['Finale', 'Semifinale'].some(p => prize.includes(p))) return 'bg-blue-100 text-blue-700';
            if (prize.includes('3') || prize.includes('ÅP') || prize.includes('AP')) return 'bg-sky-100 text-sky-700';
            return 'bg-bark-100 text-bark-600';
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('nb-NO', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        // Initialize
        init();
    </script>
</body>
</html>
