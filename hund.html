        // Hent godkjente kritikker fra API
        async function getApprovedCritiquesFromAPI(regnr) {
            try {
                const resp = await fetch(`/api/hunder/${encodeURIComponent(regnr)}/kritikker`);
                if (resp.ok) {
                    const kritikker = await resp.json();
                    return kritikker.map(k => ({
                        id: `db_${k.id}`,
                        trial: k.prove_navn || 'Ukjent prøve',
                        date: k.approved_at ? k.approved_at.split('T')[0] : k.start_dato || '',
                        location: k.prove_sted || '',
                        class: k.klasse || 'AK',
                        party: k.parti,
                        judge: k.dommer_navn || 'Dommer',
                        prize: k.premie || '',
                        cacit: k.cacit || '',
                        scores: k.scores || {},
                        critique: k.tekst || '',
                        approvedAt: k.approved_at,
                        approvedBy: k.approved_by || 'NKK-rep',
                        isApproved: true
                    }));
                }
            } catch (e) {
                console.log('Kunne ikke hente kritikker fra API:', e);
            }
            return [];
        }

        // Hent godkjente kritikker fra judgeData localStorage (fallback)
        function getApprovedCritiquesFromLocalStorage(regnr) {
            const critiques = [];

            // Gå gjennom alle judgeData_* keys
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (!key.startsWith('judgeData_')) continue;

                const partiId = key.replace('judgeData_', '');

                try {
                    const data = JSON.parse(localStorage.getItem(key));
                    const dogs = Array.isArray(data) ? data : (data.dogs || []);

                    dogs.forEach(dog => {
                        // Finn denne hunden og sjekk om kritikken er godkjent
                        if (dog.regnr === regnr && dog.critiqueStatus === 'approved') {
                            critiques.push({
                                id: `local_${partiId}_${dog.regnr}`,
                                trial: dog.proveName || 'Vinterprøven 2026',
                                date: dog.approvedAt ? dog.approvedAt.split('T')[0] : new Date().toISOString().split('T')[0],
                                location: dog.proveLocation || 'Lierne',
                                class: dog.klasse || 'AK',
                                party: partiId,
                                judge: dog.critiqueSubmittedBy || 'Dommer',
                                prize: dog.prize || dog.premie || '',
                                cacit: dog.cacit || '',
                                scores: dog.scores || {},
                                critique: dog.critiqueText || dog.critique || '',
                                approvedAt: dog.approvedAt,
                                approvedBy: dog.approvedBy || 'NKK-rep',
                                isApproved: true
                            });
                        }
                    });
                } catch (e) {
                    console.error('Feil ved parsing av', key, e);
                }
            }

            return critiques;
        }

        // Kombiner kritikker fra API og localStorage
        async function getApprovedCritiquesForDog(regnr) {
            // Hent fra begge kilder
            const apiCritiques = await getApprovedCritiquesFromAPI(regnr);
            const localCritiques = getApprovedCritiquesFromLocalStorage(regnr);

            // Kombiner og fjern duplikater (basert på parti + dato)
            const seen = new Set();
            const allCritiques = [];

            // API-kritikker har prioritet
            for (const c of apiCritiques) {
                const key = `${c.party}_${c.date}`;
                if (!seen.has(key)) {
                    seen.add(key);
                    allCritiques.push(c);
                }
            }

            // Legg til lokale som ikke finnes i API
            for (const c of localCritiques) {
                const key = `${c.party}_${c.date}`;
                if (!seen.has(key)) {
                    seen.add(key);
                    allCritiques.push(c);
                }
            }

            return allCritiques;
        }

        // Hent hundeinfo fra API
        async function fetchDogFromAPI(regnr) {
            try {
                const resp = await fetch(`/api/hunder?regnr=${encodeURIComponent(regnr)}`);
                if (resp.ok) {
                    const dogs = await resp.json();
                    if (dogs.length > 0) {
                        return dogs[0];
                    }
                }
            } catch (e) {
                console.log('Kunne ikke hente hund fra API:', e);
            }
            return null;
        }

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const dogId = urlParams.get('id');
            const regnr = urlParams.get('regnr');
            const partyId = urlParams.get('party');

            // Prøv å finne hunden
            let dog = null;

            // 1. Sjekk om vi har party-parameter (fra søk i bedømmingsdata)
            if (partyId && dogId) {
                const saved = localStorage.getItem('judgeData_' + partyId);
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        const dogs = Array.isArray(data) ? data : (data.dogs || []);
                        const foundDog = dogs.find(d => String(d.id) === String(dogId));
                        if (foundDog) {
                            const dogRegnr = foundDog.regNr || foundDog.regnr || foundDog.regNumber || '';
                            dog = {
                                id: foundDog.id,
                                name: foundDog.name,
                                regNumber: dogRegnr,
                                breed: foundDog.breed || 'Ukjent rase',
                                gender: foundDog.gender || 'unknown',
                                owner: foundDog.owner || foundDog.handler || 'Ukjent',
                                handler: foundDog.handler,
                                critiques: []
                            };

                            // Hvis hunden har godkjent kritikk, legg den til
                            if (foundDog.critiqueStatus === 'approved' && foundDog.critique) {
                                // Aggreger scores fra alle runder
                                let scores = {};
                                if (foundDog.rounds && foundDog.rounds.length > 0) {
                                    const lastRound = foundDog.rounds[foundDog.rounds.length - 1];
                                    scores = lastRound.scores || {};
                                    // Sum stand-felt
                                    ['STAND_M', 'STAND_U', 'TOMSTAND', 'MAKKER_STAND', 'SJANSE', 'SLIPPTID'].forEach(field => {
                                        scores[field] = foundDog.rounds.reduce((sum, r) => sum + (parseInt(r.scores?.[field]) || 0), 0);
                                    });
                                }

                                dog.critiques.push({
                                    id: `local_${partyId}_${foundDog.id}`,
                                    trial: 'Vinterprøven 2026',
                                    date: foundDog.approvedAt ? foundDog.approvedAt.split('T')[0] : new Date().toISOString().split('T')[0],
                                    location: 'Lierne',
                                    class: partyId.toUpperCase().includes('V') ? 'VK' : 'AK',
                                    party: partyId,
                                    judge: foundDog.critiqueSubmittedBy || 'Dommer',
                                    prize: foundDog.prize || '',
                                    cacit: foundDog.cacit || '',
                                    scores: scores,
                                    critique: foundDog.critique || '',
                                    approvedAt: foundDog.approvedAt,
                                    approvedBy: foundDog.approvedBy || 'NKK-rep',
                                    isApproved: true
                                });
                            }

                            // Hent også andre godkjente kritikker for denne hunden
                            if (dogRegnr) {
                                const otherCritiques = await getApprovedCritiquesForDog(dogRegnr);
                                otherCritiques.forEach(c => {
                                    if (!dog.critiques.some(existing => existing.id === c.id)) {
                                        dog.critiques.push(c);
                                    }
                                });
                            }
                        }
                    } catch (e) {
                        console.error('Feil ved parsing av judgeData:', e);
                    }
                }
            }

            // 2. Sjekk om vi har regnr i URL
            if (!dog && regnr) {
                // Prøv API først
                const apiDog = await fetchDogFromAPI(regnr);
                if (apiDog) {
                    dog = {
                        id: apiDog.id,
                        name: apiDog.navn,
                        regNumber: apiDog.regnr,
                        breed: apiDog.rase,
                        gender: apiDog.kjonn,
                        owner: apiDog.eier_navn || '',
                        critiques: []
                    };
                }

                // Hvis ikke i API, sjekk dogDatabase for demo
                if (!dog) {
                    const dbDog = Object.values(dogDatabase).find(d => d.regNumber === regnr);
                    if (dbDog) dog = dbDog;
                }

                // Hent godkjente kritikker fra localStorage
                if (dog) {
                    const approvedCritiques = await getApprovedCritiquesForDog(regnr);
                    // Kombiner med eksisterende kritikker (unngå duplikater)
                    const existingIds = new Set(dog.critiques.map(c => c.id));

                        if (!existingIds.has(c.id)) {
                            dog.critiques.push(c);
                        }
                    });
                    // Sorter etter dato (nyeste først)
                    dog.critiques.sort((a, b) => new Date(b.date) - new Date(a.date));
                }
            }

            // 3. Fallback: Sjekk gammel id-parameter (uten party)
            if (!dog && dogId && !partyId) {
                // Først sjekk demo-database
                if (dogDatabase[dogId]) {
                    dog = dogDatabase[dogId];

                    // Prøv API med ID

                        const resp = await fetch(`/api/hunder/${dogId}`);

                                        STAND_M: k.stand_m,

                                        TOMSTAND: k.tomstand,

                                        ADFERD: k.adferd || ''
                                    },
                                    critique: k.kritikk_tekst || ''
                                }))
                            };
                        }
                    } catch (e) {
                        console.error('Feil ved henting fra API:', e);
                    }
                }

            const kritikkerList = document.getElementById('critiquesList');

            currentStatClass = klasse;

            ['samlet', 'UK', 'AK', 'VK'].forEach(k => {
                const btn = document.getElementById(`stat-class-${k}`);
                if (k === klasse) {

        async function loadStatistikk() {
            if (!currentDog || !currentDog.regNumber) return;

            const yearFrom = document.getElementById('statYearFrom').value;
            const yearTo = document.getElementById('statYearTo').value;

            let url = `/api/hunder/${encodeURIComponent(currentDog.regNumber)}/statistikk`;
            const params = [];
            if (yearFrom) params.push(`fra_aar=${yearFrom}`);
            if (yearTo) params.push(`til_aar=${yearTo}`);
            if (params.length) url += '?' + params.join('&');

            try {
                const resp = await fetch(url);
                if (resp.ok) {
                    const data = await resp.json();
                    statistikkData = data.statistikk || data;
                    renderStatistikk();
                } else {
                    const err = await resp.json();
                    document.getElementById('statistikkContent').innerHTML = `
                        <div class="bg-amber-50 border border-amber-200 rounded-xl p-6 text-center">
                            <p class="text-amber-700">${err.error || 'Kunne ikke laste statistikk'}</p>
                        </div>
                    `;
                }
            } catch (e) {
                console.error('Feil ved lasting av statistikk:', e);
                document.getElementById('statistikkContent').innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-xl p-6 text-center">
                        <p class="text-red-700">Feil ved lasting av statistikk</p>
                    </div>
                `;
            }

            // Load avkom also
            try {
                const avkomResp = await fetch(`/api/hunder/${encodeURIComponent(currentDog.regNumber)}/avkom-statistikk`);
                if (avkomResp.ok) {
                    avkomData = await avkomResp.json();
                }
            } catch (e) {
                console.log('Ingen avkom-data:', e);
            }
        }

        // Hjelpefunksjon for å finne riktig rasesnitt
        function getRasesnitt(breed) {
            if (!breed) return RASESNITT['irsk setter']; // Fallback
            const raseNormalisert = breed.toLowerCase().trim();

            // Eksakt match først
            if (RASESNITT[raseNormalisert]) {
                return RASESNITT[raseNormalisert];
            }

            // Delvis match
            for (const key of Object.keys(RASESNITT)) {
                if (raseNormalisert.includes(key) || key.includes(raseNormalisert)) {
                    return RASESNITT[key];
                }
            }

            // Fallback til irsk setter hvis rase ikke finnes
            return RASESNITT['irsk setter'];
        }

        // Bakoverkompatibel alias
        const RASESNITT_IRSK_SETTER = RASESNITT['irsk setter'];

        // Beregn NISK-stil indeks (100 = rasesnitt)
        function beregnIndeks(verdi, rasesnitt) {
            if (!verdi || !rasesnitt) return null;
            return Math.round((verdi / rasesnitt) * 100);
        }

        // Formater verdi med indeks-sammenligning mot rasesnitt
        function formatWithIndex(value, breedAvg, label, max = 6, higherIsBetter = true) {
            if (!value || !breedAvg) return `<p class="text-xl font-bold text-bark-700">-</p><p class="text-[10px] text-bark-500">${label}</p>`;

            const indeks = Math.round((value / breedAvg) * 100);
            const diff = value - breedAvg;
            const isGood = higherIsBetter ? diff >= 0 : diff <= 0;
            const arrow = diff > 0 ? '▲' : (diff < 0 ? '▼' : '');
            const arrowColor = isGood ? 'text-green-600' : 'text-red-500';

            return `
                <p class="text-xl font-bold text-bark-700">${value.toFixed(1)}</p>
                <p class="text-[10px] text-bark-500">${label}</p>
                <p class="text-[9px] ${arrowColor} font-medium">${arrow} ${indeks}%</p>
            `;
        }

                })()}

                <!-- Tilleggsstatistikk (fuglearbeid) -->
                <div class="bg-white rounded-xl border border-bark-100 p-5 mb-4">
                    <h3 class="text-xs font-bold text-bark-600 uppercase mb-4">Fuglearbeid-detaljer</h3>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4">
                        <div class="text-center bg-sky-50 rounded-xl p-3">
                            <p class="text-2xl font-bold text-sky-700">${stats.stand_m + stats.stand_u}</p>
                            <p class="text-xs text-bark-500">Totale stander</p>
                            <p class="text-[9px] text-bark-400">(m/${stats.stand_m} u/${stats.stand_u})</p>
                        </div>
                        <div class="text-center bg-bark-50 rounded-xl p-3">
                            <p class="text-2xl font-bold text-bark-700">${stats.makker_stand}</p>
                            <p class="text-xs text-bark-500">Makkerstand</p>
                        </div>
                        <div class="text-center bg-amber-50 rounded-xl p-3">
                            <p class="text-2xl font-bold text-amber-700">${stats.tomstand}</p>
                            <p class="text-xs text-bark-500">Tomstand</p>
                        </div>
                        <div class="text-center ${stats.andel_tomstand <= rs.andel_tomstand ? 'bg-green-50' : 'bg-red-50'} rounded-xl p-3">
                            <p class="text-2xl font-bold ${stats.andel_tomstand <= rs.andel_tomstand ? 'text-green-700' : 'text-red-700'}">${stats.andel_tomstand.toFixed(1)}%</p>
                            <p class="text-xs text-bark-500">Tomstand-andel</p>
                            <p class="text-[9px] ${stats.andel_tomstand <= rs.andel_tomstand ? 'text-green-600' : 'text-red-500'}">
                                ${stats.andel_tomstand <= rs.andel_tomstand ? '▼ Bedre' : '▲ Dårligere'} enn snitt (${rs.andel_tomstand}%)
                            </p>
                        </div>
                    </div>

                    <!-- Sekundering (støkk) -->
                    <div class="border-t border-bark-100 pt-4">
                        <h4 class="text-[10px] text-bark-500 uppercase mb-2">Sekundering (støkk)</h4>
                        <div class="grid grid-cols-3 gap-3">
                            <div class="text-center bg-green-50 rounded-lg p-2">
                                <p class="text-lg font-bold text-green-700">${stats.sekundering?.spontan || 0}</p>
                                <p class="text-[10px] text-bark-500">Spontan</p>
                            </div>
                            <div class="text-center bg-amber-50 rounded-lg p-2">
                                <p class="text-lg font-bold text-amber-700">${stats.sekundering?.forbi || 0}</p>
                                <p class="text-[10px] text-bark-500">Går forbi</p>
                            </div>
                            <div class="text-center bg-bark-50 rounded-lg p-2">
                                <p class="text-lg font-bold text-bark-700">${stats.sekundering?.total || 0}</p>
                                <p class="text-[10px] text-bark-500">Totalt</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tallkarakterer (rådata, ikke indekser) -->
                <div class="bg-white rounded-xl border border-bark-100 p-5 mb-4">
                    <h3 class="text-xs font-bold text-bark-600 uppercase mb-2">Tallkarakterer (gjennomsnitt)</h3>
                    <p class="text-xs text-bark-400 mb-4">
                        Rådata fra kritikkskjemaer. NB: Fart/stil korrelerer 95%+ med jaktlyst (samme gener).
                        Søksbredde, reviering, selvstendighet og samarbeid brukes ikke i avlsindeks da høyeste karakter ikke er best.
                    </p>
                    <div class="grid grid-cols-4 sm:grid-cols-7 gap-2">
                        <div class="text-center bg-sky-50 rounded-xl p-3 border-2 border-sky-200">
                            ${formatWithIndex(stats.jaktlyst, rs.jaktlyst, 'Jaktlyst')}
                            <p class="text-[8px] text-sky-600 mt-1">Avlsindeks</p>
                        </div>
                        <div class="text-center bg-bark-50 rounded-xl p-3">
                            ${formatWithIndex(stats.fart, rs.fart, 'Fart')}
                            <p class="text-[8px] text-bark-400 mt-1">≈ Jaktlyst</p>
                        </div>
                        <div class="text-center bg-bark-50 rounded-xl p-3">
                            <p class="text-xl font-bold text-bark-700">${stats.selvstendighet ? stats.selvstendighet.toFixed(1) : '-'}</p>
                            <p class="text-[10px] text-bark-500">Selvst.</p>
                            <p class="text-[8px] text-bark-400 mt-1">Ikke indeks</p>
                        </div>
                        <div class="text-center bg-bark-50 rounded-xl p-3">
                            <p class="text-xl font-bold text-bark-700">${stats.bredde ? stats.bredde.toFixed(1) : '-'}</p>
                            <p class="text-[10px] text-bark-500">Bredde</p>
                            <p class="text-[8px] text-bark-400 mt-1">Ikke indeks</p>
                        </div>
                        <div class="text-center bg-bark-50 rounded-xl p-3">
                            <p class="text-xl font-bold text-bark-700">${stats.reviering ? stats.reviering.toFixed(1) : '-'}</p>
                            <p class="text-[10px] text-bark-500">Reviering</p>
                            <p class="text-[8px] text-bark-400 mt-1">Ikke indeks</p>
                        </div>
                        <div class="text-center bg-bark-50 rounded-xl p-3">
                            <p class="text-xl font-bold text-bark-700">${stats.samarbeid ? stats.samarbeid.toFixed(1) : '-'}</p>
                            <p class="text-[10px] text-bark-500">Samarb.</p>
                            <p class="text-[8px] text-bark-400 mt-1">Ikke indeks</p>
                        </div>
                        <div class="text-center bg-bark-50 rounded-xl p-3">
                            <p class="text-xl font-bold text-bark-700">${stats.presisjon.gjennomsnitt ? stats.presisjon.gjennomsnitt.toFixed(1) : '-'}</p>
                            <p class="text-[10px] text-bark-500">Presisjon</p>
                            <p class="text-[8px] text-bark-400 mt-1">1-4 skala</p>
                        </div>
                    </div>
                </div>

                <!-- Reis-fordeling -->
                <div class="bg-white rounded-xl border border-bark-100 p-5 mb-4">
                    <h3 class="text-xs font-bold text-bark-600 uppercase mb-2">Reis-statistikk</h3>
                    <p class="text-xs text-bark-400 mb-4">
                        Fordeling av reiskarakterer. NB: Reis brukes ikke i avlsindeks – registreres ikke ved hvert fuglearbeid og styres ikke av hunden selv.
                    </p>
                    <div class="grid grid-cols-6 gap-2 text-center text-xs">
                        <div class="bg-red-50 rounded-lg p-2">
                            <p class="text-lg font-bold text-red-600">${stats.reis.nekter}</p>
                            <p class="text-red-700">Nekter</p>
                        </div>
                        <div class="bg-amber-50 rounded-lg p-2">
                            <p class="text-lg font-bold text-amber-600">${stats.reis.svart_forsiktig}</p>
                            <p class="text-amber-700">Sv. fors.</p>
                        </div>
                        <div class="bg-yellow-50 rounded-lg p-2">
                            <p class="text-lg font-bold text-yellow-600">${stats.reis.forsiktig}</p>
                            <p class="text-yellow-700">Forsikt.</p>
                        </div>
                        <div class="bg-green-50 rounded-lg p-2">
                            <p class="text-lg font-bold text-green-600">${stats.reis.kontrollert}</p>
                            <p class="text-green-700">Kontroll.</p>
                        </div>
                        <div class="bg-sky-50 rounded-lg p-2">
                            <p class="text-lg font-bold text-sky-600">${stats.reis.villig}</p>
                            <p class="text-sky-700">Villig</p>
                        </div>
                        <div class="bg-blue-50 rounded-lg p-2">
                            <p class="text-lg font-bold text-blue-600">${stats.reis.djerv}</p>
                            <p class="text-blue-700">Djerv</p>
                        </div>
                    </div>
                </div>

                <!-- Presisjon-fordeling -->
                <div class="bg-white rounded-xl border border-bark-100 p-5 mb-4">
                    <h3 class="text-xs font-bold text-bark-600 uppercase mb-4">Presisjon-fordeling</h3>
                    <div class="grid grid-cols-4 gap-3 text-center text-xs">
                        <div class="bg-red-50 rounded-lg p-3">
                            <p class="text-xl font-bold text-red-600">${stats.presisjon.meget_upresis}</p>
                            <p class="text-red-700">Meget upresis</p>
                        </div>
                        <div class="bg-amber-50 rounded-lg p-3">
                            <p class="text-xl font-bold text-amber-600">${stats.presisjon.upresis}</p>
                            <p class="text-amber-700">Upresis</p>
                        </div>
                        <div class="bg-yellow-50 rounded-lg p-3">
                            <p class="text-xl font-bold text-yellow-600">${stats.presisjon.noe_upresis}</p>
                            <p class="text-yellow-700">Noe upresis</p>
                        </div>
                        <div class="bg-green-50 rounded-lg p-3">
                            <p class="text-xl font-bold text-green-600">${stats.presisjon.presis}</p>
                            <p class="text-green-700">Presis</p>
                        </div>
                    </div>
                </div>

                <!-- Avkom-statistikk (hvis data finnes) -->
                ${renderAvkomStatistikk()}
            `;
        }

        function renderEgenskapBoks(label, value, max = 6) {
            const pct = value ? (value / max) * 100 : 0;
            const color = pct >= 80 ? 'sky' : pct >= 60 ? 'green' : pct >= 40 ? 'amber' : 'bark';
            return `
                <div class="text-center">
                    <div class="relative bg-bark-100 rounded-xl p-3">
                        <p class="text-xl font-bold text-${color}-700">${value ? value.toFixed(1) : '-'}</p>
                        <p class="text-[10px] text-bark-500">${label}</p>
                    </div>
                </div>
            `;
        }

        function renderAvkomStatistikk() {
            if (!avkomData || !avkomData.avkom || avkomData.avkom.length === 0) {
                return '';
            }

            const avkom = avkomData.avkom;
            const apiClass = currentStatClass === 'samlet' ? 'SAMLET' :
                             currentStatClass === 'skog' ? 'SKOG' : currentStatClass.toUpperCase();
            const stats = avkomData.statistikk?.[apiClass];

            return `
                <div class="bg-white rounded-xl border border-bark-100 p-5">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-xs font-bold text-bark-600 uppercase">Avkom (${avkom.length} stk)</h3>
                        ${stats ? `<span class="text-xs text-bark-400">Aggregert statistikk for avkom</span>` : ''}
                    </div>

                    ${stats ? `
                    <div class="grid grid-cols-4 gap-3 mb-4">
                        <div class="text-center bg-sky-50 rounded-lg p-2">
                            <p class="text-lg font-bold text-sky-700">${stats.viltfinnerevne?.toFixed(2) || '-'}</p>
                            <p class="text-[10px] text-bark-500">Viltfinnerevne</p>
                        </div>
                        <div class="text-center bg-green-50 rounded-lg p-2">
                            <p class="text-lg font-bold text-green-700">${stats.premie_prosent?.toFixed(0) || 0}%</p>
                            <p class="text-[10px] text-bark-500">Premiert</p>
                        </div>
                        <div class="text-center bg-bark-50 rounded-lg p-2">
                            <p class="text-lg font-bold text-bark-700">${stats.starter || 0}</p>
                            <p class="text-[10px] text-bark-500">Starter</p>
                        </div>
                        <div class="text-center bg-amber-50 rounded-lg p-2">
                            <p class="text-lg font-bold text-amber-700">${stats.jaktlyst?.toFixed(1) || '-'}</p>
                            <p class="text-[10px] text-bark-500">Jaktlyst</p>
                        </div>
                    </div>
                    ` : ''}

                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="bg-bark-50 text-xs text-bark-500 uppercase">
                                <tr>
                                    <th class="px-3 py-2 text-left">Navn</th>
                                    <th class="px-3 py-2 text-left">Regnr</th>
                                    <th class="px-3 py-2 text-center">Starter</th>
                                    <th class="px-3 py-2 text-center">VF</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-bark-100">
                                ${avkom.slice(0, 10).map(a => `
                                    <tr class="hover:bg-bark-50">
                                        <td class="px-3 py-2">
                                            <a href="hund.html?regnr=${encodeURIComponent(a.regnr)}" class="text-sky-600 hover:underline">${a.navn}</a>
                                        </td>
                                        <td class="px-3 py-2 text-bark-500">${a.regnr}</td>
                                        <td class="px-3 py-2 text-center">${a.starter || 0}</td>
                                        <td class="px-3 py-2 text-center">${a.viltfinnerevne?.toFixed(2) || '-'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        ${avkom.length > 10 ? `<p class="text-xs text-bark-400 mt-2 text-center">Viser 10 av ${avkom.length} avkom</p>` : ''}
                    </div>
                </div>
            `;
        }

        function populateYearFilters() {
            const currentYear = new Date().getFullYear();
            const startYear = 2010;
            const fromSelect = document.getElementById('statYearFrom');
            const toSelect = document.getElementById('statYearTo');

            for (let y = currentYear; y >= startYear; y--) {
                fromSelect.innerHTML += `<option value="${y}">${y}</option>`;
                toSelect.innerHTML += `<option value="${y}">${y}</option>`;
            }
        }

        // Initialize
        populateYearFilters();
        init();
    </script>
</body>
</html>
