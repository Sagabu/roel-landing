<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaktprøver - Fuglehundprøver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: { DEFAULT: '#E7DAC8', 50: '#FAF7F3', 100: '#F5F0E8', 200: '#E7DAC8', 300: '#D4C4A8', 400: '#C1AE88', 500: '#AE9868' },
                        forest: { 50: '#f6f7f4', 100: '#e3e7dc', 200: '#c7d0ba', 300: '#a4b391', 400: '#839770', 500: '#657a53', 600: '#4f6040', 700: '#3f4c34', 800: '#343e2d', 900: '#2c3526', 950: '#151a12' },
                        earth: { 50: '#faf6f2', 100: '#f3ebe0', 200: '#e6d5c0', 300: '#d5b899', 400: '#c49a72', 500: '#b88255', 600: '#aa6e48', 700: '#8e583d', 800: '#734837', 900: '#5e3c2f', 950: '#321e17' },
                        bark: { 50: '#f7f5f4', 100: '#edeae7', 200: '#ddd6d0', 300: '#c7bcb2', 400: '#ae9d90', 500: '#9a8677', 600: '#8d776a', 700: '#756259', 800: '#61524b', 900: '#50453f', 950: '#2a2321' }
                    },
                    fontFamily: { 'rockwell': ['Rockwell', 'Rockwell Nova', 'Roboto Slab', 'Georgia', 'serif'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rockwell&display=swap" rel="stylesheet">
    <style>
        .tab-active { border-bottom: 3px solid #657a53; color: #657a53; }
    </style>
</head>
<body class="bg-cream min-h-screen">

    <!-- Header -->
    <header class="bg-forest-800 text-white shadow-lg">
        <div class="max-w-4xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition">
                        <svg class="w-8 h-8 text-forest-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                        </svg>
                        <span class="font-rockwell font-bold">Fuglehundprøver</span>
                    </a>
                </div>
                <div class="flex items-center gap-3">
                    <!-- Search button injected by dog-search.js -->
                    <button onclick="logout()" class="bg-forest-700 hover:bg-forest-600 px-4 py-2 rounded-lg text-sm font-medium transition">
                        Logg ut
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="bg-white border-b border-bark-200 shadow-sm sticky top-0 z-10">
        <div class="max-w-4xl mx-auto px-4">
            <div class="flex overflow-x-auto">
                <a href="profil.html" class="px-5 py-4 text-sm font-medium text-bark-600 whitespace-nowrap border-b-3 border-transparent transition hover:bg-bark-50 hover:text-bark-800">
                    Min profil
                </a>
                <a href="mine-hunder.html" class="px-5 py-4 text-sm font-medium text-bark-600 whitespace-nowrap border-b-3 border-transparent transition hover:bg-bark-50 hover:text-bark-800">
                    Mine hunder
                </a>
                <a href="jaktprover.html" class="tab-active px-5 py-4 text-sm font-medium whitespace-nowrap transition hover:bg-bark-50">
                    Jaktprøver
                </a>
                <a href="fullmakter.html" class="px-5 py-4 text-sm font-medium text-bark-600 whitespace-nowrap border-b-3 border-transparent transition hover:bg-bark-50 hover:text-bark-800">
                    Tildelte fullmakter
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-8">
        <!-- Header Section -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold font-rockwell text-bark-800">Jaktprøver</h1>
                <p class="text-bark-500 mt-1">Oversikt over påmeldinger og resultater</p>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
            <button onclick="setFilter('all')" id="filter-all" class="px-4 py-2 rounded-full text-sm font-medium bg-forest-600 text-white transition whitespace-nowrap">
                Alle
            </button>
            <button onclick="setFilter('upcoming')" id="filter-upcoming" class="px-4 py-2 rounded-full text-sm font-medium bg-bark-200 text-bark-700 hover:bg-bark-300 transition whitespace-nowrap">
                Kommende
            </button>
            <button onclick="setFilter('completed')" id="filter-completed" class="px-4 py-2 rounded-full text-sm font-medium bg-bark-200 text-bark-700 hover:bg-bark-300 transition whitespace-nowrap">
                Fullførte
            </button>
        </div>

        <!-- Trials List -->
        <div id="trialsList" class="space-y-4">
            <!-- Trials will be rendered here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden bg-white rounded-2xl border border-earth-200 p-12 text-center">
            <div class="w-20 h-20 bg-bark-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-10 h-10 text-bark-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
            </div>
            <h3 class="text-lg font-semibold text-bark-700 mb-2">Ingen prøver funnet</h3>
            <p class="text-bark-500 mb-6">Du har ingen prøver i denne kategorien</p>
            <a href="index.html#prover" class="inline-block bg-forest-600 hover:bg-forest-700 text-white font-semibold px-6 py-3 rounded-xl transition">
                Se kommende prøver
            </a>
        </div>
    </main>

    <!-- Trial Details Modal -->
    <div id="detailsModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b border-bark-200">
                <div class="flex items-center justify-between">
                    <h3 id="detailsTitle" class="text-xl font-bold font-rockwell text-bark-800">Prøvedetaljer</h3>
                    <button onclick="closeDetailsModal()" class="text-bark-400 hover:text-bark-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div id="detailsContent" class="p-6">
                <!-- Content will be rendered here -->
            </div>
        </div>
    </div>

    <script>
        // Sample trial data (in production, this would come from server)
        let trials = JSON.parse(localStorage.getItem('userTrials') || '[]');

        // Add sample data if empty
        if (trials.length === 0) {
            trials = [
                {
                    id: '1',
                    name: 'Vinterprøven 2026',
                    date: '2026-09-20',
                    endDate: '2026-09-21',
                    location: 'Høgkjølen, Tynset',
                    club: 'Hedmark Fuglehundklubb',
                    type: 'VK/UK/AK',
                    status: 'upcoming',
                    dogs: [
                        { name: 'Bella', class: 'VK Kval', startNumber: 12 },
                        { name: 'Max', class: 'UK', startNumber: 45 }
                    ]
                },
                {
                    id: '2',
                    name: 'Rørosprøven 2025',
                    date: '2025-09-15',
                    endDate: '2025-09-16',
                    location: 'Røros',
                    club: 'Sør-Trøndelag Fuglehundklubb',
                    type: 'VK/UK/AK',
                    status: 'completed',
                    dogs: [
                        { name: 'Bella', class: 'UK', startNumber: 23, prize: '2. premie', points: 85 }
                    ]
                },
                {
                    id: '3',
                    name: 'Vårmønstringen 2025',
                    date: '2025-04-26',
                    endDate: '2025-04-27',
                    location: 'Nannestad',
                    club: 'Romerike Fuglehundklubb',
                    type: 'UK/AK',
                    status: 'completed',
                    dogs: [
                        { name: 'Max', class: 'AK', startNumber: 8, prize: '1. premie', points: 92 }
                    ]
                }
            ];
            localStorage.setItem('userTrials', JSON.stringify(trials));
        }

        let currentFilter = 'all';

        function init() {
            renderTrials();
        }

        function setFilter(filter) {
            currentFilter = filter;

            // Update button styles
            document.querySelectorAll('[id^="filter-"]').forEach(btn => {
                btn.classList.remove('bg-forest-600', 'text-white');
                btn.classList.add('bg-bark-200', 'text-bark-700');
            });
            document.getElementById('filter-' + filter).classList.remove('bg-bark-200', 'text-bark-700');
            document.getElementById('filter-' + filter).classList.add('bg-forest-600', 'text-white');

            renderTrials();
        }

        function renderTrials() {
            const container = document.getElementById('trialsList');
            const emptyState = document.getElementById('emptyState');

            let filteredTrials = trials;
            if (currentFilter === 'upcoming') {
                filteredTrials = trials.filter(t => t.status === 'upcoming');
            } else if (currentFilter === 'completed') {
                filteredTrials = trials.filter(t => t.status === 'completed');
            }

            if (filteredTrials.length === 0) {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            container.classList.remove('hidden');
            emptyState.classList.add('hidden');

            // Sort by date (upcoming first, then by date)
            filteredTrials.sort((a, b) => {
                if (a.status === 'upcoming' && b.status !== 'upcoming') return -1;
                if (a.status !== 'upcoming' && b.status === 'upcoming') return 1;
                return new Date(b.date) - new Date(a.date);
            });

            container.innerHTML = filteredTrials.map(trial => {
                const isUpcoming = trial.status === 'upcoming';
                const borderColor = isUpcoming ? 'border-forest-200' : 'border-earth-200';
                const statusBadge = isUpcoming
                    ? '<span class="text-xs bg-forest-100 text-forest-700 px-2 py-1 rounded-full">Kommende</span>'
                    : '<span class="text-xs bg-bark-100 text-bark-600 px-2 py-1 rounded-full">Fullført</span>';

                return `
                    <div class="bg-white rounded-2xl border ${borderColor} overflow-hidden">
                        <div class="p-5">
                            <div class="flex items-start justify-between mb-3">
                                <div>
                                    <h3 class="text-lg font-bold text-bark-800">${trial.name}</h3>
                                    <p class="text-sm text-bark-500">${trial.club}</p>
                                </div>
                                ${statusBadge}
                            </div>

                            <div class="grid grid-cols-2 gap-4 text-sm mb-4">
                                <div class="flex items-center gap-2 text-bark-600">
                                    <svg class="w-4 h-4 text-bark-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                    </svg>
                                    ${formatDateRange(trial.date, trial.endDate)}
                                </div>
                                <div class="flex items-center gap-2 text-bark-600">
                                    <svg class="w-4 h-4 text-bark-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    </svg>
                                    ${trial.location}
                                </div>
                            </div>

                            <!-- Dogs in trial -->
                            <div class="space-y-2">
                                ${trial.dogs.map(dog => `
                                    <div class="flex items-center justify-between bg-bark-50 rounded-lg px-3 py-2">
                                        <div class="flex items-center gap-3">
                                            <span class="w-8 h-8 bg-bark-200 rounded-full flex items-center justify-center text-sm font-bold text-bark-600">
                                                ${dog.startNumber || '-'}
                                            </span>
                                            <div>
                                                <p class="font-medium text-bark-700">${dog.name}</p>
                                                <p class="text-xs text-bark-500">${dog.class}</p>
                                            </div>
                                        </div>
                                        ${dog.prize
                                            ? `<span class="text-xs font-medium ${getPrizeColor(dog.prize)} px-2 py-1 rounded-full">${dog.prize}</span>`
                                            : ''
                                        }
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="bg-bark-50 px-5 py-3 border-t border-bark-100 flex justify-between items-center">
                            <span class="text-xs text-bark-500">${trial.type}</span>
                            <button onclick="viewDetails('${trial.id}')" class="text-forest-600 hover:text-forest-700 text-sm font-medium flex items-center gap-1">
                                Se detaljer
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function formatDateRange(startDate, endDate) {
            const start = new Date(startDate);
            const end = endDate ? new Date(endDate) : null;

            const options = { day: 'numeric', month: 'short' };
            const startStr = start.toLocaleDateString('nb-NO', options);

            if (end && end.getTime() !== start.getTime()) {
                const endStr = end.toLocaleDateString('nb-NO', options);
                return `${startStr} - ${endStr}`;
            }
            return startStr;
        }

        function getPrizeColor(prize) {
            if (prize.includes('1.')) return 'bg-amber-100 text-amber-700';
            if (prize.includes('2.')) return 'bg-gray-100 text-gray-600';
            if (prize.includes('3.')) return 'bg-orange-100 text-orange-700';
            return 'bg-bark-100 text-bark-600';
        }

        function viewDetails(trialId) {
            const trial = trials.find(t => t.id === trialId);
            if (!trial) return;

            document.getElementById('detailsTitle').textContent = trial.name;

            const isUpcoming = trial.status === 'upcoming';

            document.getElementById('detailsContent').innerHTML = `
                <div class="space-y-6">
                    <!-- Basic Info -->
                    <div class="space-y-3">
                        <div class="flex items-center gap-3 text-bark-600">
                            <svg class="w-5 h-5 text-bark-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                            <span>${formatDateRange(trial.date, trial.endDate)}</span>
                        </div>
                        <div class="flex items-center gap-3 text-bark-600">
                            <svg class="w-5 h-5 text-bark-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                            <span>${trial.location}</span>
                        </div>
                        <div class="flex items-center gap-3 text-bark-600">
                            <svg class="w-5 h-5 text-bark-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                            </svg>
                            <span>${trial.club}</span>
                        </div>
                    </div>

                    <!-- Dogs -->
                    <div>
                        <h4 class="font-semibold text-bark-700 mb-3">Påmeldte hunder</h4>
                        <div class="space-y-3">
                            ${trial.dogs.map(dog => `
                                <div class="bg-bark-50 rounded-xl p-4">
                                    <div class="flex items-center justify-between mb-2">
                                        <div class="flex items-center gap-3">
                                            <span class="w-10 h-10 bg-forest-100 rounded-full flex items-center justify-center text-lg font-bold text-forest-700">
                                                ${dog.startNumber || '-'}
                                            </span>
                                            <div>
                                                <p class="font-bold text-bark-800">${dog.name}</p>
                                                <p class="text-sm text-bark-500">${dog.class}</p>
                                            </div>
                                        </div>
                                    </div>
                                    ${dog.prize ? `
                                        <div class="mt-3 pt-3 border-t border-bark-200">
                                            <div class="flex items-center justify-between">
                                                <span class="text-sm text-bark-500">Resultat</span>
                                                <span class="font-semibold ${dog.prize.includes('1.') ? 'text-amber-600' : 'text-bark-700'}">${dog.prize}</span>
                                            </div>
                                            ${dog.points ? `
                                                <div class="flex items-center justify-between mt-1">
                                                    <span class="text-sm text-bark-500">Poeng</span>
                                                    <span class="font-medium text-bark-700">${dog.points}</span>
                                                </div>
                                            ` : ''}
                                        </div>
                                    ` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    ${isUpcoming ? `
                        <div class="pt-4 flex gap-3">
                            <button class="flex-1 bg-red-100 hover:bg-red-200 text-red-700 font-medium py-3 rounded-xl transition">
                                Meld av
                            </button>
                            <button class="flex-1 bg-forest-600 hover:bg-forest-700 text-white font-medium py-3 rounded-xl transition">
                                Se startnummer
                            </button>
                        </div>
                    ` : `
                        <div class="pt-4">
                            <button class="w-full bg-forest-600 hover:bg-forest-700 text-white font-medium py-3 rounded-xl transition flex items-center justify-center gap-2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                </svg>
                                Last ned kritikk
                            </button>
                        </div>
                    `}
                </div>
            `;

            document.getElementById('detailsModal').classList.remove('hidden');
        }

        function closeDetailsModal() {
            document.getElementById('detailsModal').classList.add('hidden');
        }

        function logout() {
            if (confirm('Er du sikker på at du vil logge ut?')) {
                localStorage.removeItem('judgeSession');
                window.location.href = 'index.html';
            }
        }

        // Initialize
        init();
    </script>
    <script src="dog-search.js"></script>
</body>
</html>
