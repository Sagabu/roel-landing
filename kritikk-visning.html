<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kritikkskjema - Fuglehundprøve</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        warm: { 50: '#FFF7F2', 100: '#FFE1CF', 200: '#EAD8CF', 300: '#E5C9B8', 400: '#D4A989', 500: '#FD8536', 600: '#E5721F', 700: '#C45F14', 800: '#6E3018', 900: '#4A1E0D' },
                        cream: { DEFAULT: '#F7F3EE', 50: '#FFFFFF', 100: '#F7F3EE', 200: '#FFF7F2', 300: '#EAD8CF' },
                        sky: { 50: '#FFF7F2', 100: '#FFE1CF', 200: '#EAD8CF', 300: '#FD8536', 400: '#E5721F', 500: '#FD8536', 600: '#E5721F', 700: '#C45F14' },
                        bark: { 50: '#F7F3EE', 100: '#FFF7F2', 200: '#EAD8CF', 300: '#D4A989', 400: '#B8977A', 500: '#9A8268', 600: '#7D6A54', 700: '#6E3018', 800: '#5A2812', 900: '#3D1B0C' }
                    },
                    fontFamily: {
                        'serif': ['Playfair Display', 'Georgia', 'serif'],
                        'sans': ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            main { padding: 0 !important; }
        }
    </style>
</head>
<body class="bg-cream min-h-screen font-sans">

    <!-- Header -->
    <header class="bg-bark-900/60 text-white backdrop-blur-sm shadow-lg no-print">
        <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="images/logo.png" alt="Fuglehundprøve logo" class="w-10 h-10">
                <div>
                    <h1 class="text-xl font-serif font-bold">Kritikkskjema</h1>
                    <p class="text-bark-400 text-xs" id="headerTrialName">Fuglehundprøve</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="window.print()" class="flex items-center gap-2 bg-warm-500 hover:bg-warm-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
                    </svg>
                    Skriv ut
                </button>
                <button onclick="goBack()" class="text-bark-300 hover:text-white text-sm flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                    Lukk
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div id="critiqueContent">
            <p class="text-center text-bark-500 py-12">Laster kritikk...</p>
        </div>
    </main>

    <script>
        const PARTIES = {
            ukak1: { name: 'UK/AK Parti 1' },
            ukak2: { name: 'UK/AK Parti 2' },
            ukak3: { name: 'UK/AK Parti 3' },
            ukak4: { name: 'UK/AK Parti 4' },
            vk1: { name: 'VK Kval Parti 1' },
            vk2: { name: 'VK Kval Parti 2' },
            vkfinale: { name: 'VK Finale' }
        };

        function goBack() {
            if (document.referrer) {
                history.back();
            } else {
                window.location.href = 'nkk-godkjenning.html';
            }
        }

        function loadCritique() {
            const params = new URLSearchParams(window.location.search);
            const partyId = params.get('party');
            const dogId = parseInt(params.get('dog'));

            if (!partyId || !dogId) {
                document.getElementById('critiqueContent').innerHTML = `
                    <div class="text-center py-12">
                        <p class="text-bark-500">Kritikk ikke funnet</p>
                        <a href="nkk-godkjenning.html" class="text-warm-800 hover:text-warm-800 mt-4 inline-block">Tilbake til oversikten</a>
                    </div>
                `;
                return;
            }

            const saved = localStorage.getItem('judgeData_' + partyId);
            if (!saved) {
                document.getElementById('critiqueContent').innerHTML = `
                    <div class="text-center py-12">
                        <p class="text-bark-500">Parti ikke funnet</p>
                        <a href="nkk-godkjenning.html" class="text-warm-800 hover:text-warm-800 mt-4 inline-block">Tilbake til oversikten</a>
                    </div>
                `;
                return;
            }

            const dogs = JSON.parse(saved);
            const dog = dogs.find(d => d.id === dogId);

            if (!dog) {
                document.getElementById('critiqueContent').innerHTML = `
                    <div class="text-center py-12">
                        <p class="text-bark-500">Hund ikke funnet</p>
                        <a href="nkk-godkjenning.html" class="text-warm-800 hover:text-warm-800 mt-4 inline-block">Tilbake til oversikten</a>
                    </div>
                `;
                return;
            }

            renderCritique(dog, partyId);
        }

        function renderCritique(dog, partyId) {
            const latestRound = dog.rounds[dog.rounds.length - 1];
            const s = latestRound.scores;
            const partyName = PARTIES[partyId]?.name || partyId;

            // Determine class from party
            const isVK = partyId.startsWith('vk');
            const isFinale = partyId === 'vkfinale';
            const isKval = partyId.startsWith('vk') && !isFinale;

            // Get trial name
            let trialName = 'Fuglehundprøve';
            try {
                fetch('/api/trial').then(r => r.json()).then(t => {
                    if (t.name) {
                        document.getElementById('headerTrialName').textContent = t.name;
                        document.getElementById('trialNameDisplay').textContent = t.name;
                    }
                });
            } catch (e) {}

            // Format prize with class
            function formatPrize(prizeStr, dogClass) {
                if (!prizeStr) return null;

                // VK prizes: 1.VK, 2.VK, etc.
                if (isVK) {
                    const vkMatch = prizeStr.match(/(\d)\.\s*(?:VK|premie)/i);
                    if (vkMatch) {
                        const num = vkMatch[1];
                        const suffix = isFinale ? 'Finale' : 'Kval';
                        const hasCK = prizeStr.toLowerCase().includes('ck') || (num === '1' || num === '2') && dog.hasCK;
                        return hasCK ? `${num}.VK ${suffix} m/CK` : `${num}.VK ${suffix}`;
                    }
                }

                // UK/AK prizes: 1.premie UK, 2.premie AK, etc.
                const premieMatch = prizeStr.match(/(\d)\.\s*premie/i);
                if (premieMatch) {
                    const num = premieMatch[1];
                    const klasse = dogClass || dog.class || 'UK'; // Default to UK if not specified
                    return `${num}. premie ${klasse}`;
                }

                return prizeStr;
            }

            const formattedPrize = formatPrize(dog.prize, dog.class);

            // Prize styling
            const prizeConfig = {
                '1': { bg: 'bg-gradient-to-r from-yellow-400 to-amber-500', text: 'text-white' },
                '2': { bg: 'bg-gradient-to-r from-gray-300 to-gray-400', text: 'text-gray-800' },
                '3': { bg: 'bg-gradient-to-r from-amber-600 to-amber-700', text: 'text-white' }
            };
            const prizeNum = formattedPrize?.match(/^(\d)/)?.[1] || '0';
            const prize = prizeConfig[prizeNum] || { bg: 'bg-bark-200', text: 'text-bark-700' };

            // Get dog image if available
            let dogImage = dog.image || null;
            try {
                const userDogs = JSON.parse(localStorage.getItem('userDogs') || '[]');
                const matchingDog = userDogs.find(d => d.regNr === dog.regNr || d.name === dog.name);
                if (matchingDog?.image) {
                    dogImage = matchingDog.image;
                }
            } catch (e) {}

            // Status badge
            const statusBadge = dog.critiqueStatus === 'approved'
                ? '<span class="inline-flex items-center gap-1 px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm font-medium"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>Godkjent av NKK</span>'
                : dog.critiqueStatus === 'returned'
                ? '<span class="inline-flex items-center gap-1 px-3 py-1 bg-amber-100 text-amber-700 rounded-full text-sm font-medium">Returnert til dommer</span>'
                : '<span class="inline-flex items-center gap-1 px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-sm font-medium">Venter godkjenning</span>';

            // Score color helper
            function scoreColor(val) {
                if (val >= 5) return 'bg-green-500 text-white';
                if (val >= 4) return 'bg-warm-500 text-white';
                if (val >= 3) return 'bg-sky-300 text-white';
                return 'bg-bark-300 text-bark-700';
            }

            document.getElementById('critiqueContent').innerHTML = `
                <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
                    <!-- Hero Header -->
                    <div class="bg-gradient-to-br from-bark-700 via-bark-800 to-bark-900 text-white p-8">
                        <div class="flex items-start justify-between">
                            <div class="flex items-center gap-6">
                                ${dogImage ? `
                                <div class="w-24 h-24 rounded-2xl overflow-hidden shadow-lg border-2 border-white/30">
                                    <img src="${dogImage}" alt="${dog.name}" class="w-full h-full object-cover">
                                </div>
                                ` : `
                                <div class="w-24 h-24 bg-white/20 backdrop-blur rounded-2xl flex items-center justify-center shadow-lg">
                                    <span class="text-5xl font-bold font-serif">${dog.nr}</span>
                                </div>
                                `}
                                <div>
                                    <h1 class="text-3xl font-bold font-serif mb-1">${dog.regNr ? `<span class="text-bark-300 font-mono text-2xl mr-3">${dog.regNr}</span>` : ''}${dog.name}</h1>
                                    <p class="text-bark-300 text-lg">${dog.breed}</p>
                                    <div class="flex items-center gap-4 mt-3 text-sm text-bark-400">
                                        <span>Fører: <strong class="text-white">${dog.handler}</strong></span>
                                        <span>Eier: <strong class="text-white">${dog.owner}</strong></span>
                                    </div>
                                </div>
                            </div>
                            ${formattedPrize ? `
                                <div class="${prize.bg} ${prize.text} px-6 py-4 rounded-xl shadow-lg text-center">
                                    <p class="text-xs uppercase tracking-wide opacity-80 mb-1">Premie</p>
                                    <p class="text-2xl font-bold">${formattedPrize}</p>
                                </div>
                            ` : ''}
                        </div>
                        <div class="flex items-center gap-4 mt-6 pt-6 border-t border-white/20">
                            <span class="text-bark-300">${partyName}</span>
                            <span class="text-bark-400">•</span>
                            <span id="trialNameDisplay" class="text-bark-300">${trialName}</span>
                            <span class="text-bark-400">•</span>
                            ${statusBadge}
                        </div>
                    </div>

                    <!-- Scores Section -->
                    <div class="p-8 bg-bark-50 border-b border-bark-200">
                        <h2 class="text-lg font-bold font-serif text-bark-700 mb-6">Vurdering</h2>

                        <!-- Character Scores Grid -->
                        <div class="grid grid-cols-6 gap-4 mb-8">
                            ${[
                                { key: 'JAKTLYST', abbr: 'JL', label: 'Jaktlyst' },
                                { key: 'FART', abbr: 'FA', label: 'Fart' },
                                { key: 'SELVSTENDIGHET', abbr: 'SE', label: 'Selvstendighet' },
                                { key: 'SOKSBREDDE', abbr: 'SB', label: 'Søksbredde' },
                                { key: 'REVIERING', abbr: 'RE', label: 'Reviering' },
                                { key: 'SAMARBEID', abbr: 'SA', label: 'Samarbeid' }
                            ].map(item => {
                                const val = s[item.key] ?? '-';
                                return `
                                    <div class="text-center">
                                        <div class="w-16 h-16 mx-auto ${typeof val === 'number' ? scoreColor(val) : 'bg-bark-200 text-bark-600'} rounded-2xl flex items-center justify-center shadow-md mb-2">
                                            <span class="text-2xl font-bold">${val}</span>
                                        </div>
                                        <p class="text-sm font-bold text-bark-600">${item.abbr}</p>
                                        <p class="text-xs text-bark-400">${item.label}</p>
                                    </div>
                                `;
                            }).join('')}
                        </div>

                        <!-- Detail Cards -->
                        <div class="grid grid-cols-2 gap-6">
                            <!-- Fuglebehandling -->
                            <div class="bg-white rounded-xl p-5 border-2 border-warm-200">
                                <h3 class="text-sm font-bold text-warm-800 uppercase tracking-wide mb-4 flex items-center gap-2">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
                                    </svg>
                                    Fuglebehandling
                                </h3>
                                <div class="space-y-3">
                                    <div class="flex items-center justify-between py-2 border-b border-bark-100">
                                        <span class="text-bark-600">Presisjon</span>
                                        <span class="text-xl font-bold text-bark-800">${s.PRESISJON ?? '-'}</span>
                                    </div>
                                    <div class="flex items-center justify-between py-2">
                                        <span class="text-bark-600">Reising</span>
                                        <div class="flex items-center gap-2">
                                            <span class="text-xl font-bold text-bark-800">${s.REISING ?? '-'}</span>
                                            ${s.GODKJENT_REISING ? '<span class="px-2 py-1 bg-green-100 text-green-700 text-xs rounded-full font-medium">Godkjent</span>' : ''}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Stand -->
                            <div class="bg-white rounded-xl p-5 border-2 border-bark-200">
                                <h3 class="text-sm font-bold text-bark-700 uppercase tracking-wide mb-4 flex items-center gap-2">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                    </svg>
                                    Stand
                                </h3>
                                <div class="space-y-3">
                                    <div class="flex items-center justify-between py-2 border-b border-bark-100">
                                        <span class="text-bark-600">Med makker</span>
                                        <span class="text-xl font-bold text-bark-800">${s.STAND_M ?? '-'}</span>
                                    </div>
                                    <div class="flex items-center justify-between py-2 border-b border-bark-100">
                                        <span class="text-bark-600">Uten makker</span>
                                        <span class="text-xl font-bold text-bark-800">${s.STAND_U ?? '-'}</span>
                                    </div>
                                    <div class="flex items-center justify-between py-2">
                                        <span class="text-bark-600">Tomstand</span>
                                        <span class="text-xl font-bold text-bark-800">${s.TOMSTAND ?? '-'}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>


                    <!-- Critique Text -->
                    <div class="p-8">
                        <h2 class="text-lg font-bold font-serif text-bark-700 mb-4">Kritikk</h2>
                        <div class="bg-warm-50 border-2 border-warm-200 rounded-xl p-6">
                            <p class="text-bark-800 leading-relaxed text-lg whitespace-pre-wrap">${dog.critique || 'Ingen kritikk skrevet'}</p>
                        </div>
                    </div>

                    <!-- Footer / Signatures -->
                    <div class="px-8 py-6 bg-bark-100 border-t border-bark-200">
                        <div class="flex justify-between items-end">
                            <div>
                                <p class="text-xs text-bark-400 uppercase tracking-wide mb-1">Dommer</p>
                                <p class="font-bold text-bark-800 text-lg">${dog.critiqueSubmittedBy || '-'}</p>
                                <p class="text-sm text-bark-500">${dog.critiqueSubmittedAt ? new Date(dog.critiqueSubmittedAt).toLocaleDateString('nb-NO', { day: 'numeric', month: 'long', year: 'numeric' }) : '-'}</p>
                            </div>
                            ${dog.critiqueStatus === 'approved' ? `
                            <div class="text-right">
                                <p class="text-xs text-bark-400 uppercase tracking-wide mb-1">Godkjent av NKK</p>
                                <p class="font-bold text-green-700 text-lg">${dog.approvedBy || 'NKK-representant'}</p>
                                <p class="text-sm text-bark-500">${dog.approvedAt ? new Date(dog.approvedAt).toLocaleDateString('nb-NO', { day: 'numeric', month: 'long', year: 'numeric' }) : '-'}</p>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        // Load on page ready
        loadCritique();
    </script>
</body>
</html>
