<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kritikk — Fuglehundprøve</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        /* A4-inspirert layout som matcher FKF-jaktprøveskjemaet */
        :root {
            --ink: #1a1a1a;
            --line: #333;
            --muted: #555;
            --page-bg: #eee;
            --paper-bg: #fff;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--page-bg);
            font-family: Arial, Helvetica, sans-serif;
            color: var(--ink);
            font-size: 11px;
            line-height: 1.3;
        }
        .topbar {
            background: #3D1B0C;
            color: #fff;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar h1 { font-size: 15px; margin: 0; font-weight: 600; }
        .topbar .actions { display: flex; gap: 8px; }
        .topbar button, .topbar a {
            background: #FD8536;
            color: #fff;
            border: 0;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            text-decoration: none;
            cursor: pointer;
        }
        .topbar a.secondary { background: transparent; color: #ddd; }
        main { padding: 16px; }
        .sheet {
            background: var(--paper-bg);
            max-width: 1000px;
            margin: 0 auto;
            padding: 18px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        /* Overstyr global mobile-fix.css som setter table { display: block }
           — det knekker width:100% for layout-tabeller i kritikkskjemaet. */
        .sheet table {
            display: table !important;
            overflow-x: visible !important;
        }
        /* Header-tabellen: kompakt grid med label + verdi i SAMME celle.
           Liten label-tekst øverst, verdi som hovedinnhold under.
           table-layout: fixed tvinger jevn kolonnebredde og full strekking
           til høyre kant av .sheet (matcher bredden på body-grid under). */
        table.hdr {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 8px;
            table-layout: fixed;
        }
        table.hdr td .value {
            overflow-wrap: anywhere;
        }
        table.hdr td {
            border: 1px solid var(--line);
            padding: 3px 6px;
            vertical-align: top;
            font-size: 11px;
            line-height: 1.2;
        }
        table.hdr td .label {
            display: block;
            font-weight: 700;
            font-size: 8.5px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: var(--muted);
            margin-bottom: 2px;
        }
        table.hdr td .value {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: var(--ink);
            min-height: 13px;
        }
        /* To-kolonne: kritikktekst venstre, strukturerte tall høyre */
        .body-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 6px;
        }
        .critique-text {
            border: 1px solid var(--line);
            padding: 6px 8px;
            min-height: 340px;
            white-space: pre-wrap;
            font-size: 10.5px;
            line-height: 1.4;
        }
        table.scores {
            width: 100%;
            border-collapse: collapse;
        }
        table.scores td {
            border: 1px solid var(--line);
            padding: 3px 6px;
            font-size: 10px;
            vertical-align: middle;
        }
        table.scores td.label {
            font-weight: 700;
            background: #f5efe8;
            white-space: nowrap;
            font-size: 9.5px;
        }
        table.scores td.val {
            text-align: center;
            font-weight: 600;
            width: 34px;
            font-size: 11px;
        }
        table.scores td.val.blank { background: repeating-linear-gradient(45deg, transparent, transparent 4px, #f0f0f0 4px, #f0f0f0 5px); }
        /* Spacer dytter høyre label/val-par helt ut mot tabellens høyre kant */
        table.scores td.spacer {
            border: 0;
            background: transparent;
            width: 100%;
            padding: 0;
        }
        /* Helt tom rad (separator) — usynlig, gir bare høyde */
        table.scores td.empty-row {
            border: 0;
            background: transparent;
            height: 14px;
            padding: 0;
        }
        /* Tom venstre celle der labelen er flyttet ut til høyre */
        table.scores td.empty-left {
            border: 0;
            background: transparent;
            padding: 0;
        }
        table.scores .section {
            background: #e8ded0;
            font-weight: 700;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            padding: 3px 6px;
        }
        table.scores td.sub {
            font-size: 9px;
            font-style: italic;
            color: var(--muted);
            background: #faf7f3;
        }
        /* Bunnseksjon: Sekundering / Apport / Rapport spontan / Adferd /
           Premie + chips. 4-kolonne tabell med rowspan på Sekundering og
           Premie. Matcher FKF jaktprøveskjemaets layout. */
        table.scores.bottom-block {
            margin-top: 8px;
            table-layout: fixed;
        }
        table.scores.bottom-block td {
            padding: 4px 6px;
            font-size: 10px;
            vertical-align: middle;
        }
        table.scores.bottom-block td.label {
            font-weight: 700;
            background: #f5efe8;
            white-space: nowrap;
            font-size: 10px;
        }
        table.scores.bottom-block td.sek-label,
        table.scores.bottom-block td.premie-label {
            line-height: 1.3;
        }
        table.scores.bottom-block .premie-value-inline {
            display: block;
            font-weight: 700;
            font-size: 13px;
            margin-top: 2px;
        }
        table.scores.bottom-block td.chip-cell {
            text-align: center;
            font-weight: 700;
            font-size: 10px;
            background: #fff;
            border: 1px solid var(--line);
        }
        table.scores.bottom-block td.chip-cell.on {
            background: #3D1B0C;
            color: #fff;
        }
        /* Signatur nederst */
        .sig {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-top: 14px;
            padding-top: 8px;
            border-top: 1px solid #ccc;
            font-size: 10px;
        }
        .sig .slot { }
        .sig .slot b { display: block; font-size: 9px; margin-bottom: 12px; color: var(--muted); }
        .sig .line { border-bottom: 1px solid var(--line); min-height: 14px; }
        /* Status banner */
        .status-banner {
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 10px;
            text-align: center;
        }
        .status-banner.approved { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
        .status-banner.pending { background: #dbeafe; color: #1e3a8a; border: 1px solid #93c5fd; }
        .status-banner.returned { background: #fef3c7; color: #78350f; border: 1px solid #fcd34d; }
        .status-banner.draft { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }

        /* Print: fjern topbar, gjør det til A4 */
        @media print {
            .no-print { display: none !important; }
            body { background: #fff; font-size: 10px; }
            main { padding: 0; }
            .sheet { box-shadow: none; max-width: none; padding: 10px; }
            @page { size: A4 landscape; margin: 10mm; }
        }

        /* Fotnote med skala-beskrivelser */
        .skala-note {
            margin-top: 12px;
            padding-top: 6px;
            border-top: 1px dashed #999;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            font-size: 8.5px;
            color: var(--muted);
        }
        .skala-note b { color: var(--ink); font-size: 9px; }
    </style>
</head>
<body>

<header class="topbar no-print">
    <h1>Kritikkskjema</h1>
    <div class="actions">
        <button onclick="window.print()">Skriv ut</button>
        <a href="#" class="secondary" onclick="goBack(event)">Lukk</a>
    </div>
</header>

<main>
    <div id="critiqueContent" class="sheet">
        <p style="text-align:center;color:#888;padding:40px 0;">Laster kritikk...</p>
    </div>
</main>

<script>
    const params = new URLSearchParams(window.location.search);
    const kritikkId = params.get('kritikk_id') || params.get('id');
    // Legacy: party+dog fra gammelt nkk-godkjenning — krever oppslag for å finne kritikk_id
    const legacyParty = params.get('party');
    const legacyDog = params.get('dog');

    function goBack(e) {
        if (e) e.preventDefault();
        if (document.referrer) history.back();
        else window.location.href = 'nkk-godkjenning.html';
    }

    function fmt(val, dash = '') {
        return (val === null || val === undefined || val === '') ? dash : String(val);
    }

    function fmtDato(isoStr) {
        if (!isoStr) return '';
        try {
            const d = new Date(isoStr);
            if (isNaN(d.getTime())) return isoStr;
            return d.toLocaleDateString('no-NO', { day: '2-digit', month: '2-digit', year: 'numeric' });
        } catch (e) { return isoStr; }
    }

    // Premie-parser: trekker ut CACIT/ResCacit/CK/Finale/Semifinale/ÆP-flagg
    function parsePremie(premieStr) {
        const s = (premieStr || '').toUpperCase();
        return {
            text: premieStr || '',
            cacit: /\bCACIT\b/.test(s),
            resCacit: /\bRES\.?CACIT\b/.test(s) || /\bRESCACIT\b/.test(s),
            ck: /\bCK\b/.test(s),
            finale: /\bFINALE\b/.test(s),
            semifinale: /\bSEMIFINALE\b/.test(s),
            aep: /\bÆP\b/.test(s) || /\bAEP\b/.test(s)
        };
    }

    function chip(label, active) {
        return `<span class="chip${active ? ' on' : ''}">${label}</span>`;
    }

    function statusBanner(status, approved_at) {
        if (status === 'godkjent' || status === 'approved') {
            return `<div class="status-banner approved">✓ Godkjent av NKK-representant${approved_at ? ' — ' + fmtDato(approved_at) : ''}</div>`;
        }
        if (status === 'returned' || status === 'returnert') {
            return `<div class="status-banner returned">Returnert til dommer</div>`;
        }
        if (status === 'submitted' || status === 'innsendt') {
            return `<div class="status-banner pending">Venter NKK-godkjenning</div>`;
        }
        return `<div class="status-banner draft">Utkast</div>`;
    }

    function render(data) {
        const k = data.kritikk;
        const hund = data.hund || {};
        const eier = data.eier || {};
        const forer = data.forer || {};
        const prove = data.prove || {};
        const parti = data.parti || {};
        const dommere = data.dommere || [];
        const prem = parsePremie(k.premie);

        // Byggere for scores-tabellen
        const cell = (v) => (v === null || v === undefined) ? '<td class="val"></td>' : `<td class="val">${v}</td>`;
        const yn = (v) => v === 1 ? 'Ja' : (v === 2 ? 'Nei' : (v ? v : '—'));

        // Fuglebehandling: 5 hvite bokser per rad (én pr fuglearbeid).
        // Presisjon + Reising har tallkarakter i første boks. Godkjent
        // reising er en kryss-indikator (ikke tall). Ingen sum — disse
        // skal ikke summeres.
        const emptyBox = '<td class="val"></td>';
        const numBox = (v) => (v === null || v === undefined || v === '') ? emptyBox : `<td class="val">${v}</td>`;
        const checkBox = (v) => `<td class="val">${v ? '✓' : ''}</td>`;
        const fugleBehandling = `
            <tr><td class="section" colspan="6">Fuglebehandling <span style="font-weight:400;font-style:italic;font-size:8.5px;">(tallkarakter for hvert fuglearbeid)</span></td></tr>
            <tr>
                <td class="label">Presisjon</td>
                ${numBox(k.presisjon)}${emptyBox}${emptyBox}${emptyBox}${emptyBox}
            </tr>
            <tr>
                <td class="label">Reising</td>
                ${numBox(k.reising)}${emptyBox}${emptyBox}${emptyBox}${emptyBox}
            </tr>
            <tr>
                <td class="label">Godkjent reising</td>
                ${checkBox(k.godkjent_reising)}${emptyBox}${emptyBox}${emptyBox}${emptyBox}
            </tr>
            <tr><td class="val" colspan="6">&nbsp;</td></tr>
        `;

        // Hovedrader: 7 like store firkanter (én pr fuglearbeid) mellom
        // venstre label og høyre label. Første firkant kan inneholde verdi.
        // Match for FKF jaktprøveskjemaets 7-arbeids-kolonner.
        const numOrBlank = (v) => (v === null || v === undefined || v === '') ? '' : v;
        const sevenBoxes = (firstVal) => {
            return `<td class="val">${numOrBlank(firstVal)}</td>` + '<td class="val"></td>'.repeat(6);
        };
        const hovedRader = `
            <tr>
                <td class="label">Slipptid</td>
                ${sevenBoxes(k.slipptid)}
                <td class="label">Jaktlyst</td>${cell(k.jaktlyst)}
            </tr>
            <tr>
                <td class="label">Stand m/makker</td>
                ${sevenBoxes(k.stand_m)}
                <td class="label">Fart</td>${cell(k.fart)}
            </tr>
            <tr>
                <td class="label">Stand u/makker</td>
                ${sevenBoxes(k.stand_u)}
                <td class="label">Selvstendighet</td>${cell(k.selvstendighet)}
            </tr>
            <tr>
                <td class="label">Tomstand</td>
                ${sevenBoxes(k.tomstand)}
                <td class="label">Søksbredde</td>${cell(k.soksbredde)}
            </tr>
            <tr>
                <td class="label">Makkers stand</td>
                ${sevenBoxes(k.makker_stand)}
                <td class="label">Reviering</td>${cell(k.reviering)}
            </tr>
            <tr>
                <td class="label">Sjanse på fugl</td>
                ${sevenBoxes(k.sjanse)}
                <td class="label">Samarbeid</td>${cell(k.samarbeid)}
            </tr>
        `;

        // Bunnseksjon: Sekundering, Apport, Rapport spontan, Adferd, Premie.
        // 4-kolonne grid med rowspan på Sekundering og Premie. Matcher
        // FKF jaktprøveskjemaets layout for denne nedre delen.
        const chipCell = (label, active) => `<td class="chip-cell${active ? ' on' : ''}">${label}</td>`;
        const bottomSection = `
            <tr>
                <td rowspan="2" class="label sek-label">Sekundering<br><span style="font-weight:400;font-size:8.5px;">(antall)</span></td>
                <td class="label" colspan="2">Spontan</td>
                <td class="val">${fmt(k.sek_spontan, 0)}</td>
            </tr>
            <tr>
                <td class="label" colspan="2">Går forbi</td>
                <td class="val">${fmt(k.sek_forbi, 0)}</td>
            </tr>
            <tr>
                <td class="label" colspan="3">Apport <span style="font-weight:400;font-size:8.5px;">Godkjent=1  Ikke godkj.=2</span></td>
                <td class="val">${fmt(k.apport, '')}</td>
            </tr>
            <tr>
                <td class="label" colspan="4">Rapport spontan</td>
            </tr>
            <tr>
                <td class="label">Adferd</td>
                <td class="label" colspan="2">Ikke ønsket</td>
                <td class="val">${k.adferd ? '✓' : ''}</td>
            </tr>
            <tr>
                <td rowspan="2" class="label premie-label">Premie<br><span class="premie-value-inline">${fmt(prem.text, '')}</span></td>
                ${chipCell('CACIT', prem.cacit)}
                ${chipCell('ResCacit', prem.resCacit)}
                ${chipCell('CK', prem.ck)}
            </tr>
            <tr>
                ${chipCell('Finale', prem.finale)}
                ${chipCell('Semifinale', prem.semifinale)}
                ${chipCell('ÆP', prem.aep)}
            </tr>
        `;

        const scoresTable = `
            <table class="scores">${fugleBehandling}</table>
            <table class="scores">${hovedRader}</table>
            <table class="scores bottom-block">${bottomSection}</table>
        `;

        // Header-tabell — label og verdi i SAMME celle (label øverst i lite,
        // verdi som hovedinnhold under). Hver celle = ett felt.
        const cellHtml = (label, value, colspan) => {
            const cs = colspan && colspan > 1 ? ` colspan="${colspan}"` : '';
            return `<td${cs}><span class="label">${label}</span><span class="value">${value || '&nbsp;'}</span></td>`;
        };
        const foreldreVerdi = [
            hund.far ? 'Far: ' + hund.far : '',
            hund.mor ? 'Mor: ' + hund.mor : ''
        ].filter(Boolean).join('  •  ');
        const dommereVerdi = dommere.map(d => d.navn).join(', ') || fmt(data.dommer_hovedansvarlig);

        const hdr = `
            <table class="hdr">
                <tr>
                    ${cellHtml('Klasse', fmt(k.klasse))}
                    ${cellHtml('Parti', fmt(parti.navn))}
                    ${cellHtml('Ref.nr', fmt(prove.nkk_ref_nr))}
                    ${cellHtml('Rase', fmt(hund.rase))}
                    ${cellHtml('Reg.nr.', fmt(hund.regnr))}
                    ${cellHtml('Navn', fmt(hund.navn))}
                    ${cellHtml('Dato', fmtDato(k.dato))}
                </tr>
                <tr>
                    ${cellHtml('Eier', fmt(eier.navn), 2)}
                    ${cellHtml('Adresse', fmt(eier.adresse), 2)}
                    ${cellHtml('Postnr./sted', [eier.postnummer, eier.sted].filter(Boolean).join(' '), 2)}
                    ${cellHtml('Telefon', fmt(eier.telefon))}
                </tr>
                <tr>
                    ${cellHtml('Fører', fmt(forer.navn), 3)}
                    ${cellHtml('Hundens foreldre', foreldreVerdi, 4)}
                </tr>
                <tr>
                    ${cellHtml('Prøvested', fmt(prove.sted || prove.navn), 3)}
                    ${cellHtml('Dommer(e)', dommereVerdi, 4)}
                </tr>
            </table>
        `;

        // Signatur-rad
        const sig = `
            <div class="sig">
                <div class="slot"><b>Prøvested</b><div class="line"></div></div>
                ${dommere.slice(0, 2).map(d => `
                    <div class="slot"><b>Dommer${d.rolle ? ' ' + d.rolle : ''}${d.begrunnelse_type && d.begrunnelse_type !== 'dommer' ? ' (' + d.begrunnelse_type + ')' : ''}</b><div class="line">${d.navn || ''}</div></div>
                `).join('')}
                ${dommere.length < 2 ? `<div class="slot"><b>Dommer</b><div class="line"></div></div>` : ''}
                ${dommere.length < 1 ? `<div class="slot"><b>Dommer</b><div class="line"></div></div>` : ''}
            </div>
        `;

        // Skala-beskrivelser som fotnote
        const skala = `
            <div class="skala-note">
                <div><b>Jaktlyst</b> 1=mangler • 2=lav • 3=moderat • 4=god • 5=høy • 6=særdeles høy</div>
                <div><b>Fart</b> 1=lav • 2=moderat • 3=god • 4=stor • 5=meget • 6=særdeles</div>
                <div><b>Selvstendighet</b> 1=helt avh. makker … 6=helt selvstendig</div>
                <div><b>Søksbredde</b> 1=liten … 4=utmerket … 6=alt for stor</div>
                <div><b>Reviering</b> 1=planløs … 4=utmerket … 6=alt for åpen</div>
                <div><b>Samarbeid</b> 1=førerfiksert … 4=utmerket … 6=samarbeider ikke</div>
                <div><b>Presisjon</b> 1=meget upresis • 2=upresis • 3=noe upresis • 4=presis</div>
                <div><b>Reising</b> 1=nekter • 2=svært forsiktig • 3=forsiktig • 4=kontrollert • 5=villig • 6=djerv</div>
            </div>
        `;

        document.getElementById('critiqueContent').innerHTML = `
            ${statusBanner(k.status, k.approved_at)}
            ${hdr}
            <div class="body-grid">
                <div class="critique-text">${fmt(k.kritikk_tekst, '—').replace(/</g, '&lt;').replace(/\n/g, '\n')}</div>
                <div>${scoresTable}</div>
            </div>
            ${sig}
            ${skala}
        `;

        document.title = `Kritikk — ${hund.navn || ''} ${hund.regnr || ''}`.trim();
    }

    // Preview-modus: vis mock-data så design kan inspiseres uten å ha
    // en ekte kritikk i databasen. Trigges av ?preview=1 i URL-en.
    function getPreviewData() {
        return {
            kritikk: {
                klasse: 'AK',
                slipptid: 60,
                jaktlyst: 5,
                fart: 4,
                selvstendighet: 5,
                soksbredde: 4,
                reviering: 4,
                samarbeid: 4,
                stand_m: 1,
                stand_u: 2,
                tomstand: 0,
                makker_stand: 0,
                sjanse: 0,
                sek_spontan: 1,
                sek_forbi: 0,
                rapport_spontan: 0,
                presisjon: 4,
                reising: 4,
                godkjent_reising: 4,
                apport: 1,
                adferd: '',
                premie: '1.AK m/CK',
                kritikk_tekst: 'Hund som starter med høy jaktlyst og god fart. Søker bredt og selvstendig i godt revier. Tar ut to støtt staende fugler — første presisjon noe upresis men reises kontrollert og felles på kommando. Andre stand presisjon, kontrollert reising og godkjent felling. Sekunderer makker spontant og korrekt. Apportoppgave løst tilfredsstillende. God dag.',
                dato: '2026-04-25',
                status: 'godkjent',
                approved_at: '2026-04-25 16:30:00'
            },
            hund: {
                navn: 'Eksempel Bella av Fjellet',
                regnr: 'NO12345/22',
                rase: 'Engelsk Setter',
                far: 'Fjellets Storm NO22341/19',
                mor: 'Bjerkaasens Tira NO38522/20'
            },
            eier: {
                navn: 'Ola Nordmann',
                adresse: 'Fjellveien 12',
                postnummer: '7340',
                sted: 'Oppdal',
                telefon: '99988877'
            },
            forer: {
                navn: 'Kari Nordmann'
            },
            prove: {
                navn: 'Eksempelprøven 2026',
                sted: 'Lifjellet',
                nkk_ref_nr: 'NKK-2026-1234'
            },
            parti: {
                navn: 'UK/AK Parti 1'
            },
            dommere: [
                { navn: 'Per Hansen', rolle: '1', begrunnelse_type: 'dommer' },
                { navn: 'Liv Olsen', rolle: '2', begrunnelse_type: 'dommer' }
            ]
        };
    }

    async function load() {
        // Preview-modus
        if (params.get('preview') === '1' || params.get('preview') === 'true') {
            render(getPreviewData());
            return;
        }

        try {
            let id = kritikkId;
            // Legacy fallback — prøv å finne kritikk_id via party+dog-parametere
            // (gammelt nkk-godkjenning-format). Går direkte til feilmelding hvis ingen ID.
            if (!id) {
                document.getElementById('critiqueContent').innerHTML = `
                    <p style="text-align:center;padding:30px;color:#666;">
                        Ingen kritikk-ID angitt.<br>
                        Vil du se layouten? Bruk <a href="?preview=1" style="color:#FD8536;">?preview=1</a> for forhåndsvisning med eksempel-data.<br><br>
                        <a href="nkk-godkjenning.html" style="color:#FD8536;">Tilbake til oversikten</a>
                    </p>`;
                return;
            }
            const resp = await fetch(`/api/kritikker/${encodeURIComponent(id)}/visning`);
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                document.getElementById('critiqueContent').innerHTML = `
                    <p style="text-align:center;padding:30px;color:#c00;">
                        Kunne ikke hente kritikk: ${err.error || resp.status}
                    </p>`;
                return;
            }
            const data = await resp.json();
            render(data);
        } catch (e) {
            document.getElementById('critiqueContent').innerHTML = `
                <p style="text-align:center;padding:30px;color:#c00;">
                    Feil: ${e.message}
                </p>`;
        }
    }

    load();
</script>
</body>
</html>
