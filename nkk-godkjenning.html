<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NKK Godkjenning - Kritikkskjemaer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: { DEFAULT: '#E7DAC8', 50: '#FAF7F3', 100: '#F5F0E8', 200: '#E7DAC8', 300: '#D4C4A8', 400: '#C1AE88', 500: '#AE9868' },
                        forest: { 50: '#f6f7f4', 100: '#e3e7dc', 200: '#c7d0ba', 300: '#a4b391', 400: '#839770', 500: '#657a53', 600: '#4f6040', 700: '#3f4c34', 800: '#343e2d', 900: '#2c3526', 950: '#151a12' },
                        earth: { 50: '#faf6f2', 100: '#f3ebe0', 200: '#e6d5c0', 300: '#d5b899', 400: '#c49a72', 500: '#b88255', 600: '#aa6e48', 700: '#8e583d', 800: '#734837', 900: '#5e3c2f', 950: '#321e17' },
                        bark: { 50: '#f7f5f4', 100: '#edeae7', 200: '#ddd6d0', 300: '#c7bcb2', 400: '#ae9d90', 500: '#9a8677', 600: '#8d776a', 700: '#756259', 800: '#61524b', 900: '#50453f', 950: '#2a2321' }
                    },
                    fontFamily: { 'rockwell': ['Rockwell', 'Rockwell Nova', 'Roboto Slab', 'Georgia', 'serif'] }
                }
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rockwell&display=swap" rel="stylesheet">
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .critique-document { box-shadow: none !important; border: none !important; }
        }
    </style>
</head>
<body class="bg-cream min-h-screen">

    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-700 to-blue-800 text-white sticky top-0 z-50 shadow-lg no-print">
        <div class="max-w-5xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-rockwell font-bold">NKK Godkjenning</h1>
                        <p class="text-blue-200 text-sm" id="trialName">Kritikkskjemaer til godkjenning</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <a href="min-side.html" class="text-blue-200 hover:text-white text-sm flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                        </svg>
                        Min side
                    </a>
                    <div class="text-right">
                        <p class="text-xs text-blue-200">NKK-representant</p>
                        <p class="font-semibold" id="nkkRepName">-</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-4 py-6">
        <!-- Stats -->
        <div class="grid grid-cols-3 gap-4 mb-6 no-print">
            <div class="bg-white rounded-xl p-4 border-2 border-blue-200 shadow-sm">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center">
                        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-sm text-bark-500">Venter godkjenning</p>
                        <p class="text-2xl font-bold text-blue-600" id="pendingCount">0</p>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-4 border-2 border-green-200 shadow-sm">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center">
                        <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-sm text-bark-500">Godkjent</p>
                        <p class="text-2xl font-bold text-green-600" id="approvedCount">0</p>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-4 border-2 border-amber-200 shadow-sm">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-amber-100 rounded-full flex items-center justify-center">
                        <svg class="w-5 h-5 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-sm text-bark-500">Returnert</p>
                        <p class="text-2xl font-bold text-amber-600" id="returnedCount">0</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filter -->
        <div class="flex items-center justify-between mb-4 no-print">
            <select id="partyFilter" onchange="filterByParty(this.value)"
                class="bg-white border-2 border-bark-200 rounded-xl px-4 py-2 text-sm font-medium text-bark-700 focus:border-blue-500 focus:outline-none">
                <option value="all">Alle partier</option>
            </select>
        </div>

        <!-- Pending critiques -->
        <div id="pendingSection" class="mb-8">
            <h2 class="text-lg font-bold font-rockwell text-bark-700 mb-4 flex items-center gap-2">
                <span class="w-3 h-3 bg-blue-500 rounded-full animate-pulse"></span>
                Venter på godkjenning
            </h2>
            <div id="pendingList" class="space-y-4">
                <!-- Rendered by JS -->
            </div>
        </div>

        <!-- Approved critiques -->
        <div id="approvedSection">
            <h2 class="text-lg font-bold font-rockwell text-bark-700 mb-4 flex items-center gap-2">
                <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                Godkjente kritikker
            </h2>
            <div id="approvedList" class="space-y-4">
                <!-- Rendered by JS -->
            </div>
        </div>
    </main>

    <!-- Review Modal -->
    <div id="reviewModal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-bark-100 rounded-2xl max-w-3xl w-full max-h-[95vh] overflow-hidden flex flex-col shadow-2xl">
            <!-- Modal Header -->
            <div class="px-6 py-4 bg-white border-b border-bark-200 flex items-center justify-between no-print">
                <div>
                    <h2 class="font-bold font-rockwell text-xl text-bark-800">Gjennomgå kritikk</h2>
                    <p class="text-bark-500 text-sm" id="reviewDogName">-</p>
                </div>
                <button onclick="hideReview()" class="p-2 hover:bg-bark-100 rounded-lg transition text-bark-500">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <!-- Critique Document -->
            <div class="flex-1 overflow-y-auto p-6">
                <div id="critiquePreview" class="critique-document">
                    <!-- Generated critique document -->
                </div>
            </div>

            <!-- Action Buttons -->
            <div id="actionButtons" class="p-4 bg-white border-t border-bark-200 space-y-3 no-print">
                <!-- Buttons will be rendered by JS based on status -->
            </div>
        </div>
    </div>

    <script>
        // Dynamic party name resolver
        function getPartyName(partyId) {
            const id = partyId.toUpperCase();

            // VK-partier
            if (id.startsWith('V') || id.includes('VK')) {
                const isFinale = id.includes('FINALE') || id.includes('FIN');
                return isFinale ? 'VK Finale' : `VK Parti ${partyId}`;
            }

            // UK/AK-partier (A1, A2, B1, osv.)
            if (/^[A-Z]\d+$/.test(id)) {
                return `UK/AK Parti ${partyId}`;
            }

            // Fallback for gamle format
            const legacyNames = {
                ukak1: 'UK/AK Parti 1',
                ukak2: 'UK/AK Parti 2',
                ukak3: 'UK/AK Parti 3',
                ukak4: 'UK/AK Parti 4',
                vk1: 'VK Kval Parti 1',
                vk2: 'VK Kval Parti 2',
                vkfinale: 'VK Finale'
            };

            return legacyNames[partyId.toLowerCase()] || `Parti ${partyId}`;
        }

        // Raseforkortelser - offisielle forkortelser
        const BREED_CODES = {
            'breton': 'BR',
            'gordon setter': 'GS',
            'irsk setter': 'IS',
            'engelsk setter': 'ES',
            'pointer': 'PO',
            'kleiner munsterlander': 'KM',
            'korthår vorsteh': 'KV',
            'korthåret vorsteh': 'KV',
            'korthåra vorsteh': 'KV',
            'langhåra vorsteh': 'LV',
            'langhåret vorsteh': 'LV',
            'strihår vorsteh': 'SV',
            'strihåret vorsteh': 'SV',
            'stråhåret vorsteh': 'SV'
        };

        function getBreedCode(breed) {
            if (!breed) return 'UK';
            const lower = breed.toLowerCase().trim();
            return BREED_CODES[lower] || breed.substring(0, 2).toUpperCase();
        }

        let allCritiques = [];
        let currentReview = null;
        let currentFilter = 'all';
        let nkkRepInfo = null;

        // Load NKK rep info from logged in user session
        async function loadNkkRepInfo() {
            // Try judgeSession first
            const session = localStorage.getItem('judgeSession');
            console.log('judgeSession:', session);

            if (session) {
                try {
                    const sessionData = JSON.parse(session);
                    console.log('Parsed session:', sessionData);
                    nkkRepInfo = {
                        name: sessionData.name || 'NKK-representant',
                        phone: sessionData.phone || ''
                    };
                    document.getElementById('nkkRepName').textContent = nkkRepInfo.name;
                } catch (e) {
                    console.error('Error parsing session:', e);
                }
            }

            // Fallback to userProfile if no judgeSession
            if (!nkkRepInfo || !nkkRepInfo.name || nkkRepInfo.name === 'NKK-representant') {
                const profile = localStorage.getItem('userProfile');
                console.log('userProfile:', profile);
                if (profile) {
                    try {
                        const profileData = JSON.parse(profile);
                        console.log('Parsed profile:', profileData);
                        nkkRepInfo = {
                            name: profileData.name || profileData.fullName || 'NKK-representant',
                            phone: profileData.phone || ''
                        };
                        document.getElementById('nkkRepName').textContent = nkkRepInfo.name;
                    } catch (e) {
                        console.error('Error parsing profile:', e);
                    }
                }
            }

            // Load trial name
            try {
                const resp = await fetch('/api/trial');
                if (resp.ok) {
                    const trial = await resp.json();
                    if (trial.name) {
                        document.getElementById('trialName').textContent = trial.name;
                    }
                }
            } catch (e) {}
        }

        // Clean up old test data from ukak1 if it contains fake dogs
        function cleanupTestData() {
            const ukak1Data = localStorage.getItem('judgeData_ukak1');
            if (ukak1Data) {
                try {
                    const dogs = JSON.parse(ukak1Data);
                    // Check if this is test data (contains "Fjelljegerens Odin" or similar)
                    const isTestData = Array.isArray(dogs) && dogs.some(d =>
                        d.name === 'Fjelljegerens Odin' ||
                        d.name === 'Skogsprinsessen' ||
                        d.name === 'Fjellkongen Rex'
                    );
                    if (isTestData) {
                        console.log('Removing test data from ukak1');
                        localStorage.removeItem('judgeData_ukak1');
                    }
                } catch (e) {}
            }
        }

        function loadAllCritiques() {
            allCritiques = [];

            // Find all judgeData_* keys in localStorage (dynamic party discovery)
            const allKeys = Object.keys(localStorage).filter(k => k.startsWith('judgeData_'));
            console.log('Found judgeData keys:', allKeys);

            allKeys.forEach(key => {
                const partyId = key.replace('judgeData_', '');
                const saved = localStorage.getItem(key);
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        // Handle both formats: array directly or object with .dogs property
                        const dogs = Array.isArray(data) ? data : (data.dogs || []);
                        console.log('Party', partyId, 'has', dogs.length, 'dogs');

                        dogs.forEach(dog => {
                            if (dog.critiqueStatus && dog.critiqueStatus !== 'pending') {
                                allCritiques.push({
                                    ...dog,
                                    partyId,
                                    partyName: getPartyName(partyId)
                                });
                            }
                        });
                    } catch (e) {
                        console.error('Error parsing', key, e);
                    }
                }
            });

            console.log('Total critiques found:', allCritiques.length, allCritiques);

            const filter = document.getElementById('partyFilter');
            const usedParties = [...new Set(allCritiques.map(c => c.partyId))];
            filter.innerHTML = '<option value="all">Alle partier</option>' +
                usedParties.map(p => `<option value="${p}">${getPartyName(p)}</option>`).join('');
        }

        function filterByParty(partyId) {
            currentFilter = partyId;
            render();
        }

        function render() {
            loadAllCritiques();

            let filtered = allCritiques;
            if (currentFilter !== 'all') {
                filtered = allCritiques.filter(c => c.partyId === currentFilter);
            }

            const pending = filtered.filter(c => c.critiqueStatus === 'submitted');
            const approved = filtered.filter(c => c.critiqueStatus === 'approved');
            const returned = filtered.filter(c => c.critiqueStatus === 'returned');

            document.getElementById('pendingCount').textContent = pending.length;
            document.getElementById('approvedCount').textContent = approved.length;
            document.getElementById('returnedCount').textContent = returned.length;

            document.getElementById('pendingList').innerHTML = pending.length === 0
                ? '<div class="bg-white rounded-xl p-8 text-center border border-bark-200"><p class="text-bark-500">Ingen kritikker venter på godkjenning</p></div>'
                : pending.map(c => renderCritiqueCard(c, 'pending')).join('');

            document.getElementById('approvedList').innerHTML = approved.length === 0
                ? '<div class="bg-white rounded-xl p-8 text-center border border-bark-200"><p class="text-bark-500">Ingen godkjente kritikker ennå</p></div>'
                : approved.map(c => renderCritiqueCard(c, 'approved')).join('');
        }

        function renderCritiqueCard(critique, type) {
            const prizeColors = {
                '1. AK': 'bg-gradient-to-r from-yellow-400 to-amber-500 text-white',
                '2. AK': 'bg-gradient-to-r from-gray-300 to-gray-400 text-gray-800',
                '3. AK': 'bg-gradient-to-r from-amber-600 to-amber-700 text-white',
                '1. premie': 'bg-gradient-to-r from-yellow-400 to-amber-500 text-white',
                '2. premie': 'bg-gradient-to-r from-gray-300 to-gray-400 text-gray-800',
                '3. premie': 'bg-gradient-to-r from-amber-600 to-amber-700 text-white'
            };
            const prizeClass = prizeColors[critique.prize] || 'bg-bark-200 text-bark-700';
            const breedCode = getBreedCode(critique.breed);
            const klasse = critique.klasse || 'AK';

            const submittedTime = critique.critiqueSubmittedAt
                ? new Date(critique.critiqueSubmittedAt).toLocaleString('nb-NO', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })
                : '-';

            return `
                <div class="bg-white rounded-xl border-2 ${type === 'pending' ? 'border-blue-200 hover:border-blue-400' : 'border-green-200'} p-5 hover:shadow-lg transition cursor-pointer group"
                     onclick="openReview('${critique.partyId}', ${critique.id})">
                    <div class="flex items-start gap-4">
                        <!-- Dog Number -->
                        <div class="w-14 h-14 bg-gradient-to-br from-forest-500 to-forest-700 rounded-xl flex items-center justify-center flex-shrink-0 shadow-lg">
                            <span class="text-2xl font-bold text-white">${critique.nr}</span>
                        </div>

                        <!-- Dog Info -->
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-3 mb-1">
                                <h3 class="font-bold text-lg text-bark-800 group-hover:text-forest-700 transition">${critique.name}</h3>
                                ${critique.prize ? `<span class="px-3 py-1 ${prizeClass} rounded-full text-xs font-bold shadow-sm">${critique.prize}</span>` : ''}
                            </div>
                            <p class="text-sm text-bark-600">${breedCode} • ${klasse}</p>
                            <p class="text-sm text-bark-500">Fører: ${critique.handler}</p>
                            <div class="flex items-center gap-4 mt-2 text-xs text-bark-400">
                                <span class="flex items-center gap-1">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                    </svg>
                                    ${critique.partyName}
                                </span>
                                <span class="flex items-center gap-1">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                    </svg>
                                    Dommer: ${critique.critiqueSubmittedBy || '-'}
                                </span>
                                <span class="flex items-center gap-1">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                    </svg>
                                    ${submittedTime}
                                </span>
                            </div>
                        </div>

                        <!-- Action -->
                        <div class="flex flex-col items-end gap-2">
                            ${type === 'approved'
                                ? '<span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>Godkjent</span>'
                                : '<span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-bold animate-pulse">Åpne for gjennomgang</span>'
                            }
                        </div>
                    </div>

                    <!-- Critique Preview -->
                    <div class="mt-4 pt-4 border-t border-bark-100">
                        <p class="text-sm text-bark-600 line-clamp-2 leading-relaxed">${critique.critique || 'Ingen kritikk skrevet'}</p>
                    </div>
                </div>
            `;
        }

        function openReview(partyId, dogId) {
            const saved = localStorage.getItem('judgeData_' + partyId);
            if (!saved) {
                console.error('No data found for party:', partyId);
                return;
            }

            try {
                const data = JSON.parse(saved);
                // Handle both formats: array directly or object with .dogs property
                const dogs = Array.isArray(data) ? data : (data.dogs || []);
                const dog = dogs.find(d => d.id === dogId);
                if (!dog) {
                    console.error('Dog not found:', dogId, 'in party:', partyId);
                    return;
                }

                currentReview = { partyId, dogId, dog, dogs };
                document.getElementById('reviewDogName').textContent = `${dog.name} • ${getPartyName(partyId)}`;
                generateCritiquePreview(dog, partyId);
                renderActionButtons(dog.critiqueStatus);

                document.getElementById('reviewModal').classList.remove('hidden');
            } catch (e) {
                console.error('Error opening review:', e);
            }
        }

        function hideReview() {
            document.getElementById('reviewModal').classList.add('hidden');
            currentReview = null;
        }

        function generateCritiquePreview(dog, partyId) {
            // Ensure rounds exist
            if (!dog.rounds || dog.rounds.length === 0) {
                dog.rounds = [{ roundNum: 1, scores: {}, notes: '' }];
            }

            const latestRound = dog.rounds[dog.rounds.length - 1];
            const s = latestRound.scores || {};

            const prizeColors = {
                '1. premie': 'from-yellow-400 to-amber-500',
                '2. premie': 'from-gray-300 to-gray-400',
                '3. premie': 'from-amber-600 to-amber-700'
            };
            const prizeGradient = prizeColors[dog.prize] || 'from-bark-200 to-bark-300';

            document.getElementById('critiquePreview').innerHTML = `
                <div class="bg-white rounded-xl shadow-xl overflow-hidden max-w-2xl mx-auto">
                    <!-- Header with Logo & Title -->
                    <div class="bg-gradient-to-r from-forest-700 to-forest-800 text-white p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <h1 class="text-2xl font-rockwell font-bold">Kritikkskjema</h1>
                                <p class="text-forest-200 text-sm mt-1">${getPartyName(partyId)} • Vinterprøven 2026</p>
                            </div>
                            <div class="w-16 h-16 bg-white/20 rounded-xl flex items-center justify-center">
                                <svg class="w-10 h-10 text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <!-- Dog Info Card -->
                    <div class="p-6 border-b border-bark-100">
                        <div class="flex items-start gap-5">
                            <div class="w-20 h-20 bg-gradient-to-br from-forest-500 to-forest-700 rounded-2xl flex items-center justify-center shadow-lg flex-shrink-0">
                                <span class="text-3xl font-bold text-white">${dog.nr}</span>
                            </div>
                            <div class="flex-1">
                                <h2 class="text-2xl font-bold font-rockwell text-bark-800">${dog.name}</h2>
                                <p class="text-bark-600 mt-1">${dog.breed} • ${dog.klasse || 'AK'}</p>
                                <div class="flex gap-6 mt-3 text-sm">
                                    <div>
                                        <span class="text-bark-400">Fører</span>
                                        <p class="font-medium text-bark-700">${dog.handler}</p>
                                    </div>
                                    <div>
                                        <span class="text-bark-400">Eier</span>
                                        <p class="font-medium text-bark-700">${dog.owner}</p>
                                    </div>
                                </div>
                            </div>
                            ${dog.prize ? `
                                <div class="px-5 py-3 bg-gradient-to-r ${prizeGradient} rounded-xl shadow-lg">
                                    <p class="text-xs uppercase tracking-wide opacity-80 font-medium">Premie</p>
                                    <p class="font-bold text-lg">${dog.prize}</p>
                                </div>
                            ` : ''}
                        </div>
                    </div>

                    <!-- Scores Section -->
                    <div class="p-6 bg-bark-50">
                        <h3 class="text-sm font-bold text-bark-500 uppercase tracking-wide mb-4">Vurdering</h3>

                        <!-- Character Scores -->
                        <div class="grid grid-cols-6 gap-2 mb-4">
                            ${['JL', 'FA', 'SE', 'SB', 'RE', 'SA'].map((abbr, i) => {
                                const keys = ['JAKTLYST', 'FART', 'SELVSTENDIGHET', 'SOKSBREDDE', 'REVIERING', 'SAMARBEID'];
                                const labels = ['Jaktlyst', 'Fart', 'Selvstendighet', 'Søksbredde', 'Reviering', 'Samarbeid'];
                                const val = s[keys[i]] ?? '-';
                                const color = val >= 5 ? 'from-green-500 to-green-600' : val >= 4 ? 'from-blue-500 to-blue-600' : val >= 3 ? 'from-amber-500 to-amber-600' : 'from-bark-400 to-bark-500';
                                return `
                                    <div class="text-center">
                                        <div class="w-12 h-12 mx-auto bg-gradient-to-br ${color} rounded-xl flex items-center justify-center shadow">
                                            <span class="text-xl font-bold text-white">${val}</span>
                                        </div>
                                        <p class="text-xs text-bark-500 mt-1 font-medium">${abbr}</p>
                                        <p class="text-[10px] text-bark-400">${labels[i]}</p>
                                    </div>
                                `;
                            }).join('')}
                        </div>

                        <!-- Bird Handling & Stand -->
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-white rounded-xl p-4 border border-bark-200">
                                <h4 class="text-xs font-bold text-forest-700 uppercase mb-3">Fuglebehandling</h4>
                                <div class="space-y-2 text-sm">
                                    <div class="flex justify-between">
                                        <span class="text-bark-500">Presisjon</span>
                                        <span class="font-bold text-bark-800">${s.PRESISJON ?? '-'}</span>
                                    </div>
                                    <div class="flex justify-between">
                                        <span class="text-bark-500">Reising</span>
                                        <span class="font-bold text-bark-800">${s.REISING ?? '-'} ${s.GODKJENT_REISING ? '<span class="text-green-600 text-xs">(godkj.)</span>' : ''}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="bg-white rounded-xl p-4 border border-bark-200">
                                <h4 class="text-xs font-bold text-earth-700 uppercase mb-3">Stand</h4>
                                <div class="space-y-2 text-sm">
                                    <div class="flex justify-between">
                                        <span class="text-bark-500">Med makker</span>
                                        <span class="font-bold text-bark-800">${s.STAND_M ?? '-'}</span>
                                    </div>
                                    <div class="flex justify-between">
                                        <span class="text-bark-500">Uten makker</span>
                                        <span class="font-bold text-bark-800">${s.STAND_U ?? '-'}</span>
                                    </div>
                                    <div class="flex justify-between">
                                        <span class="text-bark-500">Tomstand</span>
                                        <span class="font-bold text-bark-800">${s.TOMSTAND ?? '-'}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Critique Text -->
                    <div class="p-6">
                        <h3 class="text-sm font-bold text-bark-500 uppercase tracking-wide mb-3">Kritikk</h3>
                        <div class="bg-forest-50 border-2 border-forest-200 rounded-xl p-5">
                            <p class="text-bark-800 leading-relaxed whitespace-pre-wrap">${dog.critique || 'Ingen kritikk skrevet'}</p>
                        </div>
                    </div>

                    <!-- Footer / Signatures -->
                    <div class="px-6 py-4 bg-bark-50 border-t border-bark-200">
                        <div class="flex justify-between items-end text-sm">
                            <div>
                                <p class="text-bark-400 text-xs">Dommer</p>
                                <p class="font-semibold text-bark-700">${dog.critiqueSubmittedBy || '-'}</p>
                                <p class="text-bark-400 text-xs mt-1">${dog.critiqueSubmittedAt ? new Date(dog.critiqueSubmittedAt).toLocaleDateString('nb-NO', { day: 'numeric', month: 'long', year: 'numeric' }) : '-'}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-bark-400 text-xs">Status</p>
                                ${dog.critiqueStatus === 'approved'
                                    ? `<p class="font-semibold text-green-600 flex items-center gap-1 justify-end"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>Godkjent</p>
                                       <p class="text-bark-400 text-xs mt-1">av ${dog.approvedBy || 'NKK-rep'}</p>`
                                    : '<p class="font-semibold text-blue-600">Venter godkjenning</p>'
                                }
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderActionButtons(status) {
            const container = document.getElementById('actionButtons');

            if (status === 'approved') {
                // Already approved - show only view/print options
                container.innerHTML = `
                    <div class="bg-green-50 border-2 border-green-200 rounded-xl p-4 mb-3">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center">
                                <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                                </svg>
                            </div>
                            <div>
                                <p class="font-semibold text-green-800">Kritikken er godkjent</p>
                                <p class="text-sm text-green-600">Godkjent av ${currentReview.dog.approvedBy || 'NKK-rep'}</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="viewCritique()" class="flex-1 bg-forest-600 hover:bg-forest-700 text-white font-semibold py-3 rounded-xl transition flex items-center justify-center gap-2 shadow-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                            Vis kritikk
                        </button>
                        <button onclick="printCritique()" class="flex-1 bg-earth-500 hover:bg-earth-600 text-white font-semibold py-3 rounded-xl transition flex items-center justify-center gap-2 shadow-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
                            </svg>
                            Skriv ut
                        </button>
                    </div>
                `;
            } else if (status === 'returned') {
                // Already returned - show info only
                container.innerHTML = `
                    <div class="bg-amber-50 border-2 border-amber-200 rounded-xl p-4 mb-3">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-amber-100 rounded-full flex items-center justify-center">
                                <svg class="w-5 h-5 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/>
                                </svg>
                            </div>
                            <div>
                                <p class="font-semibold text-amber-800">Sendt tilbake til dommer</p>
                                <p class="text-sm text-amber-600">Venter på ny innsending</p>
                            </div>
                        </div>
                    </div>
                    <button onclick="printCritique()" class="w-full py-2 bg-bark-100 hover:bg-bark-200 text-bark-700 rounded-xl transition text-sm font-medium flex items-center justify-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
                        </svg>
                        Skriv ut
                    </button>
                `;
            } else {
                // Pending - show approval buttons
                container.innerHTML = `
                    <div id="returnCommentSection" class="hidden">
                        <label class="block text-sm font-medium text-bark-700 mb-2">Kommentar til dommer</label>
                        <textarea id="returnComment" rows="2" placeholder="Beskriv hva som bør endres..."
                            class="w-full px-4 py-3 rounded-xl border-2 border-bark-200 focus:border-amber-500 focus:ring-0 outline-none text-sm"></textarea>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="approveCritique()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl transition flex items-center justify-center gap-2 shadow-lg shadow-green-600/30">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                            </svg>
                            Godkjenn kritikk
                        </button>
                        <button onclick="toggleReturnSection()" id="returnBtn" class="flex-1 bg-amber-500 hover:bg-amber-600 text-white font-semibold py-3 rounded-xl transition flex items-center justify-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/>
                            </svg>
                            Send tilbake
                        </button>
                    </div>
                    <button onclick="printCritique()" class="w-full py-2 bg-bark-100 hover:bg-bark-200 text-bark-700 rounded-xl transition text-sm font-medium flex items-center justify-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
                        </svg>
                        Skriv ut
                    </button>
                `;
            }
        }

        function toggleReturnSection() {
            const section = document.getElementById('returnCommentSection');
            const btn = document.getElementById('returnBtn');

            if (section.classList.contains('hidden')) {
                section.classList.remove('hidden');
                btn.innerHTML = `
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                    </svg>
                    Bekreft retur
                `;
                btn.onclick = returnCritique;
            } else {
                section.classList.add('hidden');
                btn.innerHTML = `
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/>
                    </svg>
                    Send tilbake
                `;
                btn.onclick = toggleReturnSection;
            }
        }

        async function downloadPdf() {
            if (!currentReview) return;

            const dog = currentReview.dog;
            const element = document.getElementById('critiquePreview');

            // Check if libraries are loaded
            if (typeof html2canvas === 'undefined') {
                alert('PDF-biblioteket html2canvas er ikke lastet. Prøv å laste siden på nytt.');
                return;
            }
            if (typeof window.jspdf === 'undefined') {
                alert('PDF-biblioteket jsPDF er ikke lastet. Prøv å laste siden på nytt.');
                return;
            }

            // Show loading state
            const btn = event.target.closest('button');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Genererer PDF...
            `;

            try {
                // Small delay to let UI update
                await new Promise(resolve => setTimeout(resolve, 100));

                // Capture the critique preview as canvas
                const canvas = await html2canvas(element, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#ffffff',
                    logging: false
                });

                // Create PDF
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');

                const imgWidth = 210; // A4 width in mm
                const imgHeight = (canvas.height * imgWidth) / canvas.width;

                const imgData = canvas.toDataURL('image/png');
                pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);

                // Generate filename
                const safeName = dog.name.replace(/[^a-zA-Z0-9æøåÆØÅ]/g, '_');
                const filename = `Kritikk_${safeName}_${dog.nr}.pdf`;

                // Open PDF in new tab - works better on Safari/Mac
                const pdfBlob = pdf.output('blob');
                const pdfUrl = URL.createObjectURL(pdfBlob);

                // Open in new window/tab
                const pdfWindow = window.open(pdfUrl, '_blank');

                if (pdfWindow) {
                    showToast('PDF åpnet i ny fane. Bruk Cmd+S for å lagre.', 'success');
                } else {
                    // Popup blocked - try direct download as fallback
                    const link = document.createElement('a');
                    link.href = pdfUrl;
                    link.download = filename;
                    link.style.display = 'none';
                    document.body.appendChild(link);
                    link.click();
                    setTimeout(() => {
                        document.body.removeChild(link);
                        URL.revokeObjectURL(pdfUrl);
                    }, 100);
                    showToast('PDF lastet ned til Nedlastinger-mappen', 'success');
                }
            } catch (error) {
                console.error('PDF generation error:', error);
                alert('Feil ved generering av PDF: ' + error.message + '\n\nPrøv "Skriv ut" og velg "Lagre som PDF" i stedet.');
            } finally {
                // Restore button
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        async function approveCritique() {
            if (!currentReview) return;

            const { partyId, dogId, dog, dogs, kritikkId } = currentReview;

            dog.critiqueStatus = 'approved';
            dog.approvedAt = new Date().toISOString();
            dog.approvedBy = nkkRepInfo?.name || 'NKK-representant';

            // Save to localStorage (backward compatibility)
            localStorage.setItem('judgeData_' + partyId, JSON.stringify(dogs));

            // Also persist to database via API
            if (kritikkId) {
                try {
                    await fetch(`/api/kritikker/${kritikkId}/godkjenn`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            approved_by: nkkRepInfo?.name || 'NKK-representant'
                        })
                    });
                } catch (e) {
                    console.error('API-feil ved godkjenning:', e);
                }
            }

            hideReview();
            render();

            // Show success toast
            showToast('Kritikken er godkjent!', 'success');
        }

        async function returnCritique() {
            if (!currentReview) return;

            const comment = document.getElementById('returnComment').value.trim();
            const { partyId, dogId, dog, dogs, kritikkId } = currentReview;

            dog.critiqueStatus = 'returned';
            dog.nkkComment = comment || 'Vennligst se over kritikken på nytt.';
            dog.returnedAt = new Date().toISOString();

            // Save to localStorage (backward compatibility)
            localStorage.setItem('judgeData_' + partyId, JSON.stringify(dogs));

            // Also persist to database via API
            if (kritikkId) {
                try {
                    await fetch(`/api/kritikker/${kritikkId}/returner`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            nkk_comment: dog.nkkComment,
                            returned_by: nkkRepInfo?.name || 'NKK-representant'
                        })
                    });
                } catch (e) {
                    console.error('API-feil ved retur:', e);
                }
            }

            hideReview();
            render();

            showToast('Kritikken er sendt tilbake til dommer', 'warning');
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-6 right-6 px-6 py-4 rounded-xl shadow-2xl text-white font-medium z-50 flex items-center gap-3 ${
                type === 'success' ? 'bg-green-600' : 'bg-amber-500'
            }`;
            toast.innerHTML = `
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    ${type === 'success'
                        ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>'
                        : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>'
                    }
                </svg>
                ${message}
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function printCritique() {
            window.print();
        }

        function viewCritique() {
            if (!currentReview) return;
            const { partyId, dogId } = currentReview;
            window.open(`kritikk-visning.html?party=${partyId}&dog=${dogId}`, '_blank');
        }

        // Initialize
        cleanupTestData();
        loadNkkRepInfo();
        render();
    </script>
</body>
</html>
