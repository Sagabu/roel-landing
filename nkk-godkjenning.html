<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NKK Godkjenning - Kritikkskjemaer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rockwell&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        // NCS fargepalett
                        primary: {
                            50: '#f5f6f7',
                            100: '#e8eaed',
                            200: '#d1d5db',
                            300: '#9ca3af',
                            400: '#6b7280',
                            500: '#5C6B7A',  // NCS S 5020-R80B - dempet blå
                            600: '#4b5563',
                            700: '#374151',
                            800: '#1f2937',
                            900: '#3D3D42',  // NCS S 7005-R50B - mørk grå
                        },
                        accent: {
                            50: '#fdf8ed',
                            100: '#f9edcc',
                            200: '#f3db99',
                            300: '#e9c466',
                            400: '#C49A3D',  // NCS S 2060-Y20R - gylden/sennep
                            500: '#b8892f',
                            600: '#a07428',
                            700: '#825a22',
                            800: '#6b4a20',
                            900: '#5a3e1d',
                        },
                        warm: {
                            50: '#faf6f3',
                            100: '#f3ebe4',
                            200: '#e5d5c8',
                            300: '#d4b8a3',
                            400: '#b8896a',
                            500: '#8B5A3C',  // NCS S 4050-Y50R - brun/rust
                            600: '#7a4e33',
                            700: '#66412b',
                            800: '#553627',
                            900: '#472e22',
                        },
                        neutral: {
                            50: '#E8E8EC',   // NCS S 0502-R50B - lys grå
                            100: '#e1e1e6',
                            200: '#d4d4da',
                            300: '#b8b8bf',
                            400: '#8A8A8F',  // NCS S 4005-R50B - mellomgrå
                            500: '#6b6b70',
                            600: '#525256',
                            700: '#3D3D42',  // NCS S 7005-R50B - mørk grå
                            800: '#2d2d31',
                            900: '#1a1a1d',
                        }
                    },
                    fontFamily: {
                        'display': ['Playfair Display', 'Georgia', 'serif'],
                        'sans': ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .font-rockwell { font-family: 'Rockwell', Georgia, serif; }
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .critique-document { box-shadow: none !important; border: none !important; }
        }
    .font-display { font-family: 'Playfair Display', Georgia, serif; }
        .font-rockwell { font-family: 'Playfair Display', Georgia, serif; }
    </style>
</head>
<body class="font-sans bg-white min-h-screen">

    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-700 to-blue-800 text-white sticky top-0 z-50 shadow-lg no-print">
        <div class="max-w-5xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-rockwell font-bold">NKK Godkjenning</h1>
                        <p class="text-blue-200 text-sm" id="trialName">Kritikkskjemaer til godkjenning</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <a href="min-side.html" class="text-blue-200 hover:text-white text-sm flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                        </svg>
                        Min side
                    </a>
                    <div class="text-right">
                        <p class="text-xs text-blue-200">NKK-representant</p>
                        <p class="font-semibold" id="nkkRepName">Marstein Manstein</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-4 py-6">
        <!-- Stats -->
        <div class="grid grid-cols-3 gap-4 mb-6 no-print">
            <div class="bg-white rounded-xl p-4 border-2 border-blue-200 shadow-sm">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center">
                        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-sm text-neutral-500">Venter godkjenning</p>
                        <p class="text-2xl font-bold text-blue-600" id="pendingCount">0</p>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-4 border-2 border-green-200 shadow-sm">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center">
                        <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-sm text-neutral-500">Godkjent</p>
                        <p class="text-2xl font-bold text-green-600" id="approvedCount">0</p>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-4 border-2 border-amber-200 shadow-sm">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-amber-100 rounded-full flex items-center justify-center">
                        <svg class="w-5 h-5 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-sm text-neutral-500">Returnert</p>
                        <p class="text-2xl font-bold text-amber-600" id="returnedCount">0</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filter -->
        <div class="flex items-center justify-between mb-4 no-print">
            <select id="partyFilter" onchange="filterByParty(this.value)"
                class="bg-white border-2 border-neutral-200 rounded-xl px-4 py-2 text-sm font-medium text-neutral-700 focus:border-blue-500 focus:outline-none">
                <option value="all">Alle partier</option>
            </select>
        </div>

        <!-- Pending critiques -->
        <div id="pendingSection" class="mb-8">
            <h2 class="text-lg font-bold font-rockwell text-neutral-700 mb-4 flex items-center gap-2">
                <span class="w-3 h-3 bg-blue-500 rounded-full animate-pulse"></span>
                Venter på godkjenning
            </h2>
            <div id="pendingList" class="space-y-4">
                <!-- Rendered by JS -->
            </div>
        </div>

        <!-- Approved critiques -->
        <div id="approvedSection">
            <h2 class="text-lg font-bold font-rockwell text-neutral-700 mb-4 flex items-center gap-2">
                <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                Godkjente kritikker
            </h2>
            <div id="approvedList" class="space-y-4">
                <!-- Rendered by JS -->
            </div>
        </div>
    </main>

    <!-- Review Modal -->
    <div id="reviewModal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl max-w-3xl w-full max-h-[95vh] overflow-hidden flex flex-col shadow-2xl">
            <!-- Modal Header -->
            <div class="px-6 py-4 bg-white border-b border-neutral-200 flex items-center justify-between no-print">
                <div>
                    <h2 class="font-bold font-rockwell text-xl text-neutral-800">Gjennomgå kritikk</h2>
                    <p class="text-neutral-500 text-sm" id="reviewDogName">-</p>
                </div>
                <button onclick="hideReview()" class="p-2 hover:bg-neutral-100 rounded-lg transition text-neutral-500">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <!-- Critique Document -->
            <div class="flex-1 overflow-y-auto p-6">
                <div id="critiquePreview" class="critique-document">
                    <!-- Generated critique document -->
                </div>
            </div>

            <!-- Action Buttons -->
            <div id="actionButtons" class="p-4 bg-white border-t border-neutral-200 space-y-3 no-print">
                <!-- Buttons will be rendered by JS based on status -->
            </div>
        </div>
    </div>

    <script>
        // Party configurations
        const PARTIES = {
            ukak1: { name: 'UK/AK Parti 1' },
            ukak2: { name: 'UK/AK Parti 2' },
            ukak3: { name: 'UK/AK Parti 3' },
            ukak4: { name: 'UK/AK Parti 4' },
            vk1: { name: 'VK Kval Parti 1' },
            vk2: { name: 'VK Kval Parti 2' },
            vkfinale: { name: 'VK Finale' }
        };

        let allCritiques = [];
        let currentReview = null;
        let currentFilter = 'all';
        let nkkRepInfo = null;

        // Initialize with test data
        function initTestData() {
            // Always update test data to ensure regNr is present
            const existing = localStorage.getItem('judgeData_ukak1');
            if (existing) {
                // Check if existing data has regNr, if not, force refresh
                try {
                    const data = JSON.parse(existing);
                    if (data[0]?.regNr) return; // Already has regNr, skip
                } catch (e) {}
            }

            // Create test critiques for Marstein Manstein (NKK-rep) to review
            const testData = [
                {
                    id: 1,
                    nr: 1,
                    regNr: 'NO12345/22',
                    name: 'Breton XXL',
                    breed: 'Breton',
                    handler: 'Chris Niebel',
                    owner: 'Chris Niebel',
                    critiqueStatus: 'submitted',
                    critiqueSubmittedBy: 'Roar Storseth',
                    critiqueSubmittedAt: new Date().toISOString(),
                    prize: '1. premie',
                    critique: 'Fin Breton med masse energi og god arbeidsvilje. Dekker terrenget effektivt med god fart. Viser fin selvstendighet og godt samarbeid med fører. Fast stand ved fuglkontakt med sikker marking.',
                    rounds: [{
                        roundNum: 1,
                        completed: true,
                        notes: 'Flott åpning, tok terrenget fint. God fart fra start.',
                        scores: {
                            JAKTLYST: 5, FART: 5, SELVSTENDIGHET: 4, SOKSBREDDE: 5, REVIERING: 5, SAMARBEID: 5,
                            PRESISJON: 4, REISING: 'R', GODKJENT_REISING: true,
                            STAND_M: 2, STAND_U: 0, TOMSTAND: 0, SLIPPTID: 15
                        }
                    }]
                },
                {
                    id: 2,
                    nr: 2,
                    regNr: 'NO34568/22',
                    name: 'Gordon Setter Trapp',
                    breed: 'Gordon Setter',
                    handler: 'Monja Aakert',
                    owner: 'Monja Aakert',
                    critiqueStatus: 'submitted',
                    critiqueSubmittedBy: 'Chris Niebel',
                    critiqueSubmittedAt: new Date(Date.now() - 3600000).toISOString(),
                    prize: '2. premie',
                    critique: 'Fin tispe med god jaktlyst og fart. Viser systematisk søk og godt samarbeid med fører. Pålitelig fuglearbeid med sikker stand.',
                    rounds: [{
                        roundNum: 1,
                        completed: true,
                        notes: 'Litt forsiktig start, men tok seg opp.',
                        scores: {
                            JAKTLYST: 4, FART: 4, SELVSTENDIGHET: 4, SOKSBREDDE: 4, REVIERING: 4, SAMARBEID: 5,
                            PRESISJON: 3, REISING: 'R', GODKJENT_REISING: true,
                            STAND_M: 1, STAND_U: 0, TOMSTAND: 1, SLIPPTID: 15
                        }
                    }]
                },
                {
                    id: 3,
                    nr: 3,
                    regNr: 'NO67890/21',
                    name: 'Engelsk Setter Kjemperask',
                    breed: 'Engelsk Setter',
                    handler: 'Roar Storseth',
                    owner: 'Roar Storseth',
                    critiqueStatus: 'approved',
                    critiqueSubmittedBy: 'Monja Aakert',
                    critiqueSubmittedAt: new Date(Date.now() - 86400000).toISOString(),
                    approvedAt: new Date(Date.now() - 43200000).toISOString(),
                    approvedBy: 'Marstein Manstein',
                    prize: 'CK',
                    critique: 'Imponerende Engelsk Setter med fantastisk stil og arbeidskapasitet. Bredt og intensivt søk med høy fart. Meget godt fuglearbeid med fast stand.',
                    rounds: [{
                        roundNum: 1,
                        completed: true,
                        notes: 'Strålende åpning. Tok alle vindkanter.',
                        scores: {
                            JAKTLYST: 6, FART: 5, SELVSTENDIGHET: 5, SOKSBREDDE: 5, REVIERING: 5, SAMARBEID: 5,
                            PRESISJON: 5, REISING: 'R', GODKJENT_REISING: true,
                            STAND_M: 3, STAND_U: 0, TOMSTAND: 0, SLIPPTID: 15
                        }
                    }]
                }
            ];

            localStorage.setItem('judgeData_ukak1', JSON.stringify(testData));

            // Set up Marstein Manstein as NKK-rep
            const teamData = {
                proveleder: { name: 'Monja Aakert', phone: '99999997', email: 'monja@test.no' },
                nkkrep: { name: 'Marstein Manstein', phone: '99999995', email: 'marstein@nkk.no' }
            };
            localStorage.setItem('trialTeam', JSON.stringify(teamData));
        }

        // Load NKK rep info
        async function loadNkkRepInfo() {
            try {
                const resp = await fetch('/api/storage/trialTeam');
                if (resp.ok) {
                    const { value } = await resp.json();
                    if (value) {
                        const team = typeof value === 'string' ? JSON.parse(value) : value;
                        if (team.nkkrep) {
                            nkkRepInfo = team.nkkrep;
                            document.getElementById('nkkRepName').textContent = nkkRepInfo.name;
                        }
                    }
                }
            } catch (e) {
                const saved = localStorage.getItem('trialTeam');
                if (saved) {
                    const team = JSON.parse(saved);
                    if (team.nkkrep) {
                        nkkRepInfo = team.nkkrep;
                        document.getElementById('nkkRepName').textContent = nkkRepInfo.name;
                    }
                }
            }

            try {
                const resp = await fetch('/api/trial');
                if (resp.ok) {
                    const trial = await resp.json();
                    if (trial.name) {
                        document.getElementById('trialName').textContent = trial.name;
                    }
                }
            } catch (e) {}
        }

        function loadAllCritiques() {
            allCritiques = [];

            Object.keys(PARTIES).forEach(partyId => {
                const saved = localStorage.getItem('judgeData_' + partyId);
                if (saved) {
                    const dogs = JSON.parse(saved);
                    dogs.forEach(dog => {
                        if (dog.critiqueStatus && dog.critiqueStatus !== 'pending') {
                            allCritiques.push({
                                ...dog,
                                partyId,
                                partyName: PARTIES[partyId].name
                            });
                        }
                    });
                }
            });

            const filter = document.getElementById('partyFilter');
            const usedParties = [...new Set(allCritiques.map(c => c.partyId))];
            filter.innerHTML = '<option value="all">Alle partier</option>' +
                usedParties.map(p => `<option value="${p}">${PARTIES[p].name}</option>`).join('');
        }

        function filterByParty(partyId) {
            currentFilter = partyId;
            render();
        }

        function render() {
            loadAllCritiques();

            let filtered = allCritiques;
            if (currentFilter !== 'all') {
                filtered = allCritiques.filter(c => c.partyId === currentFilter);
            }

            const pending = filtered.filter(c => c.critiqueStatus === 'submitted');
            const approved = filtered.filter(c => c.critiqueStatus === 'approved');
            const returned = filtered.filter(c => c.critiqueStatus === 'returned');

            document.getElementById('pendingCount').textContent = pending.length;
            document.getElementById('approvedCount').textContent = approved.length;
            document.getElementById('returnedCount').textContent = returned.length;

            document.getElementById('pendingList').innerHTML = pending.length === 0
                ? '<div class="bg-white rounded-xl p-8 text-center border border-neutral-200"><p class="text-neutral-500">Ingen kritikker venter på godkjenning</p></div>'
                : pending.map(c => renderCritiqueCard(c, 'pending')).join('');

            document.getElementById('approvedList').innerHTML = approved.length === 0
                ? '<div class="bg-white rounded-xl p-8 text-center border border-neutral-200"><p class="text-neutral-500">Ingen godkjente kritikker ennå</p></div>'
                : approved.map(c => renderCritiqueCard(c, 'approved')).join('');
        }

        function renderCritiqueCard(critique, type) {
            const prizeColors = {
                '1. premie': 'bg-gradient-to-r from-yellow-400 to-amber-500 text-white',
                '2. premie': 'bg-gradient-to-r from-gray-300 to-gray-400 text-gray-800',
                '3. premie': 'bg-gradient-to-r from-amber-600 to-amber-700 text-white'
            };
            const prizeClass = prizeColors[critique.prize] || 'bg-neutral-200 text-neutral-700';

            const submittedTime = critique.critiqueSubmittedAt
                ? new Date(critique.critiqueSubmittedAt).toLocaleString('nb-NO', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })
                : '-';

            return `
                <div class="bg-white rounded-xl border-2 ${type === 'pending' ? 'border-blue-200 hover:border-blue-400' : 'border-green-200'} p-5 hover:shadow-lg transition cursor-pointer group"
                     onclick="openReview('${critique.partyId}', ${critique.id})">
                    <div class="flex items-start gap-4">
                        <!-- Dog Number -->
                        <div class="w-14 h-14 bg-gradient-to-br from-primary-500 to-primary-600 rounded-xl flex items-center justify-center flex-shrink-0 shadow-lg">
                            <span class="text-2xl font-bold text-white">${critique.nr}</span>
                        </div>

                        <!-- Dog Info -->
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-3 mb-1">
                                <h3 class="font-bold text-lg text-neutral-800 group-hover:text-warm-600 transition">${critique.name}</h3>
                                ${critique.prize ? `<span class="px-3 py-1 ${prizeClass} rounded-full text-xs font-bold shadow-sm">${critique.prize}</span>` : ''}
                            </div>
                            <p class="text-sm text-neutral-500">${critique.breed}</p>
                            <p class="text-sm text-neutral-500">Fører: ${critique.handler}</p>
                            <div class="flex items-center gap-4 mt-2 text-xs text-neutral-400">
                                <span class="flex items-center gap-1">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                    </svg>
                                    ${critique.partyName}
                                </span>
                                <span class="flex items-center gap-1">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                    </svg>
                                    Dommer: ${critique.critiqueSubmittedBy || '-'}
                                </span>
                                <span class="flex items-center gap-1">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                    </svg>
                                    ${submittedTime}
                                </span>
                            </div>
                        </div>

                        <!-- Action -->
                        <div class="flex flex-col items-end gap-2">
                            ${type === 'approved'
                                ? '<span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>Godkjent</span>'
                                : '<span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-bold animate-pulse">Åpne for gjennomgang</span>'
                            }
                        </div>
                    </div>

                    <!-- Critique Preview -->
                    <div class="mt-4 pt-4 border-t border-neutral-100">
                        <p class="text-sm text-neutral-500 line-clamp-2 leading-relaxed">${critique.critique || 'Ingen kritikk skrevet'}</p>
                    </div>
                </div>
            `;
        }

        function openReview(partyId, dogId) {
            const saved = localStorage.getItem('judgeData_' + partyId);
            if (!saved) return;

            const dogs = JSON.parse(saved);
            const dog = dogs.find(d => d.id === dogId);
            if (!dog) return;

            currentReview = { partyId, dogId, dog, dogs };
            document.getElementById('reviewDogName').textContent = `${dog.name} • ${PARTIES[partyId].name}`;
            generateCritiquePreview(dog, partyId);
            renderActionButtons(dog.critiqueStatus);

            document.getElementById('reviewModal').classList.remove('hidden');
        }

        function hideReview() {
            document.getElementById('reviewModal').classList.add('hidden');
            currentReview = null;
        }

        function generateCritiquePreview(dog, partyId) {
            const latestRound = dog.rounds[dog.rounds.length - 1];
            const s = latestRound.scores;

            const allNotes = dog.rounds
                .filter(r => r.notes && r.notes.trim())
                .map((r, i) => r.notes)
                .join(' ');

            const prizeColors = {
                '1. premie': 'from-yellow-400 to-amber-500',
                '2. premie': 'from-gray-300 to-gray-400',
                '3. premie': 'from-amber-600 to-amber-700'
            };
            const prizeGradient = prizeColors[dog.prize] || 'from-neutral-200 to-neutral-300';

            document.getElementById('critiquePreview').innerHTML = `
                <div class="bg-white rounded-xl shadow-xl overflow-hidden max-w-2xl mx-auto">
                    <!-- Header with Logo & Title -->
                    <div class="bg-gradient-to-r from-primary-600 to-neutral-800 text-white p-6">
                        <div class="flex items-center justify-between">
                            <div>

                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>

                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-amber-100 rounded-full flex items-center justify-center">

                    <button onclick="printCritique()" class="w-full py-2 bg-neutral-100 hover:bg-neutral-200 text-neutral-700 rounded-xl transition text-sm font-medium flex items-center justify-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
                        </svg>

                `;
            } else {
                // Pending - show approval buttons
                container.innerHTML = `
                    <div id="returnCommentSection" class="hidden">
                        <label class="block text-sm font-medium text-neutral-700 mb-2">Kommentar til dommer</label>

        function toggleReturnSection() {
            const section = document.getElementById('returnCommentSection');
            const btn = document.getElementById('returnBtn');

            if (section.classList.contains('hidden')) {
                section.classList.remove('hidden');
                btn.innerHTML = `
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                    </svg>
                    Bekreft retur
                `;
                btn.onclick = returnCritique;
            } else {
                section.classList.add('hidden');
                btn.innerHTML = `
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/>

                    Send tilbake

        async function downloadPdf() {
            if (!currentReview) return;

            const dog = currentReview.dog;
            const element = document.getElementById('critiquePreview');

            // Check if libraries are loaded
            if (typeof html2canvas === 'undefined') {
                alert('PDF-biblioteket html2canvas er ikke lastet. Prøv å laste siden på nytt.');
                return;
            }
            if (typeof window.jspdf === 'undefined') {
                alert('PDF-biblioteket jsPDF er ikke lastet. Prøv å laste siden på nytt.');
                return;
            }

            // Show loading state
            const btn = event.target.closest('button');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Genererer PDF...
            `;

            try {
                // Small delay to let UI update
                await new Promise(resolve => setTimeout(resolve, 100));

                // Capture the critique preview as canvas
                const canvas = await html2canvas(element, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#ffffff',
                    logging: false
                });

                // Create PDF
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');

                const imgWidth = 210; // A4 width in mm
                const imgHeight = (canvas.height * imgWidth) / canvas.width;

                const imgData = canvas.toDataURL('image/png');
                pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);

                // Generate filename
                const safeName = dog.name.replace(/[^a-zA-Z0-9æøåÆØÅ]/g, '_');
                const filename = `Kritikk_${safeName}_${dog.nr}.pdf`;

                // Open PDF in new tab - works better on Safari/Mac
                const pdfBlob = pdf.output('blob');
                const pdfUrl = URL.createObjectURL(pdfBlob);

                // Open in new window/tab
                const pdfWindow = window.open(pdfUrl, '_blank');

                if (pdfWindow) {
                    showToast('PDF åpnet i ny fane. Bruk Cmd+S for å lagre.', 'success');
                } else {
                    // Popup blocked - try direct download as fallback
                    const link = document.createElement('a');
                    link.href = pdfUrl;
                    link.download = filename;
                    link.style.display = 'none';
                    document.body.appendChild(link);
                    link.click();
                    setTimeout(() => {
                        document.body.removeChild(link);
                        URL.revokeObjectURL(pdfUrl);
                    }, 100);
                    showToast('PDF lastet ned til Nedlastinger-mappen', 'success');
                }
            } catch (error) {
                console.error('PDF generation error:', error);
                alert('Feil ved generering av PDF: ' + error.message + '\n\nPrøv "Skriv ut" og velg "Lagre som PDF" i stedet.');
            } finally {
                // Restore button
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        async function approveCritique() {
            if (!currentReview) return;

            const { partyId, dogId, dog, dogs } = currentReview;

            dog.critiqueStatus = 'approved';
            dog.approvedAt = new Date().toISOString();
            dog.approvedBy = nkkRepInfo?.name || 'NKK-representant';

            localStorage.setItem('judgeData_' + partyId, JSON.stringify(dogs));

            // Also update partyLists with approved prize
            await updatePartyListsWithPrize(partyId, dog);

            hideReview();
            render();

            // Show success toast
            showToast('Kritikken er godkjent!', 'success');
        }

        // Update partyLists with approved prize for the dog
        async function updatePartyListsWithPrize(partyId, approvedDog) {
            try {
                // Load partyLists from server
                let partyLists = [];
                const resp = await fetch('/api/storage/partyLists');
                if (resp.ok) {
                    const { value } = await resp.json();
                    partyLists = value || [];
                } else {
                    const saved = localStorage.getItem('partyLists');
                    if (saved) partyLists = JSON.parse(saved);
                }

                if (!partyLists || partyLists.length === 0) return;

                // Find the dog in partyLists by regnr or name
                let found = false;
                partyLists.forEach(party => {
                    if (!party.dogs) return;
                    party.dogs.forEach(dog => {
                        // Match by registration number or name
                        const matchByRegnr = approvedDog.regNr && dog.regnr === approvedDog.regNr;
                        const matchByName = dog.navn === approvedDog.name;

                        if (matchByRegnr || matchByName) {
                            // Update dog with approved prize
                            dog.approvedPrize = approvedDog.prize;
                            dog.approvedAt = approvedDog.approvedAt;
                            dog.approvedBy = approvedDog.approvedBy;
                            dog.critiqueApproved = true;
                            found = true;
                            console.log('[NKK] Updated dog with prize:', dog.navn, approvedDog.prize);
                        }
                    });
                });

                if (found) {
                    // Save updated partyLists
                    localStorage.setItem('partyLists', JSON.stringify(partyLists));

                    // Also save to server
                    await fetch('/api/storage/partyLists', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ value: partyLists })
                    });

                    console.log('[NKK] Saved partyLists with approved prize');
                }
            } catch (e) {
                console.error('[NKK] Error updating partyLists:', e);
            }
        }

        function returnCritique() {
            if (!currentReview) return;

            const comment = document.getElementById('returnComment').value.trim();
            const { partyId, dogId, dog, dogs } = currentReview;

            dog.critiqueStatus = 'returned';
            dog.nkkComment = comment || 'Vennligst se over kritikken på nytt.';
            dog.returnedAt = new Date().toISOString();

            localStorage.setItem('judgeData_' + partyId, JSON.stringify(dogs));

            hideReview();
            render();

            showToast('Kritikken er sendt tilbake til dommer', 'warning');
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-6 right-6 px-6 py-4 rounded-xl shadow-2xl text-white font-medium z-50 flex items-center gap-3 ${
                type === 'success' ? 'bg-green-600' : 'bg-amber-500'
            }`;
            toast.innerHTML = `
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    ${type === 'success'
                        ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>'
                        : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>'
                    }
                </svg>
                ${message}
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function printCritique() {
            window.print();
        }

        function viewCritique() {
            if (!currentReview) return;
            const { partyId, dogId } = currentReview;
            window.open(`kritikk-visning.html?party=${partyId}&dog=${dogId}`, '_blank');
        }

        initTestData();
        loadNkkRepInfo();
        render();
