<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min profil - Fuglehundprøver</title>
    <script src="shared-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rockwell&display=swap" rel="stylesheet">
    <style>
        .tab-active { border-bottom: 3px solid #657a53; color: #657a53; }
    </style>
</head>
<body class="bg-cream min-h-screen">

    <!-- Header -->
    <header class="bg-forest-800 text-white shadow-lg">
        <div class="max-w-4xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition">
                        <svg class="w-8 h-8 text-forest-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                        </svg>
                        <span class="font-rockwell font-bold">Fuglehundprøver</span>
                    </a>
                </div>
                <div class="flex items-center gap-3">
                    <!-- Search button injected by dog-search.js -->
                    <button onclick="logout()" class="bg-forest-700 hover:bg-forest-600 px-4 py-2 rounded-lg text-sm font-medium transition">
                        Logg ut
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="bg-white border-b border-bark-200 shadow-sm sticky top-0 z-10">
        <div class="max-w-4xl mx-auto px-4">
            <div class="flex overflow-x-auto">
                <a href="profil.html" class="tab-active px-5 py-4 text-sm font-medium whitespace-nowrap transition hover:bg-bark-50">
                    Min profil
                </a>
                <a href="mine-hunder.html" class="px-5 py-4 text-sm font-medium text-bark-600 whitespace-nowrap border-b-3 border-transparent transition hover:bg-bark-50 hover:text-bark-800">
                    Mine hunder
                </a>
                <a href="jaktprover.html" class="px-5 py-4 text-sm font-medium text-bark-600 whitespace-nowrap border-b-3 border-transparent transition hover:bg-bark-50 hover:text-bark-800">
                    Jaktprøver
                </a>
                <a href="fullmakter.html" class="px-5 py-4 text-sm font-medium text-bark-600 whitespace-nowrap border-b-3 border-transparent transition hover:bg-bark-50 hover:text-bark-800">
                    Tildelte fullmakter
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-8">
        <!-- Profile Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-earth-200 overflow-hidden">
            <!-- Profile Header with Photo -->
            <div class="bg-gradient-to-r from-forest-700 to-forest-800 px-6 py-8">
                <div class="flex flex-col sm:flex-row items-center gap-6">
                    <!-- Profile Photo -->
                    <div class="relative group">
                        <div id="profileImageContainer" class="w-28 h-28 rounded-full bg-white border-4 border-white shadow-lg overflow-hidden flex items-center justify-center">
                            <img id="profileImage" src="" alt="Profilbilde" class="w-full h-full object-cover hidden">
                            <div id="profileInitials" class="text-4xl font-bold text-forest-600">--</div>
                        </div>
                        <label for="photoUpload" class="absolute inset-0 flex items-center justify-center bg-black/50 rounded-full opacity-0 group-hover:opacity-100 cursor-pointer transition">
                            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                        </label>
                        <input type="file" id="photoUpload" accept="image/*" class="hidden" onchange="handlePhotoUpload(event)">
                    </div>
                    <!-- Name and Basic Info -->
                    <div class="text-center sm:text-left">
                        <h1 id="displayName" class="text-2xl sm:text-3xl font-bold font-rockwell text-white">-</h1>
                        <p class="text-forest-200 mt-1">Medlem siden <span id="memberSince">-</span></p>
                    </div>
                </div>
            </div>

            <!-- Profile Details -->
            <div class="p-6">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-lg font-semibold font-rockwell text-bark-800">Personopplysninger</h2>
                    <button onclick="toggleEdit()" id="editBtn" class="text-forest-600 hover:text-forest-700 text-sm font-medium flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                        </svg>
                        <span id="editBtnText">Rediger</span>
                    </button>
                </div>

                <form id="profileForm" class="space-y-5">
                    <!-- Full Name -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-bark-700 mb-1">Fornavn</label>
                            <input type="text" id="firstName" disabled
                                class="w-full px-4 py-3 rounded-xl border-2 border-bark-200 bg-bark-50 text-bark-700 disabled:opacity-70">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-bark-700 mb-1">Etternavn</label>
                            <input type="text" id="lastName" disabled
                                class="w-full px-4 py-3 rounded-xl border-2 border-bark-200 bg-bark-50 text-bark-700 disabled:opacity-70">
                        </div>
                    </div>

                    <!-- Email -->
                    <div>
                        <label class="block text-sm font-medium text-bark-700 mb-1">E-postadresse</label>
                        <div class="relative">
                            <svg class="w-5 h-5 text-bark-400 absolute left-4 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                            </svg>
                            <input type="email" id="email" disabled
                                class="w-full pl-12 pr-4 py-3 rounded-xl border-2 border-bark-200 bg-bark-50 text-bark-700 disabled:opacity-70">
                        </div>
                    </div>

                    <!-- Phone -->
                    <div>
                        <label class="block text-sm font-medium text-bark-700 mb-1">Telefonnummer</label>
                        <div class="relative">
                            <svg class="w-5 h-5 text-bark-400 absolute left-4 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                            </svg>
                            <input type="tel" id="phone" disabled
                                class="w-full pl-12 pr-4 py-3 rounded-xl border-2 border-bark-200 bg-bark-50 text-bark-700 disabled:opacity-70">
                        </div>
                    </div>

                    <!-- Address -->
                    <div>
                        <label class="block text-sm font-medium text-bark-700 mb-1">Adresse</label>
                        <div class="relative">
                            <svg class="w-5 h-5 text-bark-400 absolute left-4 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                            <input type="text" id="address" disabled placeholder="Gateadresse"
                                class="w-full pl-12 pr-4 py-3 rounded-xl border-2 border-bark-200 bg-bark-50 text-bark-700 disabled:opacity-70 mb-3">
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <input type="text" id="postalCode" disabled placeholder="Postnr"
                                class="w-full px-4 py-3 rounded-xl border-2 border-bark-200 bg-bark-50 text-bark-700 disabled:opacity-70">
                            <input type="text" id="city" disabled placeholder="Sted"
                                class="col-span-2 w-full px-4 py-3 rounded-xl border-2 border-bark-200 bg-bark-50 text-bark-700 disabled:opacity-70">
                        </div>
                    </div>

                    <!-- Save/Cancel Buttons (hidden by default) -->
                    <div id="editActions" class="hidden pt-4 flex gap-3">
                        <button type="button" onclick="saveProfile()" class="flex-1 bg-forest-600 hover:bg-forest-700 text-white font-semibold py-3 rounded-xl transition">
                            Lagre endringer
                        </button>
                        <button type="button" onclick="cancelEdit()" class="px-6 bg-bark-200 hover:bg-bark-300 text-bark-700 font-semibold py-3 rounded-xl transition">
                            Avbryt
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Quick Stats -->
        <div class="grid grid-cols-3 gap-4 mt-6">
            <div class="bg-white rounded-xl p-4 border border-earth-200 text-center">
                <p class="text-2xl font-bold text-forest-600" id="dogCount">0</p>
                <p class="text-sm text-bark-500">Hunder</p>
            </div>
            <div class="bg-white rounded-xl p-4 border border-earth-200 text-center">
                <p class="text-2xl font-bold text-earth-600" id="trialCount">0</p>
                <p class="text-sm text-bark-500">Prøver</p>
            </div>
            <div class="bg-white rounded-xl p-4 border border-earth-200 text-center">
                <p class="text-2xl font-bold text-amber-600" id="mandateCount">0</p>
                <p class="text-sm text-bark-500">Fullmakter</p>
            </div>
        </div>
    </main>

    <script>
        // Check if logged in
        let userProfile = JSON.parse(localStorage.getItem('userProfile') || 'null');
        if (!userProfile) {
            // For demo, create a sample profile
            userProfile = {
                firstName: 'Kari',
                lastName: 'Nordmann',
                email: 'kari.nordmann@example.com',
                phone: '+47 912 34 567',
                address: 'Fjellveien 42',
                postalCode: '2500',
                city: 'Tynset',
                memberSince: '2024',
                profileImage: null
            };
            localStorage.setItem('userProfile', JSON.stringify(userProfile));
        }

        let isEditing = false;
        let originalData = {};

        // Initialize page
        function init() {
            loadProfile();
            loadStats();
        }

        function loadProfile() {
            const profile = userProfile;

            // Set form values
            document.getElementById('firstName').value = profile.firstName || '';
            document.getElementById('lastName').value = profile.lastName || '';
            document.getElementById('email').value = profile.email || '';
            document.getElementById('phone').value = profile.phone || '';
            document.getElementById('address').value = profile.address || '';
            document.getElementById('postalCode').value = profile.postalCode || '';
            document.getElementById('city').value = profile.city || '';

            // Set display name
            const fullName = `${profile.firstName || ''} ${profile.lastName || ''}`.trim() || 'Bruker';
            document.getElementById('displayName').textContent = fullName;
            document.getElementById('memberSince').textContent = profile.memberSince || '-';

            // Set initials
            const initials = getInitials(profile.firstName, profile.lastName);
            document.getElementById('profileInitials').textContent = initials;

            // Set profile image if exists
            if (profile.profileImage) {
                document.getElementById('profileImage').src = profile.profileImage;
                document.getElementById('profileImage').classList.remove('hidden');
                document.getElementById('profileInitials').classList.add('hidden');
            }
        }

        function getInitials(firstName, lastName) {
            const first = (firstName || '').charAt(0).toUpperCase();
            const last = (lastName || '').charAt(0).toUpperCase();
            return first + last || '--';
        }

        function loadStats() {
            // Load stats from localStorage
            const dogs = JSON.parse(localStorage.getItem('userDogs') || '[]');
            const trials = JSON.parse(localStorage.getItem('userTrials') || '[]');
            const mandates = JSON.parse(localStorage.getItem('userMandates') || '[]');

            document.getElementById('dogCount').textContent = dogs.length;
            document.getElementById('trialCount').textContent = trials.length;
            document.getElementById('mandateCount').textContent = mandates.length;
        }

        function toggleEdit() {
            isEditing = !isEditing;
            const inputs = document.querySelectorAll('#profileForm input');
            const editBtn = document.getElementById('editBtnText');
            const editActions = document.getElementById('editActions');

            if (isEditing) {
                // Save original data
                originalData = {
                    firstName: document.getElementById('firstName').value,
                    lastName: document.getElementById('lastName').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    address: document.getElementById('address').value,
                    postalCode: document.getElementById('postalCode').value,
                    city: document.getElementById('city').value
                };

                // Enable inputs
                inputs.forEach(input => {
                    input.disabled = false;
                    input.classList.remove('bg-bark-50', 'opacity-70');
                    input.classList.add('bg-white', 'focus:border-forest-500');
                });

                editBtn.textContent = 'Avbryt';
                editActions.classList.remove('hidden');
            } else {
                cancelEdit();
            }
        }

        function cancelEdit() {
            isEditing = false;
            const inputs = document.querySelectorAll('#profileForm input');
            const editBtn = document.getElementById('editBtnText');
            const editActions = document.getElementById('editActions');

            // Restore original data
            if (originalData.firstName !== undefined) {
                document.getElementById('firstName').value = originalData.firstName;
                document.getElementById('lastName').value = originalData.lastName;
                document.getElementById('email').value = originalData.email;
                document.getElementById('phone').value = originalData.phone;
                document.getElementById('address').value = originalData.address;
                document.getElementById('postalCode').value = originalData.postalCode;
                document.getElementById('city').value = originalData.city;
            }

            // Disable inputs
            inputs.forEach(input => {
                input.disabled = true;
                input.classList.add('bg-bark-50', 'opacity-70');
                input.classList.remove('bg-white', 'focus:border-forest-500');
            });

            editBtn.textContent = 'Rediger';
            editActions.classList.add('hidden');
        }

        function saveProfile() {
            // Update profile
            userProfile.firstName = document.getElementById('firstName').value;
            userProfile.lastName = document.getElementById('lastName').value;
            userProfile.email = document.getElementById('email').value;
            userProfile.phone = document.getElementById('phone').value;
            userProfile.address = document.getElementById('address').value;
            userProfile.postalCode = document.getElementById('postalCode').value;
            userProfile.city = document.getElementById('city').value;

            // Save to localStorage
            localStorage.setItem('userProfile', JSON.stringify(userProfile));

            // Update display
            const fullName = `${userProfile.firstName} ${userProfile.lastName}`.trim();
            document.getElementById('displayName').textContent = fullName;
            document.getElementById('profileInitials').textContent = getInitials(userProfile.firstName, userProfile.lastName);

            // Exit edit mode
            isEditing = true; // So toggleEdit will cancel properly
            toggleEdit();

            // Show success message
            showToast('Profilen er oppdatert');
        }

        function handlePhotoUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imageData = e.target.result;

                    // Update display
                    document.getElementById('profileImage').src = imageData;
                    document.getElementById('profileImage').classList.remove('hidden');
                    document.getElementById('profileInitials').classList.add('hidden');

                    // Save to profile
                    userProfile.profileImage = imageData;
                    localStorage.setItem('userProfile', JSON.stringify(userProfile));

                    showToast('Profilbilde oppdatert');
                };
                reader.readAsDataURL(file);
            }
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-4 left-1/2 -translate-x-1/2 bg-bark-800 text-white px-6 py-3 rounded-xl shadow-lg z-50 animate-pulse';
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 2000);
        }

        function logout() {
            if (confirm('Er du sikker på at du vil logge ut?')) {
                localStorage.removeItem('judgeSession');
                window.location.href = 'index.html';
            }
        }

        // Initialize
        init();
    </script>
<script src="dog-search.js"></script>
</body>
</html>
