<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min profil - Fuglehundprøver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: { DEFAULT: '#FAF8F5', 50: '#FFFFFF', 100: '#FAF8F5', 200: '#F5F0E8', 300: '#E7DAC8' },
                        sky: { 50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' },
                        bark: { 50: '#f7f5f4', 100: '#edeae7', 200: '#ddd6d0', 300: '#c7bcb2', 400: '#ae9d90', 500: '#9a8677', 600: '#8d776a', 700: '#756259', 800: '#61524b', 900: '#2a2321' }
                    },
                    fontFamily: {
                        'serif': ['Playfair Display', 'Georgia', 'serif'],
                        'sans': ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        .tab-active { border-bottom: 3px solid #0ea5e9; color: #0ea5e9; }
    </style>
</head>
<body class="bg-cream font-sans min-h-screen">

    <!-- Header -->
    <header class="bg-bark-900 text-white shadow-lg">
        <div class="max-w-4xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition">
                        <svg class="w-8 h-8 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                        </svg>
                        <span class="font-serif font-bold">Fuglehundprover</span>
                    </a>
                </div>
                <div class="flex items-center gap-3">
                    <!-- Search button injected by dog-search.js -->
                    <button onclick="logout()" class="bg-bark-800 hover:bg-sky-600 px-4 py-2 rounded-xl text-sm font-medium transition">
                        Logg ut
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="bg-white border-b border-bark-100 shadow-sm sticky top-0 z-10">
        <div class="max-w-4xl mx-auto px-4">
            <div class="flex overflow-x-auto">
                <a href="min-side.html" class="px-5 py-4 text-sm font-medium text-bark-500 hover:text-bark-700 whitespace-nowrap border-b-2 border-transparent hover:border-bark-300 transition">Min side</a>
                <a href="profil.html" class="tab-active px-5 py-4 text-sm font-medium whitespace-nowrap border-b-2 border-sky-500 text-sky-600">Min profil</a>
                <a href="mine-hunder.html" class="px-5 py-4 text-sm font-medium text-bark-500 hover:text-bark-700 whitespace-nowrap border-b-2 border-transparent hover:border-bark-300 transition">Mine hunder</a>
                <a href="jaktprover.html" class="px-5 py-4 text-sm font-medium text-bark-500 hover:text-bark-700 whitespace-nowrap border-b-2 border-transparent hover:border-bark-300 transition">Jaktprover</a>
                <a href="fullmakter.html" class="px-5 py-4 text-sm font-medium text-bark-500 hover:text-bark-700 whitespace-nowrap border-b-2 border-transparent hover:border-bark-300 transition">Fullmakter</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-8">
        <!-- Profile Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-bark-100 overflow-hidden">
            <!-- Profile Header with Photo -->
            <div class="bg-gradient-to-r from-bark-800 to-bark-900 px-6 py-8">
                <div class="flex flex-col sm:flex-row items-center gap-6">
                    <!-- Profile Photo -->
                    <div class="relative group">
                        <div id="profileImageContainer" class="w-28 h-28 rounded-full bg-white border-4 border-white shadow-lg overflow-hidden flex items-center justify-center">
                            <img id="profileImage" src="" alt="Profilbilde" class="w-full h-full object-cover hidden">
                            <div id="profileInitials" class="text-4xl font-bold text-sky-500">--</div>
                        </div>
                        <label for="photoUpload" class="absolute inset-0 flex items-center justify-center bg-black/50 rounded-full opacity-0 group-hover:opacity-100 cursor-pointer transition">
                            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                        </label>
                        <input type="file" id="photoUpload" accept="image/*" class="hidden" onchange="handlePhotoUpload(event)">
                    </div>
                    <!-- Name and Basic Info -->
                    <div class="text-center sm:text-left">
                        <h1 id="displayName" class="text-2xl sm:text-3xl font-bold font-serif text-white">-</h1>
                        <p class="text-bark-300 mt-1">Medlem siden <span id="memberSince">-</span></p>
                    </div>
                </div>
            </div>

            <!-- Profile Details -->
            <div class="p-6">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-lg font-semibold font-serif text-bark-800">Personopplysninger</h2>
                    <button onclick="toggleEdit()" id="editBtn" class="text-sky-500 hover:text-sky-600 text-sm font-medium flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                        </svg>
                        <span id="editBtnText">Rediger</span>
                    </button>
                </div>

                <form id="profileForm" class="space-y-5">
                    <!-- Full Name -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-bark-700 mb-1">Fornavn</label>
                            <input type="text" id="firstName" disabled
                                class="w-full px-4 py-3 rounded-xl border-2 border-bark-200 bg-bark-50 text-bark-700 disabled:opacity-70">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-bark-700 mb-1">Etternavn</label>
                            <input type="text" id="lastName" disabled
                                class="w-full px-4 py-3 rounded-xl border-2 border-bark-200 bg-bark-50 text-bark-700 disabled:opacity-70">
                        </div>
                    </div>

                    <!-- Email -->
                    <div>
                        <label class="block text-sm font-medium text-bark-700 mb-1">E-postadresse</label>
                        <div class="relative">
                            <svg class="w-5 h-5 text-bark-400 absolute left-4 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                            </svg>
                            <input type="email" id="email" disabled
                                class="w-full pl-12 pr-4 py-3 rounded-xl border-2 border-bark-200 bg-bark-50 text-bark-700 disabled:opacity-70">
                        </div>
                    </div>

                    <!-- Phone -->
                    <div>
                        <label class="block text-sm font-medium text-bark-700 mb-1">Telefonnummer</label>
                        <div class="relative">
                            <svg class="w-5 h-5 text-bark-400 absolute left-4 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                            </svg>
                            <input type="tel" id="phone" disabled
                                class="w-full pl-12 pr-4 py-3 rounded-xl border-2 border-bark-200 bg-bark-50 text-bark-700 disabled:opacity-70">
                        </div>
                    </div>

                    <!-- Address -->
                    <div>
                        <label class="block text-sm font-medium text-bark-700 mb-1">Adresse</label>
                        <div class="relative">
                            <svg class="w-5 h-5 text-bark-400 absolute left-4 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                            <input type="text" id="address" disabled placeholder="Gateadresse"
                                class="w-full pl-12 pr-4 py-3 rounded-xl border-2 border-bark-200 bg-bark-50 text-bark-700 disabled:opacity-70 mb-3">
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <input type="text" id="postalCode" disabled placeholder="Postnr"
                                class="w-full px-4 py-3 rounded-xl border-2 border-bark-200 bg-bark-50 text-bark-700 disabled:opacity-70">
                            <input type="text" id="city" disabled placeholder="Sted"
                                class="col-span-2 w-full px-4 py-3 rounded-xl border-2 border-bark-200 bg-bark-50 text-bark-700 disabled:opacity-70">
                        </div>
                    </div>

                    <!-- Save/Cancel Buttons (hidden by default) -->
                    <div id="editActions" class="hidden pt-4 flex gap-3">
                        <button type="button" onclick="saveProfile()" class="flex-1 bg-sky-500 hover:bg-sky-600 text-white font-semibold py-3 rounded-xl transition">
                            Lagre endringer
                        </button>
                        <button type="button" onclick="cancelEdit()" class="px-6 bg-bark-200 hover:bg-bark-300 text-bark-700 font-semibold py-3 rounded-xl transition">
                            Avbryt
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Quick Stats -->
        <div class="grid grid-cols-3 gap-4 mt-6">
            <div class="bg-white rounded-xl p-4 border border-bark-100 text-center">
                <p class="text-2xl font-bold text-sky-500" id="dogCount">0</p>
                <p class="text-sm text-bark-500">Hunder</p>
            </div>
            <div class="bg-white rounded-xl p-4 border border-bark-100 text-center">
                <p class="text-2xl font-bold text-sky-600" id="trialCount">0</p>
                <p class="text-sm text-bark-500">Prover</p>
            </div>
            <div class="bg-white rounded-xl p-4 border border-bark-100 text-center">
                <p class="text-2xl font-bold text-amber-600" id="mandateCount">0</p>
                <p class="text-sm text-bark-500">Fullmakter</p>
            </div>
        </div>

        <!-- Roller-seksjon -->
        <div id="rolesSection" class="mt-6 hidden">
            <div class="bg-white rounded-xl border border-bark-100 shadow-sm p-6">
                <h2 class="text-lg font-semibold font-serif text-bark-800 mb-4">Dine roller</h2>
                <div id="rolesContainer" class="flex flex-wrap gap-3">
                    <!-- Roller rendres her -->
                </div>
            </div>
        </div>
    </main>

    <script>
        // Hent innlogget bruker - sjekk flere kilder
        function getLoggedInPhone() {
            // Sjekk userSession først
            const userSession = localStorage.getItem('userSession');
            if (userSession) {
                try {
                    const session = JSON.parse(userSession);
                    if (session.phone) return session.phone.replace(/\D/g, '');
                } catch {}
            }

            // Fallback til judgeSession
            const judgeSession = localStorage.getItem('judgeSession');
            if (judgeSession) {
                try {
                    const session = JSON.parse(judgeSession);
                    if (session.phone) return session.phone.replace(/\D/g, '');
                } catch {}
            }

            // Fallback til userProfile (legacy)
            const userProfile = localStorage.getItem('userProfile');
            if (userProfile) {
                try {
                    const profile = JSON.parse(userProfile);
                    if (profile.phone) return profile.phone.replace(/\D/g, '');
                } catch {}
            }

            return '';
        }

        const userPhone = getLoggedInPhone();

        let userProfile = null;
        let userRoles = [];
        let isEditing = false;
        let originalData = {};

        // Initialize page - hent data fra API
        async function init() {
            if (!userPhone) {
                // Ikke innlogget, redirect til min-side
                window.location.href = 'min-side.html';
                return;
            }

            await loadProfileFromAPI();
            await loadStats();
        }

        // Hent profil fra API
        async function loadProfileFromAPI() {
            try {
                const resp = await fetch(`/api/brukere/${userPhone}`);
                if (resp.ok) {
                    const data = await resp.json();
                    userProfile = {
                        firstName: data.fornavn || '',
                        lastName: data.etternavn || '',
                        email: data.epost || '',
                        phone: data.telefon || userPhone,
                        address: data.adresse || '',
                        postalCode: data.postnummer || '',
                        city: data.sted || '',
                        memberSince: data.medlem_siden || new Date().getFullYear().toString(),
                        profileImage: data.profilbilde || null,
                        klubbAdmin: data.klubbAdmin || null
                    };
                    // Parse roller fra komma-separert streng
                    userRoles = (data.rolle || '').split(',').map(r => r.trim()).filter(r => r);
                } else {
                    // Bruker finnes ikke i DB, lag tom profil
                    userProfile = {
                        firstName: '',
                        lastName: '',
                        email: '',
                        phone: userPhone,
                        address: '',
                        postalCode: '',
                        city: '',
                        memberSince: new Date().getFullYear().toString(),
                        profileImage: null,
                        klubbAdmin: null
                    };
                    userRoles = [];
                }
            } catch (err) {
                console.error('Kunne ikke hente profil:', err);
                userProfile = {
                    firstName: '',
                    lastName: '',
                    email: '',
                    phone: userPhone,
                    address: '',
                    postalCode: '',
                    city: '',
                    memberSince: new Date().getFullYear().toString(),
                    profileImage: null,
                    klubbAdmin: null
                };
                userRoles = [];
            }

            loadProfile();
            renderRoles();
        }

        function loadProfile() {
            const profile = userProfile;

            // Set form values
            document.getElementById('firstName').value = profile.firstName || '';
            document.getElementById('lastName').value = profile.lastName || '';
            document.getElementById('email').value = profile.email || '';
            document.getElementById('phone').value = profile.phone || '';
            document.getElementById('address').value = profile.address || '';
            document.getElementById('postalCode').value = profile.postalCode || '';
            document.getElementById('city').value = profile.city || '';

            // Set display name
            const fullName = `${profile.firstName || ''} ${profile.lastName || ''}`.trim() || 'Bruker';
            document.getElementById('displayName').textContent = fullName;
            document.getElementById('memberSince').textContent = profile.memberSince || '-';

            // Set initials
            const initials = getInitials(profile.firstName, profile.lastName);
            document.getElementById('profileInitials').textContent = initials;

            // Set profile image if exists
            if (profile.profileImage) {
                document.getElementById('profileImage').src = profile.profileImage;
                document.getElementById('profileImage').classList.remove('hidden');
                document.getElementById('profileInitials').classList.add('hidden');
            }
        }

        function getInitials(firstName, lastName) {
            const first = (firstName || '').charAt(0).toUpperCase();
            const last = (lastName || '').charAt(0).toUpperCase();
            return first + last || '--';
        }

        async function loadStats() {
            // Hent hunder fra API
            try {
                const resp = await fetch(`/api/brukere/${userPhone}/hunder`);
                if (resp.ok) {
                    const hunder = await resp.json();
                    document.getElementById('dogCount').textContent = hunder.length;
                } else {
                    document.getElementById('dogCount').textContent = '0';
                }
            } catch (err) {
                document.getElementById('dogCount').textContent = '0';
            }

            // Hent prøver fra API
            try {
                const resp = await fetch(`/api/brukere/${userPhone}/prover`);
                if (resp.ok) {
                    const prover = await resp.json();
                    document.getElementById('trialCount').textContent = prover.length;
                } else {
                    document.getElementById('trialCount').textContent = '0';
                }
            } catch (err) {
                document.getElementById('trialCount').textContent = '0';
            }

            // Fullmakter fra localStorage (ikke migrert ennå)
            const mandates = JSON.parse(localStorage.getItem('userMandates') || '[]');
            document.getElementById('mandateCount').textContent = mandates.length;
        }

        // Render roller-seksjonen
        function renderRoles() {
            const section = document.getElementById('rolesSection');
            const container = document.getElementById('rolesContainer');

            if (userRoles.length === 0) {
                section.classList.add('hidden');
                return;
            }

            section.classList.remove('hidden');

            const roleConfig = {
                'deltaker': { label: 'Deltaker', icon: 'user', bgColor: 'bg-bark-100', textColor: 'text-bark-700', iconColor: 'text-bark-500' },
                'dommer': { label: 'Dommer', icon: 'clipboard', bgColor: 'bg-sky-100', textColor: 'text-sky-700', iconColor: 'text-sky-500' },
                'proveleder': { label: 'Prøveleder', icon: 'crown', bgColor: 'bg-amber-100', textColor: 'text-amber-700', iconColor: 'text-amber-500' },
                'klubbleder': { label: 'Klubbleder', icon: 'star', bgColor: 'bg-purple-100', textColor: 'text-purple-700', iconColor: 'text-purple-500' },
                'nkkrep': { label: 'NKK-representant', icon: 'badge', bgColor: 'bg-blue-100', textColor: 'text-blue-700', iconColor: 'text-blue-500' },
                'admin': { label: 'Administrator', icon: 'cog', bgColor: 'bg-red-100', textColor: 'text-red-700', iconColor: 'text-red-500' }
            };

            const icons = {
                'user': '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>',
                'clipboard': '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>',
                'crown': '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3l3.5 6L12 5l3.5 4L19 3v15a2 2 0 01-2 2H7a2 2 0 01-2-2V3z"/></svg>',
                'star': '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>',
                'badge': '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/></svg>',
                'cog': '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>'
            };

            container.innerHTML = userRoles.map(role => {
                const config = roleConfig[role] || { label: role, icon: 'user', bgColor: 'bg-bark-100', textColor: 'text-bark-700', iconColor: 'text-bark-500' };
                return `
                    <div class="flex items-center gap-2 ${config.bgColor} ${config.textColor} px-4 py-2 rounded-full">
                        <span class="${config.iconColor}">${icons[config.icon]}</span>
                        <span class="font-medium text-sm">${config.label}</span>
                    </div>
                `;
            }).join('');

            // Vis klubbinfo hvis klubbleder
            if (userProfile.klubbAdmin) {
                container.innerHTML += `
                    <div class="w-full mt-3 pt-3 border-t border-bark-200">
                        <p class="text-sm text-bark-600">
                            <span class="font-medium">Klubb:</span> ${userProfile.klubbAdmin.klubb_navn}
                        </p>
                    </div>
                `;
            }
        }

        function toggleEdit() {
            isEditing = !isEditing;
            const inputs = document.querySelectorAll('#profileForm input');
            const editBtn = document.getElementById('editBtnText');
            const editActions = document.getElementById('editActions');

            if (isEditing) {
                // Save original data
                originalData = {
                    firstName: document.getElementById('firstName').value,
                    lastName: document.getElementById('lastName').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    address: document.getElementById('address').value,
                    postalCode: document.getElementById('postalCode').value,
                    city: document.getElementById('city').value
                };

                // Enable inputs
                inputs.forEach(input => {
                    input.disabled = false;
                    input.classList.remove('bg-bark-50', 'opacity-70');
                    input.classList.add('bg-white', 'focus:border-sky-500');
                });

                editBtn.textContent = 'Avbryt';
                editActions.classList.remove('hidden');
            } else {
                cancelEdit();
            }
        }

        function cancelEdit() {
            isEditing = false;
            const inputs = document.querySelectorAll('#profileForm input');
            const editBtn = document.getElementById('editBtnText');
            const editActions = document.getElementById('editActions');

            // Restore original data
            if (originalData.firstName !== undefined) {
                document.getElementById('firstName').value = originalData.firstName;
                document.getElementById('lastName').value = originalData.lastName;
                document.getElementById('email').value = originalData.email;
                document.getElementById('phone').value = originalData.phone;
                document.getElementById('address').value = originalData.address;
                document.getElementById('postalCode').value = originalData.postalCode;
                document.getElementById('city').value = originalData.city;
            }

            // Disable inputs
            inputs.forEach(input => {
                input.disabled = true;
                input.classList.add('bg-bark-50', 'opacity-70');
                input.classList.remove('bg-white', 'focus:border-sky-500');
            });

            editBtn.textContent = 'Rediger';
            editActions.classList.add('hidden');
        }

        async function saveProfile() {
            // Update profile
            userProfile.firstName = document.getElementById('firstName').value;
            userProfile.lastName = document.getElementById('lastName').value;
            userProfile.email = document.getElementById('email').value;
            userProfile.phone = document.getElementById('phone').value;
            userProfile.address = document.getElementById('address').value;
            userProfile.postalCode = document.getElementById('postalCode').value;
            userProfile.city = document.getElementById('city').value;

            // Save to API
            try {
                const resp = await fetch(`/api/brukere/${userPhone}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fornavn: userProfile.firstName,
                        etternavn: userProfile.lastName,
                        epost: userProfile.email,
                        adresse: userProfile.address,
                        postnummer: userProfile.postalCode,
                        sted: userProfile.city,
                        profilbilde: userProfile.profileImage
                    })
                });

                if (!resp.ok) {
                    throw new Error('Kunne ikke lagre profil');
                }
            } catch (err) {
                console.error('Feil ved lagring:', err);
                showToast('Kunne ikke lagre profilen');
                return;
            }

            // Update display
            const fullName = `${userProfile.firstName} ${userProfile.lastName}`.trim();
            document.getElementById('displayName').textContent = fullName;
            document.getElementById('profileInitials').textContent = getInitials(userProfile.firstName, userProfile.lastName);

            // Exit edit mode
            isEditing = true; // So toggleEdit will cancel properly
            toggleEdit();

            // Show success message
            showToast('Profilen er oppdatert');
        }

        function handlePhotoUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imageData = e.target.result;

                    // Update display
                    document.getElementById('profileImage').src = imageData;
                    document.getElementById('profileImage').classList.remove('hidden');
                    document.getElementById('profileInitials').classList.add('hidden');

                    // Save to profile
                    userProfile.profileImage = imageData;
                    localStorage.setItem('userProfile', JSON.stringify(userProfile));

                    showToast('Profilbilde oppdatert');
                };
                reader.readAsDataURL(file);
            }
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-4 left-1/2 -translate-x-1/2 bg-bark-800 text-white px-6 py-3 rounded-xl shadow-lg z-50 animate-pulse';
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 2000);
        }

        function logout() {
            if (confirm('Er du sikker på at du vil logge ut?')) {
                localStorage.removeItem('userSession');
                localStorage.removeItem('userProfile');
                localStorage.removeItem('judgeSession');
                localStorage.removeItem('fuglehund_token');
                localStorage.removeItem('fuglehund_user');
                window.location.href = 'index.html';
            }
        }

        // Initialize
        init();
    </script>
<script src="dog-search.js"></script>
</body>
