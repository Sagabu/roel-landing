<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminliste - Fuglehundprøver</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        warm: { 50: '#FFF7F2', 100: '#FFE1CF', 200: '#EAD8CF', 300: '#E5C9B8', 400: '#D4A989', 500: '#FD8536', 600: '#E5721F', 700: '#C45F14', 800: '#6E3018', 900: '#4A1E0D' },
                        cream: { DEFAULT: '#F7F3EE', 50: '#FFFFFF', 100: '#F7F3EE', 200: '#FFF7F2', 300: '#EAD8CF' },
                        sky: { 50: '#FFF7F2', 100: '#FFE1CF', 200: '#EAD8CF', 300: '#FD8536', 400: '#E5721F', 500: '#FD8536', 600: '#E5721F', 700: '#C45F14' },
                        bark: { 50: '#F7F3EE', 100: '#FFF7F2', 200: '#EAD8CF', 300: '#D4A989', 400: '#B8977A', 500: '#9A8268', 600: '#7D6A54', 700: '#6E3018', 800: '#5A2812', 900: '#3D1B0C' }
                    },
                    fontFamily: {
                        'serif': ['Playfair Display', 'Georgia', 'serif'],
                        'sans': ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-cream font-sans min-h-screen">

    <!-- Header -->
    <header class="bg-bark-900/60 text-white backdrop-blur-sm shadow-lg">
        <div class="max-w-4xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition">
                    <img src="images/logo.png" alt="Fuglehundprøve logo" class="w-14 h-14">
                    <span class="font-serif font-bold">Fuglehundprøver</span>
                </a>
                <a href="min-side.html" class="text-bark-300 hover:text-white text-sm transition flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    Min side
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="mb-8">
            <h1 class="text-3xl font-bold font-serif text-bark-800 mb-2">Terminliste 2026</h1>
            <p class="text-bark-600">Oversikt over alle registrerte fuglehundprøver</p>
        </div>

        <!-- Filter -->
        <div class="bg-white rounded-xl border border-bark-100 p-4 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-bark-700 mb-1">Type</label>
                    <select id="filterType" class="w-full px-3 py-2 rounded-lg border border-bark-200 focus:border-warm-500 focus:ring-0 outline-none">
                        <option value="">Alle typer</option>
                        <option value="høyfjell_host">Høyfjell høst</option>
                        <option value="høyfjell_vinter">Høyfjell vinter</option>
                        <option value="nm_hoyfjell_host">NM høyfjell høst</option>
                        <option value="nm_vinter">NM vinter</option>
                        <option value="lavland_host">Lavland høst</option>
                        <option value="skogsfugl_host">Skogsfugl høst</option>
                        <option value="skogsfugl_vinter">Skogsfugl vinter</option>
                        <option value="fullkombinert">Fullkombinert</option>
                        <option value="apport">Apport</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-bark-700 mb-1">Fylke</label>
                    <select id="filterFylke" class="w-full px-3 py-2 rounded-lg border border-bark-200 focus:border-warm-500 focus:ring-0 outline-none">
                        <option value="">Alle fylker</option>
                        <option value="trondelag">Trøndelag</option>
                        <option value="nordland">Nordland</option>
                        <option value="innlandet">Innlandet</option>
                        <option value="viken">Viken</option>
                        <option value="vestland">Vestland</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-bark-700 mb-1">Status</label>
                    <select id="filterStatus" class="w-full px-3 py-2 rounded-lg border border-bark-200 focus:border-warm-500 focus:ring-0 outline-none">
                        <option value="">Alle</option>
                        <option value="active">Åpen for påmelding</option>
                        <option value="upcoming">Kommende</option>
                        <option value="full">Fullt</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Prøveliste -->
        <div id="proverListe" class="space-y-4">
            <!-- Laster... -->
            <div class="bg-white rounded-xl border border-bark-100 p-8 text-center">
                <svg class="w-8 h-8 text-bark-400 animate-spin mx-auto mb-4" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-bark-500">Laster terminliste...</p>
            </div>
        </div>

        <!-- Ingen treff -->
        <div id="ingenTreff" class="hidden bg-white rounded-xl border border-bark-100 p-8 text-center">
            <svg class="w-12 h-12 text-bark-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <p class="text-bark-500">Ingen prøver funnet med valgte filtre</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-bark-900 py-8 px-4 mt-auto">
        <div class="max-w-6xl mx-auto text-center text-bark-400 text-sm">
            &copy; 2026 Fuglehundprøve. Alle rettigheter reservert.
        </div>
    </footer>

    <script>
        let prover = [];
        let valgtePrøver = new Set();

        async function init() {
            await loadProver();
            setupFilters();
        }

        async function loadProver() {
            try {
                const resp = await fetch('/api/prover');
                if (!resp.ok) throw new Error('Kunne ikke laste prøver');
                prover = await resp.json();
                renderProver();
            } catch (err) {
                console.error('Feil:', err);
                document.getElementById('proverListe').innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-xl p-6 text-center">
                        <p class="text-red-600">Kunne ikke laste terminliste</p>
                    </div>
                `;
            }
        }

        function renderProver() {
            const container = document.getElementById('proverListe');
            const ingenTreff = document.getElementById('ingenTreff');

            // Filtrer
            const typeFilter = document.getElementById('filterType').value;
            const fylkeFilter = document.getElementById('filterFylke').value;
            const statusFilter = document.getElementById('filterStatus').value;

            let filtrert = prover.filter(p => {
                if (typeFilter && p.prove_type !== typeFilter) return false;
                if (fylkeFilter && p.fylke !== fylkeFilter) return false;
                if (statusFilter && p.status !== statusFilter) return false;
                return true;
            });

            // Sorter etter dato
            filtrert.sort((a, b) => new Date(a.start_dato) - new Date(b.start_dato));

            if (filtrert.length === 0) {
                container.innerHTML = '';
                ingenTreff.classList.remove('hidden');
                return;
            }

            ingenTreff.classList.add('hidden');

            // Grupper etter måned
            const måneder = {};
            for (const prove of filtrert) {
                const dato = new Date(prove.start_dato);
                const key = `${dato.getFullYear()}-${String(dato.getMonth() + 1).padStart(2, '0')}`;
                if (!måneder[key]) måneder[key] = [];
                måneder[key].push(prove);
            }

            let html = '';
            for (const [key, proverIMåned] of Object.entries(måneder)) {
                const [år, måned] = key.split('-');
                const månedNavn = new Date(år, parseInt(måned) - 1).toLocaleDateString('nb-NO', { month: 'long', year: 'numeric' });

                html += `
                    <div class="mb-6">
                        <h2 class="text-lg font-bold font-serif text-bark-700 mb-3 capitalize">${månedNavn}</h2>
                        <div class="space-y-3">
                `;

                for (const prove of proverIMåned) {
                    html += renderProveKort(prove);
                }

                html += `
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        function renderProveKort(prove) {
            const startDate = new Date(prove.start_dato);
            const endDate = prove.slutt_dato ? new Date(prove.slutt_dato) : null;

            const dagStart = startDate.getDate();
            const dagSlutt = endDate ? endDate.getDate() : dagStart;
            const antallDager = endDate ? Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1 : 1;

            let datoTekst = startDate.toLocaleDateString('nb-NO', { weekday: 'short', day: 'numeric' });
            if (endDate && dagSlutt !== dagStart) {
                datoTekst += ` - ${endDate.toLocaleDateString('nb-NO', { weekday: 'short', day: 'numeric' })}`;
            }

            const statusBadge = getStatusBadge(prove);
            const typeBadge = getTypeBadge(prove.prove_type);

            // Formater klasser
            let klasserStr = '';
            try {
                const klasserData = typeof prove.klasser === 'string' ? JSON.parse(prove.klasser) : prove.klasser;
                if (klasserData) {
                    const klasser = [];
                    if (klasserData.uk) klasser.push('UK');
                    if (klasserData.ak) klasser.push('AK');
                    if (klasserData.vk) klasser.push('VK');
                    klasserStr = klasser.join(', ');
                }
            } catch (e) {}

            return `
                <div class="bg-white rounded-xl border border-bark-100 hover:border-warm-200 hover:shadow-md transition overflow-hidden cursor-pointer" onclick="visProveDetaljer('${prove.id}')">
                    <div class="flex">
                        <!-- Dato-kolonne -->
                        <div class="w-20 bg-bark-50 flex flex-col items-center justify-center p-3 border-r border-bark-100">
                            <span class="text-2xl font-bold text-bark-700">${dagStart}</span>
                            <span class="text-xs text-bark-500">${startDate.toLocaleDateString('nb-NO', { month: 'short' })}</span>
                            ${antallDager > 1 ? `<span class="text-xs text-bark-400 mt-1">${antallDager} dager</span>` : ''}
                        </div>

                        <!-- Info -->
                        <div class="flex-1 p-4">
                            <div class="flex items-start justify-between gap-4">
                                <div class="flex-1">
                                    <h3 class="font-bold text-bark-800">${prove.navn}</h3>
                                    <p class="text-sm text-bark-600 mt-1">
                                        <span class="inline-flex items-center gap-1">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                                            </svg>
                                            ${prove.sted || 'Ikke oppgitt'}
                                        </span>
                                    </p>
                                    ${prove.klubb_navn ? `<p class="text-xs text-bark-500 mt-1">Arr: ${prove.klubb_navn}</p>` : ''}

                                    <div class="flex flex-wrap gap-2 mt-2">
                                        ${typeBadge}
                                        ${statusBadge}
                                        ${klasserStr ? `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-forest-100 text-forest-700">${klasserStr}</span>` : ''}
                                    </div>
                                </div>

                                <!-- Vis mer-ikon -->
                                <div class="text-bark-400">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                                    </svg>
                                </div>
                            </div>

                            <!-- Ekspandert detalj-seksjon (skjult til klikk) -->
                            <div id="proveDetaljer_${prove.id}" class="hidden mt-4 pt-4 border-t border-bark-100">
                                <div id="proveDetaljerInnhold_${prove.id}" class="text-sm text-bark-600 whitespace-pre-wrap">
                                    <span class="text-bark-400 italic">Laster informasjon...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Vis/skjul prøvedetaljer med tilleggsinformasjon
        async function visProveDetaljer(proveId) {
            const container = document.getElementById(`proveDetaljer_${proveId}`);
            const innhold = document.getElementById(`proveDetaljerInnhold_${proveId}`);
            if (!container || !innhold) return;

            // Toggle visning
            if (!container.classList.contains('hidden')) {
                container.classList.add('hidden');
                return;
            }
            container.classList.remove('hidden');

            // Hvis allerede lastet, ikke last på nytt
            if (innhold.dataset.loaded === '1') return;

            try {
                const [infoResp, partierResp] = await Promise.all([
                    fetch(`/api/storage/praktiskInfo_${proveId}`),
                    fetch(`/api/prover/${proveId}/partier`)
                ]);

                const parts = [];

                // Sjekk om partilister finnes
                let harPartilister = false;
                if (partierResp.ok) {
                    const partierData = await partierResp.json();
                    const partier = partierData.partier || {};
                    harPartilister = Object.keys(partier).length > 0;
                }
                if (!harPartilister) {
                    try {
                        const vkResp = await fetch(`/api/storage/vkSamletListe_${proveId}`);
                        if (vkResp.ok) {
                            const vkData = await vkResp.json();
                            if (vkData.value && vkData.value.hunder?.length > 0) harPartilister = true;
                        }
                    } catch(e) {}
                }

                if (harPartilister) {
                    parts.push(`<div class="mb-4">
                        <a href="partilister.html?prove=${proveId}" class="inline-flex items-center gap-2 bg-warm-500 hover:bg-warm-600 text-white px-4 py-2 rounded-xl text-sm font-medium transition shadow-sm">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                            </svg>
                            Se partilister
                        </a>
                    </div>`);
                }

                if (infoResp.ok) {
                    const data = await infoResp.json();
                    const info = data.value || {};

                    if (info.oppropTid || info.oppropSted) {
                        parts.push(`<div class="mb-3"><strong class="text-bark-800">Opprop:</strong> ${[info.oppropTid, info.oppropSted].filter(Boolean).join(', ')}</div>`);
                    }
                    if (info.provelederNavn) {
                        parts.push(`<div class="mb-1"><strong class="text-bark-800">Prøveleder:</strong> ${escapeHtml(info.provelederNavn)}${info.provelederTelefon ? ' (' + escapeHtml(info.provelederTelefon) + ')' : ''}</div>`);
                    }
                    if (info.nkkRepNavn) {
                        parts.push(`<div class="mb-1"><strong class="text-bark-800">NKK-representant:</strong> ${escapeHtml(info.nkkRepNavn)}</div>`);
                    }
                    if (info.dvkNavn) {
                        parts.push(`<div class="mb-1"><strong class="text-bark-800">DVK:</strong> ${escapeHtml(info.dvkNavn)}</div>`);
                    }
                    if (info.tilleggsinformasjon) {
                        parts.push(`<div class="mt-4 p-4 bg-warm-50 rounded-lg border border-warm-200">
                            <div class="font-semibold text-warm-800 mb-2">Informasjon om prøven</div>
                            <div class="text-bark-700 whitespace-pre-wrap">${escapeHtml(info.tilleggsinformasjon)}</div>
                        </div>`);
                    }
                    if (info.premieutdelingSted) {
                        parts.push(`<div class="mt-3"><strong class="text-bark-800">Premieutdeling:</strong> ${escapeHtml(info.premieutdelingSted)}</div>`);
                    }
                }

                if (parts.length === 0) {
                    innhold.innerHTML = '<span class="text-bark-400 italic">Ingen ytterligere informasjon tilgjengelig ennå.</span>';
                } else {
                    innhold.innerHTML = parts.join('');
                }
                innhold.dataset.loaded = '1';
            } catch (err) {
                innhold.innerHTML = '<span class="text-red-500">Kunne ikke laste informasjon.</span>';
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>"']/g, ch => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[ch]));
        }

        function getStatusBadge(prove) {
            if (prove.status === 'active') {
                return '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">Åpen</span>';
            } else if (prove.status === 'full') {
                return '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">Fullt</span>';
            } else {
                return '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-bark-100 text-bark-600">Kommende</span>';
            }
        }

        function getTypeBadge(type) {
            const types = {
                'høyfjell_host': { label: 'Høyfjell høst', color: 'bg-warm-100 text-warm-700' },
                'høyfjell_vinter': { label: 'Høyfjell vinter', color: 'bg-blue-100 text-blue-800' },
                'hoyfjell_host': { label: 'Høyfjell høst', color: 'bg-warm-100 text-warm-700' },
                'hoyfjell_vinter': { label: 'Høyfjell vinter', color: 'bg-blue-100 text-blue-800' },
                'lavland_host': { label: 'Lavland høst', color: 'bg-green-100 text-green-800' },
                'lavland_vinter': { label: 'Lavland vinter', color: 'bg-green-100 text-green-800' },
                'skogsfugl_host': { label: 'Skogsfugl høst', color: 'bg-amber-100 text-amber-800' },
                'skogsfugl_vinter': { label: 'Skogsfugl vinter', color: 'bg-teal-100 text-teal-800' },
                'fullkombinert': { label: 'Fullkombinert', color: 'bg-purple-100 text-purple-800' },
                'apport': { label: 'Apport', color: 'bg-rose-100 text-rose-800' },
                'nm_hoyfjell_host': { label: 'NM høyfjell høst', color: 'bg-amber-200 text-amber-900 font-semibold' },
                'nm_vinter': { label: 'NM vinter', color: 'bg-amber-200 text-amber-900 font-semibold' },
                // Bakoverkompatibilitet med gamle verdier
                'hogfjell': { label: 'Høyfjell', color: 'bg-warm-100 text-warm-700' },
                'lavland': { label: 'Lavland', color: 'bg-green-100 text-green-800' },
                'skog': { label: 'Skog', color: 'bg-amber-100 text-amber-800' }
            };
            const t = types[type] || { label: type || 'Høyfjell', color: 'bg-warm-100 text-warm-700' };
            return `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${t.color}">${t.label}</span>`;
        }

        function setupFilters() {
            document.getElementById('filterType').addEventListener('change', renderProver);
            document.getElementById('filterFylke').addEventListener('change', renderProver);
            document.getElementById('filterStatus').addEventListener('change', renderProver);
        }

        // Init
        init();
    </script>
</body>
</html>
