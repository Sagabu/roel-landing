<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last opp logo - Fuglehundprøve</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        warm: { 50: '#FFF7F2', 100: '#FFE1CF', 200: '#EAD8CF', 300: '#E5C9B8', 400: '#D4A989', 500: '#FD8536', 600: '#E5721F', 700: '#C45F14', 800: '#6E3018', 900: '#4A1E0D' },
                        cream: { DEFAULT: '#F7F3EE', 50: '#FFFFFF', 100: '#F7F3EE', 200: '#FFF7F2', 300: '#EAD8CF' },
                        bark: { 50: '#F7F3EE', 100: '#FFF7F2', 200: '#EAD8CF', 300: '#D4A989', 400: '#B8977A', 500: '#9A8268', 600: '#7D6A54', 700: '#6E3018', 800: '#5A2812', 900: '#3D1B0C' }
                    },
                    fontFamily: {
                        'serif': ['Playfair Display', 'Georgia', 'serif'],
                        'sans': ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-cream min-h-screen font-sans">

    <!-- Header -->
    <header class="bg-bark-900/60 text-white sticky top-0 z-50 shadow-lg backdrop-blur-sm">
        <div class="max-w-5xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <a href="index.html" class="flex items-center gap-3">
                    <img src="images/logo.png" alt="Fuglehundprøve logo" class="w-14 h-14">
                    <div>
                        <h1 class="text-xl font-serif font-bold">Fuglehundprøve</h1>
                        <p class="text-bark-300 text-sm">Last opp logo</p>
                    </div>
                </a>
                <a href="index.html" class="text-bark-300 hover:text-white text-sm flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                    Tilbake
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex items-center justify-center px-4 py-12">
        <div class="bg-white rounded-2xl shadow-xl border border-bark-100 p-8 max-w-md w-full">
            <h2 class="text-2xl font-bold font-serif text-bark-800 text-center mb-6">Last opp klubblogo</h2>

            <form id="uploadForm" enctype="multipart/form-data" class="space-y-4">
                <div class="border-2 border-dashed border-bark-300 rounded-xl p-8 text-center hover:border-warm-500 transition cursor-pointer" onclick="document.getElementById('logoFile').click()">
                    <input type="file" id="logoFile" name="logo" accept="image/*" class="hidden" onchange="previewImage(this)">
                    <div id="preview" class="hidden mb-4">
                        <img id="previewImg" class="max-h-40 mx-auto rounded">
                    </div>
                    <div id="placeholder">
                        <svg class="w-12 h-12 mx-auto text-bark-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                        <p class="text-bark-500">Trykk for å velge bilde</p>
                        <p class="text-bark-400 text-sm mt-1">PNG, JPG eller SVG</p>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-warm-500 text-white py-3 rounded-xl font-semibold hover:bg-warm-600 transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    Last opp logo
                </button>
            </form>

            <div id="status" class="mt-4 text-center hidden">
                <div class="inline-flex items-center gap-2 px-4 py-2 bg-green-100 text-green-700 rounded-xl">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                    <span class="font-medium">Logo lastet opp!</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-bark-900 py-6 px-4 mt-auto">
        <div class="max-w-6xl mx-auto text-center text-bark-500 text-sm">
            &copy; 2026 Fuglehundprøve. Alle rettigheter reservert.
        </div>
    </footer>

    <script>
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('preview').classList.remove('hidden');
                    document.getElementById('placeholder').classList.add('hidden');
                    document.getElementById('submitBtn').disabled = false;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            const file = document.getElementById('logoFile').files[0];
            formData.append('logo', file);

            document.getElementById('submitBtn').textContent = 'Laster opp...';
            document.getElementById('submitBtn').disabled = true;

            try {
                const response = await fetch('/api/upload-logo', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    document.getElementById('status').classList.remove('hidden');
                    document.getElementById('submitBtn').textContent = 'Ferdig!';
                } else {
                    alert('Feil ved opplasting');
                    document.getElementById('submitBtn').textContent = 'Last opp logo';
                    document.getElementById('submitBtn').disabled = false;
                }
            } catch (err) {
                alert('Feil: ' + err.message);
                document.getElementById('submitBtn').textContent = 'Last opp logo';
                document.getElementById('submitBtn').disabled = false;
            }
        });
    </script>
</body>
</html>
