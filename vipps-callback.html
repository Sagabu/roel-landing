<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Betaling fullfort - Fuglehundprove</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        forest: { 500: '#657a53', 600: '#4f6040', 700: '#3f4c34' },
                        bark: { 50: '#F7F3EE', 100: '#FFF7F2', 700: '#6E3018', 800: '#5A2812' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bark-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 max-w-md w-full text-center">
        <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
        </div>

        <h1 class="text-2xl font-bold text-bark-800 mb-2">Takk for betalingen!</h1>
        <p class="text-bark-600 mb-6">Betalingen din er registrert. Du kan lukke dette vinduet.</p>

        <div class="bg-bark-50 rounded-xl p-4 mb-6">
            <p class="text-sm text-bark-500">Du vil motta en bekreftelse fra Vipps.</p>
        </div>

        <a href="/" class="inline-block bg-forest-600 hover:bg-forest-700 text-white px-6 py-3 rounded-xl font-medium transition">
            Tilbake til forsiden
        </a>
    </div>
</body>
</html>
